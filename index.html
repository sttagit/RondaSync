<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RondaSync - Seguridad Biogas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const SUPABASE_URL = 'https://cbvipsjpvlgyipifidyo.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_-9xy9fwszhg5RMqlilNn-A_wnK2VGCb';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const { useState, useEffect } = React;

        // ==========================================
        // COMPONENTE: LOGIN REAL
        // ==========================================
        function PantallaLogin() {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false);
            const [showPassword, setShowPassword] = useState(false);

            const manejarLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
                if (error) alert("Error: " + error.message);
                setLoading(false);
            };

            return (
                <div className="min-h-screen bg-zinc-900 flex items-center justify-center p-4">
                    <div className="bg-[#2a2a2a] w-full max-w-md rounded-xl p-8 relative shadow-2xl border border-zinc-700">
                        <div className="absolute top-3 left-3 w-2 h-2 bg-zinc-600 rounded-full"></div>
                        <div className="absolute top-3 right-3 w-2 h-2 bg-zinc-600 rounded-full"></div>
                        <div className="flex items-center space-x-4 mb-8">
                            <div className="w-10 h-10 bg-amber-500 rounded flex items-center justify-center font-bold text-zinc-900">RS</div>
                            <h1 className="text-xl font-bold text-white tracking-tight">RondaSync</h1>
                        </div>
                        <h2 className="text-2xl font-bold text-white mb-6">Acceso Operativo</h2>
                        <form onSubmit={manejarLogin} className="space-y-4">
                            <input type="email" placeholder="Email" value={email} onChange={e => setEmail(e.target.value)}
                                className="w-full bg-[#1e1e1e] border border-zinc-700 text-white rounded-lg p-4 focus:border-amber-500 outline-none" required />
                            <div className="relative">
                                <input type={showPassword ? "text" : "password"} placeholder="Contrasena" value={password} onChange={e => setPassword(e.target.value)}
                                    className="w-full bg-[#1e1e1e] border border-zinc-700 text-white rounded-lg p-4 focus:border-amber-500 outline-none" required />
                                <button type="button" onClick={() => setShowPassword(!showPassword)} className="absolute right-4 top-4 text-zinc-500">👁️</button>
                            </div>
                            <button type="submit" disabled={loading} className="w-full bg-amber-500 hover:bg-amber-600 text-zinc-900 font-bold py-4 rounded-lg uppercase tracking-wider transition-all">
                                {loading ? 'Validando...' : 'Ingresar'}
                            </button>
                        </form>
                    </div>
                </div>
            );
        }

        // ==========================================
        // COMPONENTE: INICIO DE TURNO
        // ==========================================
        function InicioTurno({ onTurnoIniciado, userEmail }) {
            const [loading, setLoading] = useState(false);
            const [atex, setAtex] = useState(false);
            const [val, setVal] = useState({ nivel: '', pres: '' });

            const iniciar = async () => {
                if (!atex) return alert("Confirma ATEX");
                setLoading(true);
                const { data, error } = await supabaseClient.from('registro_turnos').insert([{
                    operador_nombre: userEmail,
                    scada_nivel_gasometro: val.nivel || null,
                    scada_presion_mbar: val.pres || null,
                    atex_confirmado: atex,
                    tipo_turno: 'Normal'
                }]).select();
                if (!error) onTurnoIniciado(data[0].id);
                setLoading(false);
            };

            return (
                <div className="p-4 max-w-md mx-auto space-y-4 bg-gray-50 min-h-screen">
                    <div className="flex justify-between items-center border-b pb-2">
                        <h2 className="font-bold text-gray-800">Inicio de Ronda</h2>
                        <button onClick={() => supabaseClient.auth.signOut()} className="text-xs text-red-600 font-bold">SALIR</button>
                    </div>
                    <div className="bg-white p-4 rounded-xl shadow-sm border">
                        <p className="text-xs text-gray-500 uppercase font-bold">Operador Autenticado</p>
                        <p className="text-sm font-medium text-gray-800">{userEmail}</p>
                    </div>
                    <div className="bg-white p-4 rounded-xl shadow-sm border space-y-3">
                        <h3 className="text-xs font-bold text-blue-600">DATOS SCADA</h3>
                        <div className="grid grid-cols-2 gap-2">
                            <input type="number" placeholder="Nivel %" className="border p-3 rounded bg-gray-50 text-center" onChange={e => setVal({...val, nivel: e.target.value})} />
                            <input type="number" placeholder="mbar" className="border p-3 rounded bg-gray-50 text-center" onChange={e => setVal({...val, pres: e.target.value})} />
                        </div>
                    </div>
                    <div className="bg-red-50 border-2 border-red-100 p-4 rounded-xl">
                        <label className="flex items-start space-x-3 cursor-pointer">
                            <input type="checkbox" onChange={e => setAtex(e.target.checked)} className="h-6 w-6 mt-1" />
                            <span className="text-xs text-red-900 leading-tight">Confirmo revision de plano ATEX y riesgos del proceso en Consorcio Santa Marta.</span>
                        </label>
                    </div>
                    <button onClick={iniciar} disabled={!atex || loading} className={`w-full py-4 rounded-xl font-bold text-white ${atex ? 'bg-green-600' : 'bg-gray-400'}`}>
                        {loading ? 'Sincronizando...' : 'EMPEZAR RECORRIDO'}
                    </button>
                </div>
            );
        }

        // ==========================================
        // COMPONENTE: RONDA TERRENO
        // ==========================================
        function RondaGasometro({ turnoId, onFin }) {
            const [loading, setLoading] = useState(false);
            const [datos, setDatos] = useState({ lel: '', h: '' });

            const guardar = async () => {
                setLoading(true);
                await supabaseClient.from('inspeccion_gasometro').insert([{ turno_id: turnoId, lectura_lel_porcentaje: datos.lel || 0, altura_interna_m: datos.h || 0 }]);
                await supabaseClient.from('registro_turnos').update({ estado_ronda: 'Completada' }).eq('id', turnoId);
                setLoading(false);
                onFin();
            };

            return (
                <div className="p-4 max-w-md mx-auto space-y-4 bg-gray-50 min-h-screen">
                    <h2 className="font-bold text-gray-800 border-b pb-2">Gasometro (Campo)</h2>
                    <div className="bg-white p-4 rounded-xl shadow-sm border space-y-4">
                        <div>
                            <label className="text-xs font-bold text-gray-400 uppercase">Detector LEL (%)</label>
                            <input type="number" step="0.1" className="w-full border p-4 rounded-lg bg-gray-50 text-xl font-bold" placeholder="0.0" onChange={e => setDatos({...datos, lel: e.target.value})} />
                        </div>
                        <div>
                            <label className="text-xs font-bold text-gray-400 uppercase">Altura Membrana (m)</label>
                            <input type="number" step="0.1" className="w-full border p-4 rounded-lg bg-gray-50 text-xl font-bold" placeholder="0.0" onChange={e => setDatos({...datos, h: e.target.value})} />
                        </div>
                    </div>
                    <button onClick={guardar} disabled={loading} className="w-full bg-blue-600 text-white py-4 rounded-xl font-bold">
                        {loading ? 'Guardando...' : 'FINALIZAR RECORRIDO'}
                    </button>
                </div>
            );
        }

        // ==========================================
        // APP PRINCIPAL
        // ==========================================
        function App() {
            const [user, setUser] = useState(null);
            const [vista, setVista] = useState('inicio');
            const [turnoId, setTurnoId] = useState(null);

            useEffect(() => {
                supabaseClient.auth.getSession().then(({ data: { session } }) => {
                    setUser(session?.user ?? null);
                });
                const { data: { subscription } } = supabaseClient.auth.onAuthStateChange((_event, session) => {
                    setUser(session?.user ?? null);
                });
                return () => subscription.unsubscribe();
            }, []);

            if (!user) return <PantallaLogin />;

            return (
                <div className="bg-gray-200 min-h-screen">
                    {vista === 'inicio' && <InicioTurno userEmail={user.email} onTurnoIniciado={(id) => {setTurnoId(id); setVista('gasometro');}} />}
                    {vista === 'gasometro' && <RondaGasometro turnoId={turnoId} onFin={() => setVista('fin')} />}
                    {vista === 'fin' && (
                        <div className="flex flex-col items-center justify-center min-h-screen p-6">
                            <div className="bg-white p-8 rounded-2xl shadow-xl text-center w-full max-w-sm">
                                <div className="text-5xl mb-4">✅</div>
                                <h2 className="text-2xl font-bold text-gray-800">Sincronizado</h2>
                                <p className="text-gray-500 text-sm mt-2">La ronda ha sido registrada en el servidor.</p>
                                <button onClick={() => setVista('inicio')} className="mt-8 w-full bg-zinc-900 text-white py-4 rounded-xl font-bold">NUEVA RONDA</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
