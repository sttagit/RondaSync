<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RondaSync - PTAS Talagante</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        aguas: {
                            blue: '#0068B3', green: '#009C62', yellow: '#F4C300', dark: '#004A80'
                        }
                    }
                }
            }
        }
    </script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #f3f4f6; }
        .selection\:bg-aguas-yellow::selection { background-color: #F4C300; }
        .selection\:text-aguas-dark::selection { color: #004A80; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.25s ease-out both; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // ==========================================
        // CONFIGURACIÓN SUPABASE
        // ==========================================
        const SUPABASE_URL  = 'https://cbvipsjpvlgyipifidyo.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_-9xy9fwszhg5RMqlilNn-A_wnK2VGCb';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const { useState, useEffect, useRef, useCallback } = React;

        // ==========================================
        // UTILIDADES Y LÓGICA DE TIEMPO
        // ==========================================
        function getTokens() {
            const now   = new Date();
            const chile = new Date(now.toLocaleString('en-US', { timeZone: 'America/Santiago' }));
            const h     = chile.getHours();
            const day   = chile.getDay(); // 0=Dom, 1=Lun, 2=Mar, 3=Mié...
            const fmt   = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;

            let currentStr, prevStr, isNoche = false, isMiercolesDia = false;
            
            if (h >= 8 && h < 20) {
                currentStr = `${fmt(chile)}-DIA`;
                const prev = new Date(chile); prev.setDate(chile.getDate() - 1);
                prevStr = `${fmt(prev)}-NOCHE`;
                if (day === 3) isMiercolesDia = true;
            } else {
                isNoche = true;
                const base = h < 8 ? (()=>{ const d=new Date(chile); d.setDate(chile.getDate()-1); return d; })() : chile;
                currentStr = `${fmt(base)}-NOCHE`;
                prevStr    = `${fmt(base)}-DIA`;
            }
            return { currentStr, prevStr, isNoche, isMiercolesDia };
        }

        const Fantasma = ({ valor }) => (valor === null || valor === undefined || valor === '') ? null : <span className="text-[9px] bg-blue-50 text-aguas-blue px-1.5 rounded font-bold border border-blue-200">Ant: {valor}</span>;

        function useToast() {
            const [toasts, setToasts] = useState([]);
            const push = useCallback((msg, type = 'info') => {
                const id = Date.now();
                setToasts(t => [...t, { id, msg, type }]);
                setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 4000);
            }, []);
            const ToastContainer = () => (
                <div className="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 flex flex-col gap-2 w-full max-w-sm px-4 pointer-events-none">
                    {toasts.map(t => (
                        <div key={t.id} className={`fade-in px-5 py-3 rounded-2xl text-sm font-bold shadow-xl text-white ${t.type==='error' ? 'bg-red-600' : t.type==='success' ? 'bg-aguas-green' : 'bg-aguas-dark'}`}>{t.msg}</div>
                    ))}
                </div>
            );
            return { push, ToastContainer };
        }

        // ==========================================
        // MULTI-FOTO UPLOADER
        // ==========================================
        function MultiFotoUploader({ idCampo, turnoId, onFotosActualizadas, fotosIniciales = [] }) {
            const [fotos, setFotos] = useState(fotosIniciales);
            const [subiendoIdx, setSubiendoIdx] = useState(null);
            const blobRefs = useRef([]);

            useEffect(() => () => blobRefs.current.forEach(url => URL.revokeObjectURL(url)), []);

            const manejarCaptura = (e) => {
                const archivo = e.target.files[0];
                if (!archivo || fotos.length >= 3) return;
                const localUrl = URL.createObjectURL(archivo);
                blobRefs.current.push(localUrl);
                setFotos(prev => [...prev, { localUrl, realFile: archivo, remoteUrl: null }]);
            };

            const subirFoto = async (index) => {
                const foto = fotos[index];
                if (!foto.realFile || foto.remoteUrl) return;
                setSubiendoIdx(index);
                const ext = foto.realFile.name.split('.').pop();
                const nombre = `${turnoId}-${idCampo}-${index}-${Date.now()}.${ext}`;
                const { error } = await sb.storage.from('inspeccion_fotos').upload(nombre, foto.realFile);
                if (!error) {
                    const { data } = sb.storage.from('inspeccion_fotos').getPublicUrl(nombre);
                    setFotos(prev => {
                        const copia = [...prev];
                        copia[index] = { ...copia[index], remoteUrl: data.publicUrl };
                        onFotosActualizadas(idCampo, copia.map(f => f.remoteUrl).filter(Boolean));
                        return copia;
                    });
                }
                setSubiendoIdx(null);
            };

            const eliminarFoto = (index) => {
                setFotos(prev => {
                    const copia = prev.filter((_, i) => i !== index);
                    onFotosActualizadas(idCampo, copia.map(f => f.remoteUrl).filter(Boolean));
                    return copia;
                });
            };

            return (
                <div className="mt-3">
                    <div className="grid grid-cols-3 gap-2">
                        {fotos.map((foto, index) => (
                            <div key={index} className="relative group">
                                <img src={foto.localUrl || foto.remoteUrl} className="h-24 w-full object-cover rounded-lg border-2 border-white shadow-sm" alt="" />
                                {!foto.remoteUrl && subiendoIdx !== index && ( <button onClick={() => subirFoto(index)} className="absolute inset-0 bg-black/40 flex items-center justify-center rounded-lg"><span className="bg-aguas-green text-white text-[10px] font-bold px-2 py-1 rounded shadow-lg">SUBIR</span></button> )}
                                {subiendoIdx === index && ( <div className="absolute inset-0 bg-white/60 flex items-center justify-center rounded-lg"><div className="w-5 h-5 border-2 border-aguas-blue border-t-transparent rounded-full animate-spin"></div></div> )}
                                {foto.remoteUrl && ( <div className="absolute top-1 right-1 bg-aguas-green text-white rounded-full p-0.5 shadow-md"><svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 13l4 4L19 7"/></svg></div> )}
                                <button onClick={() => eliminarFoto(index)} className="absolute -top-2 -left-2 bg-red-500 text-white rounded-full w-6 h-6 flex items-center justify-center shadow-lg font-bold text-sm">×</button>
                            </div>
                        ))}
                        {fotos.length < 3 && (
                            <label className="h-24 border-2 border-dashed border-aguas-blue bg-blue-50/50 rounded-lg flex flex-col items-center justify-center cursor-pointer hover:bg-blue-100 transition-colors shadow-inner">
                                <span className="text-2xl text-aguas-blue">+</span><span className="text-[9px] font-bold text-aguas-blue uppercase tracking-tighter">Foto {fotos.length + 1}</span>
                                <input type="file" accept="image/*" capture="environment" className="hidden" onChange={manejarCaptura} />
                            </label>
                        )}
                    </div>
                </div>
            );
        }

        // ==========================================
        // LOGIN CORPORATIVO
        // ==========================================
        function PantallaLogin({ onLogin }) {
            const [email, setEmail] = useState(''); const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false); const [showPass, setShowPass] = useState(false);
            const [error, setError] = useState('');

            const handleSubmit = async (e) => {
                e.preventDefault(); setLoading(true); setError('');
                const { data, error: err } = await sb.auth.signInWithPassword({ email, password });
                if (err) {
                    setError(err.message.includes('Invalid login') ? 'Correo o contraseña incorrectos.' : 'Error: ' + err.message);
                    setLoading(false);
                } else if (data.session) onLogin(data.session.user);
                else { setError('Error al establecer sesión.'); setLoading(false); }
            };

            return (
                <div className="min-h-screen bg-gray-100 flex items-center justify-center p-4 font-sans">
                    <div className="bg-white w-full max-w-md rounded-3xl p-8 shadow-2xl border-t-8 border-aguas-blue fade-in">
                        <div className="flex flex-col items-center mb-8">
                            <div className="w-16 h-16 bg-aguas-blue rounded-2xl flex items-center justify-center shadow-lg mb-4"><span className="font-black text-white text-3xl">RS</span></div>
                            <h1 className="text-2xl font-black text-aguas-dark tracking-tight">RondaSync</h1>
                            <p className="text-[10px] text-aguas-green font-black uppercase tracking-[0.3em] mt-1">PTAS Talagante</p>
                        </div>
                        <form onSubmit={handleSubmit} className="space-y-5">
                            {error && <div className="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl text-[11px] font-bold text-center animate-pulse">⚠️ {error}</div>}
                            <div><label className="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2">Correo</label><input type="email" value={email} onChange={e=>setEmail(e.target.value)} className="w-full bg-gray-50 border-2 border-gray-200 rounded-xl p-4 focus:border-aguas-blue outline-none" required /></div>
                            <div className="relative"><label className="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2">Contraseña</label><input type={showPass ? 'text' : 'password'} value={password} onChange={e=>setPassword(e.target.value)} className="w-full bg-gray-50 border-2 border-gray-200 rounded-xl p-4 pr-12 focus:border-aguas-blue outline-none" required /><button type="button" onClick={()=>setShowPass(!showPass)} className="absolute right-4 top-[2.35rem] p-1 text-gray-400 hover:text-aguas-blue outline-none">👁️</button></div>
                            <button type="submit" disabled={loading} className="w-full bg-aguas-blue text-white font-black py-4 rounded-xl uppercase tracking-widest shadow-lg hover:bg-aguas-dark active:scale-95 transition-all mt-6 disabled:opacity-60">{loading ? 'Verificando...' : 'Iniciar Sesión'}</button>
                        </form>
                    </div>
                </div>
            );
        }

        // ==========================================
        // VISTA SCADA Y DASHBOARD
        // ==========================================
        function VistaScada({ datosGuardados, prevData, onSave, onBack }) {
            const isLocked = !!datosGuardados; 
            const [scada, setScada] = useState({ dig_nivel: '', dig_presion: '', dig_temp: '', gas_nivel: '', gas_presion: '', comp_flujo: '', comp_pres_imp: '', cald_flujo: '', ant_flujo: '' });

            if (isLocked) {
                return (
                    <div className="p-4 max-w-md mx-auto space-y-4 min-h-screen pb-20 font-sans fade-in">
                        <div className="bg-aguas-blue p-5 rounded-2xl text-white shadow-xl flex justify-between items-center"><h2 className="text-lg font-black uppercase">SCADA Inicial</h2><button onClick={onBack} className="bg-white/20 px-3 py-1 rounded-full text-xs font-bold">Volver</button></div>
                        <div className="bg-blue-50 border-2 border-blue-200 p-4 rounded-2xl flex items-center justify-between"><p className="text-[10px] font-black text-aguas-blue uppercase">Registrado por: {datosGuardados.operador_nombre.split('@')[0]}</p><span className="text-3xl">🔒</span></div>
                        <div className="bg-white rounded-3xl shadow-md border p-5 space-y-6">
                            <div><h4 className="text-[10px] font-black text-aguas-blue uppercase mb-3 border-b pb-1">1. Digestor</h4><div className="grid grid-cols-3 gap-3"><div className="bg-gray-50 p-3 rounded-xl text-center"><p className="text-[9px] text-gray-400 font-black uppercase">Nivel</p><p className="font-black text-gray-800">{datosGuardados.scada_dig_nivel_cm} cm</p></div><div className="bg-gray-50 p-3 rounded-xl text-center"><p className="text-[9px] text-gray-400 font-black uppercase">Presión</p><p className="font-black text-gray-800">{datosGuardados.scada_dig_presion_mbar} mb</p></div><div className="bg-gray-50 p-3 rounded-xl text-center"><p className="text-[9px] text-gray-400 font-black uppercase">Temp</p><p className="font-black text-gray-800">{datosGuardados.scada_dig_temp_c} °C</p></div></div></div>
                            <div><h4 className="text-[10px] font-black text-aguas-yellow uppercase mb-3 border-b pb-1">2. Gasometro</h4><div className="grid grid-cols-2 gap-3"><div className="bg-amber-50 p-3 rounded-xl text-center"><p className="text-[9px] text-amber-600 font-black uppercase">Nivel</p><p className="font-black text-amber-900 text-lg">{datosGuardados.scada_nivel_gasometro} %</p></div><div className="bg-amber-50 p-3 rounded-xl text-center"><p className="text-[9px] text-amber-600 font-black uppercase">Presión</p><p className="font-black text-amber-900 text-lg">{datosGuardados.scada_presion_mbar} mb</p></div></div></div>
                            <div><h4 className="text-[10px] font-black text-aguas-green uppercase mb-3 border-b pb-1">3. Compresores/Calderas</h4><div className="grid grid-cols-2 gap-3 mb-3"><div className="bg-gray-50 p-3 rounded-xl text-center"><p className="text-[9px] text-gray-400 font-black uppercase">Flujo Comp.</p><p className="font-black text-gray-800">{datosGuardados.scada_flujo_biogas_nm3h}</p></div><div className="bg-gray-50 p-3 rounded-xl text-center"><p className="text-[9px] text-gray-400 font-black uppercase">Pres. Imp.</p><p className="font-black text-gray-800">{datosGuardados.scada_comp_presion_imp_mbar} mb</p></div></div><div className="grid grid-cols-2 gap-3"><div className="bg-gray-50 p-3 rounded-xl text-center"><p className="text-[9px] text-gray-400 font-black uppercase">Flujo Cald.</p><p className="font-black text-gray-800">{datosGuardados.scada_cald_flujo_m3h}</p></div><div className="bg-gray-50 p-3 rounded-xl text-center"><p className="text-[9px] text-gray-400 font-black uppercase">Flujo Ant.</p><p className="font-black text-gray-800">{datosGuardados.scada_ant_flujo_m3h}</p></div></div></div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="p-4 max-w-md mx-auto space-y-4 min-h-screen pb-20 font-sans fade-in">
                    <div className="bg-aguas-blue p-5 rounded-2xl text-white shadow-xl flex justify-between items-center"><h2 className="text-lg font-black uppercase">Línea Base SCADA</h2><button onClick={onBack} className="bg-white/20 px-3 py-1 rounded-full text-xs font-bold">Volver</button></div>
                    <div className="bg-white rounded-3xl shadow-md border border-gray-100 p-5 space-y-6">
                        <div><h4 className="text-[10px] font-black text-aguas-blue uppercase mb-3 border-b pb-1">1. Digestor</h4><div className="grid grid-cols-3 gap-3"><div><div className="flex justify-between items-center mb-1"><label className="text-[9px] text-gray-400 font-black">Nivel (cm)</label><Fantasma valor={prevData?.scada_dig_nivel_cm}/></div><input type="number" value={scada.dig_nivel} onChange={e => setScada({...scada, dig_nivel: e.target.value})} className="w-full border-2 p-3 rounded-xl text-center font-bold bg-gray-50 outline-none focus:border-aguas-blue" /></div><div><div className="flex justify-between items-center mb-1"><label className="text-[9px] text-gray-400 font-black">Pres. (mb)</label><Fantasma valor={prevData?.scada_dig_presion_mbar}/></div><input type="number" value={scada.dig_presion} onChange={e => setScada({...scada, dig_presion: e.target.value})} className="w-full border-2 p-3 rounded-xl text-center font-bold bg-gray-50 outline-none focus:border-aguas-blue" /></div><div><div className="flex justify-between items-center mb-1"><label className="text-[9px] text-gray-400 font-black">Temp (°C)</label><Fantasma valor={prevData?.scada_dig_temp_c}/></div><input type="number" value={scada.dig_temp} onChange={e => setScada({...scada, dig_temp: e.target.value})} className="w-full border-2 p-3 rounded-xl text-center font-bold bg-gray-50 outline-none focus:border-aguas-blue" /></div></div></div>
                        <div><h4 className="text-[10px] font-black text-aguas-yellow uppercase mb-3 border-b pb-1">2. Gasometro</h4><div className="grid grid-cols-2 gap-3"><div><div className="flex justify-between items-center mb-1"><label className="text-[9px] text-gray-400 font-black">Nivel (%)</label><Fantasma valor={prevData?.scada_nivel_gasometro}/></div><input type="number" value={scada.gas_nivel} onChange={e => setScada({...scada, gas_nivel: e.target.value})} className="w-full border-2 p-3 rounded-xl text-center font-black bg-amber-50 outline-none text-xl focus:border-aguas-yellow" /></div><div><div className="flex justify-between items-center mb-1"><label className="text-[9px] text-gray-400 font-black">Pres. (mb)</label><Fantasma valor={prevData?.scada_presion_mbar}/></div><input type="number" value={scada.gas_presion} onChange={e => setScada({...scada, gas_presion: e.target.value})} className="w-full border-2 p-3 rounded-xl text-center font-black bg-amber-50 outline-none text-xl focus:border-aguas-yellow" /></div></div></div>
                        <div><h4 className="text-[10px] font-black text-aguas-green uppercase mb-3 border-b pb-1">3. Compresores/Calderas</h4><div className="grid grid-cols-2 gap-3 mb-3"><div><div className="flex justify-between items-center mb-1"><label className="text-[9px] text-gray-400 font-black">Flujo Comp.</label><Fantasma valor={prevData?.scada_flujo_biogas_nm3h}/></div><input type="number" value={scada.comp_flujo} onChange={e => setScada({...scada, comp_flujo: e.target.value})} className="w-full border-2 p-3 rounded-xl text-center font-bold bg-gray-50 outline-none focus:border-aguas-green" /></div><div><div className="flex justify-between items-center mb-1"><label className="text-[9px] text-gray-400 font-black">Pres. Imp.</label><Fantasma valor={prevData?.scada_comp_presion_imp_mbar}/></div><input type="number" value={scada.comp_pres_imp} onChange={e => setScada({...scada, comp_pres_imp: e.target.value})} className="w-full border-2 p-3 rounded-xl text-center font-bold bg-gray-50 outline-none focus:border-aguas-green" /></div></div><div className="grid grid-cols-2 gap-3"><div><div className="flex justify-between items-center mb-1"><label className="text-[9px] text-gray-400 font-black">Flujo Calderas</label><Fantasma valor={prevData?.scada_cald_flujo_m3h}/></div><input type="number" value={scada.cald_flujo} onChange={e => setScada({...scada, cald_flujo: e.target.value})} className="w-full border-2 p-3 rounded-xl text-center font-bold bg-gray-50 outline-none focus:border-aguas-green" /></div><div><div className="flex justify-between items-center mb-1"><label className="text-[9px] text-gray-400 font-black">Flujo Antorchas</label><Fantasma valor={prevData?.scada_ant_flujo_m3h}/></div><input type="number" value={scada.ant_flujo} onChange={e => setScada({...scada, ant_flujo: e.target.value})} className="w-full border-2 p-3 rounded-xl text-center font-bold bg-gray-50 outline-none focus:border-aguas-green" /></div></div></div>
                    </div>
                    <button onClick={() => onSave(scada, [
                        {key:'dig_nivel',dbKey:'scada_dig_nivel_cm'}, {key:'dig_presion',dbKey:'scada_dig_presion_mbar'}, {key:'dig_temp',dbKey:'scada_dig_temp_c'},
                        {key:'gas_nivel',dbKey:'scada_nivel_gasometro'}, {key:'gas_presion',dbKey:'scada_presion_mbar'},
                        {key:'comp_flujo',dbKey:'scada_flujo_biogas_nm3h'}, {key:'comp_pres',dbKey:'scada_comp_presion_imp_mbar'},
                        {key:'cald_flujo',dbKey:'scada_cald_flujo_m3h'}, {key:'ant_flujo',dbKey:'scada_ant_flujo_m3h'}
                    ])} className="w-full bg-aguas-green text-white font-black py-6 rounded-3xl shadow-xl uppercase tracking-widest hover:bg-[#008251] flex justify-center items-center"><span className="text-xl mr-2">🔒</span> Sellar Base SCADA</button>
                </div>
            );
        }

        function VistaDashboard({ onBack }) {
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const fetchHistory = async () => {
                    const { data: turnos, error } = await supabaseClient.from('registro_turnos').select('*, inspeccion_gasometro(*)').order('created_at', { ascending: false }).limit(10);
                    if (!error && turnos) setData(turnos);
                    setLoading(false);
                };
                fetchHistory();
            }, []);

            return (
                <div className="p-4 max-w-md mx-auto min-h-screen space-y-6 font-sans bg-gray-100 pb-20 fade-in">
                    <div className="bg-aguas-blue p-5 rounded-2xl text-white shadow-xl flex items-center justify-between sticky top-0 z-20">
                        <div className="flex items-center"><span className="text-2xl mr-3">📊</span><h2 className="text-lg font-black uppercase tracking-tight">Supervisión</h2></div>
                        <button onClick={onBack} className="bg-white/20 hover:bg-white/30 text-xs px-3 py-1 rounded-full font-bold transition-colors">Volver</button>
                    </div>
                    {loading ? (
                        <div className="text-center py-20 text-gray-500 font-bold animate-pulse">Cargando Historial...</div>
                    ) : (
                        <div className="space-y-4">
                            {data.map((turno) => (
                                <div key={turno.id} className="bg-white p-4 rounded-2xl shadow-sm border border-gray-200">
                                    <div className="flex justify-between items-start border-b border-gray-100 pb-2 mb-2">
                                        <div>
                                            <p className="text-xs font-black text-gray-800">{new Date(turno.created_at).toLocaleString([], {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'})}</p>
                                            <p className="text-[10px] text-aguas-blue font-bold mb-1">{turno.operador_nombre}</p>
                                        </div>
                                    </div>
                                    <div className="bg-gray-50 p-3 rounded-xl border border-gray-100"><p className="text-[9px] text-gray-400 font-black uppercase mb-1">Novedades</p><p className="text-xs text-gray-700 font-medium italic">"{turno.setpoints_ajustados || 'Sin registro.'}"</p></div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        // ==========================================
        // FORMULARIOS DE LOGÍSTICA / TOTALIZADORES
        // ==========================================
        function FormularioEntrega({ onTerminado, prevData }) {
            const [fd, setFd] = useState({ radios: true, llaves: true, detector: true, linternas: true, pol_cen: '', pol_sedi: '', petroleo: '', cal: '', observaciones: '' });
            const allCheck = fd.radios && fd.llaves && fd.detector && fd.linternas;
            const canSubmit = fd.pol_cen !== '' && fd.pol_sedi !== '' && fd.petroleo !== '' && fd.cal !== '' && (allCheck || fd.observaciones.trim() !== '');

            return (
                <div className="p-4 max-w-md mx-auto space-y-6 min-h-screen pb-10 font-sans fade-in">
                    <div className="bg-[#1e293b] p-5 rounded-2xl text-white shadow-xl"><h2 className="text-lg font-black uppercase">Entrega de Cargos</h2></div>

                            <div><div className="flex justify-between mb-1"><label className="text-[9px] font-black">Sacos Polímero Sedi.</label><Fantasma valor={prevData?.sacos_polimero_sedipack}/></div><input type="number" value={fd.pol_sedi} onChange={e=>setFd({...fd,pol_sedi:e.target.value})} className="w-full border-2 p-3 rounded-xl text-center outline-none focus:border-aguas-blue"/></div>
                            <div><div className="flex justify-between mb-1"><label className="text-[9px] font-black">Petróleo Lts.</label><Fantasma valor={prevData?.litros_petroleo}/></div><input type="number" value={fd.petroleo} onChange={e=>setFd({...fd,petroleo:e.target.value})} className="w-full border-2 p-3 rounded-xl text-center outline-none focus:border-aguas-blue"/></div>
                            <div><div className="flex justify-between mb-1"><label className="text-[9px] font-black">Sacos Cal Viva</label><Fantasma valor={prevData?.sacos_cal_viva}/></div><input type="number" value={fd.cal} onChange={e=>setFd({...fd,cal:e.target.value})} className="w-full border-2 p-3 rounded-xl text-center outline-none focus:border-aguas-blue"/></div>

                    <div className="bg-white p-5 rounded-3xl shadow-sm border">
                        <label className="text-[10px] font-black uppercase mb-2 block">Observaciones Inventario</label>
                        {!allCheck && <p className="text-[10px] text-red-600 font-black mb-2 animate-pulse uppercase">⚠️ Faltan elementos, justifique</p>}
                        <textarea value={fd.observaciones} onChange={e=>setFd({...fd,observaciones:e.target.value})} className={`w-full border-2 p-4 rounded-2xl text-sm outline-none focus:border-aguas-blue ${!allCheck ? 'bg-red-50 border-red-400' : ''}`} rows="3"></textarea>
                    </div>
                    <button onClick={()=>onTerminado(fd)} disabled={!canSubmit} className={`w-full text-white font-black py-6 rounded-3xl shadow-xl uppercase tracking-widest active:scale-95 transition-all ${canSubmit ? 'bg-aguas-blue hover:bg-aguas-dark' : 'bg-gray-300 cursor-not-allowed'}`}>Sellar Cargos</button>
                </div>
            );
        }

        function FormularioTotalizadores({ onTerminado, prevData }) {
            const [fd, setFd] = useState({ lodos: '', biogas: '', hc1: '', hc2: '', observaciones: '' });
            const canSubmit = fd.lodos !== '' && fd.biogas !== '' && fd.hc1 !== '' && fd.hc2 !== '';

            return (
                <div className="p-4 max-w-md mx-auto space-y-6 min-h-screen pb-10 font-sans fade-in">
                    <div className="bg-[#1e293b] p-5 rounded-2xl text-white shadow-xl"><h2 className="text-lg font-black uppercase">Totalizadores (00:30)</h2></div>
                    <div className="bg-white p-5 rounded-3xl border-l-[6px] border-l-aguas-green shadow-sm border">
                        <h3 className="text-[10px] font-black text-gray-400 uppercase mb-3 border-b pb-2">Flujómetros Proceso</h3>
                        <div className="grid grid-cols-2 gap-3">
                            <div><div className="flex justify-between mb-1"><label className="text-[9px] font-black">Lodos M3</label><Fantasma valor={prevData?.m3_lodos}/></div><input type="number" step="0.1" value={fd.lodos} onChange={e=>setFd({...fd,lodos:e.target.value})} className="w-full border-2 p-3 rounded-xl text-center outline-none focus:border-aguas-blue"/></div>
                            <div><div className="flex justify-between mb-1"><label className="text-[9px] font-black">Biogás M3</label><Fantasma valor={prevData?.m3_biogas}/></div><input type="number" step="0.1" value={fd.biogas} onChange={e=>setFd({...fd,biogas:e.target.value})} className="w-full border-2 p-3 rounded-xl text-center outline-none focus:border-aguas-blue"/></div>

                    <div className="bg-white p-5 rounded-3xl border-l-[6px] border-l-amber-500 shadow-sm border">

                </div>
            );

        function FormularioGenerador({ onTerminado, prevData }) {
            const [fd, setFd] = useState({ inicio: '', fin: '', prueba_ok: true, observaciones: '' });

                    <div className="bg-white p-5 rounded-3xl border-l-[6px] border-l-gray-600 shadow-sm border">

                        <div className="grid grid-cols-2 gap-3 mb-4">
                            <div><label className="text-[9px] font-black">Nivel Inicio</label><input type="number" value={fd.inicio} onChange={e=>setFd({...fd,inicio:e.target.value})} className="w-full border-2 p-3 rounded-xl text-center text-lg outline-none focus:border-orange-500"/></div>
