<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RondaSync - PTAR Talagante</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body className="bg-gray-200">
    <div id="root"></div>

    <script type="text/babel">
        // ==========================================
        // CONFIGURACIÓN DE SUPABASE
        // ==========================================
        const SUPABASE_URL = 'https://cbvipsjpvlgyipifidyo.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_-9xy9fwszhg5RMqlilNn-A_wnK2VGCb';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const { useState, useEffect } = React;

        const Fantasma = ({ valor }) => {
            if (valor === null || valor === undefined || valor === '') return null;
            return <span className="text-[9px] bg-blue-100 text-blue-700 px-1.5 rounded font-bold">Ant: {valor}</span>;
        };

        // ==========================================
        // COMPONENTE: MULTI-FOTO UPLOADER
        // ==========================================
        function MultiFotoUploader({ idCampo, turnoId, onFotosActualizadas, titulo }) {
            const [fotos, setFotos] = useState([]);
            const [subiendoIndex, setSubiendoIndex] = useState(null);

            const manejarCaptura = (e) => {
                const archivo = e.target.files[0];
                if (!archivo || fotos.length >= 3) return;
                const nuevaFoto = { localUrl: URL.createObjectURL(archivo), realFile: archivo, remoteUrl: null };
                setFotos([...fotos, nuevaFoto]);
            };

            const subirFoto = async (index) => {
                const foto = fotos[index];
                if (!foto.realFile || foto.remoteUrl) return;
                setSubiendoIndex(index);
                const ext = foto.realFile.name.split('.').pop();
                const nombreArchivo = `${turnoId}-${idCampo}-${index}-${Date.now()}.${ext}`;

                const { error } = await supabaseClient.storage.from('inspeccion_fotos').upload(nombreArchivo, foto.realFile);
                if (error) {
                    alert("Error: " + error.message);
                } else {
                    const { data } = supabaseClient.storage.from('inspeccion_fotos').getPublicUrl(nombreArchivo);
                    const nuevasFotos = [...fotos];
                    nuevasFotos[index].remoteUrl = data.publicUrl;
                    setFotos(nuevasFotos);
                    onFotosActualizadas(idCampo, nuevasFotos.map(f => f.remoteUrl).filter(url => url !== null));
                }
                setSubiendoIndex(null);
            };

            const eliminarFoto = (index) => {
                const nuevasFotos = fotos.filter((_, i) => i !== index);
                setFotos(nuevasFotos);
                onFotosActualizadas(idCampo, nuevasFotos.map(f => f.remoteUrl).filter(url => url !== null));
            };

            return (
                <div className="mt-3 space-y-2">
                    <div className="grid grid-cols-3 gap-2">
                        {fotos.map((foto, index) => (
                            <div key={index} className="relative group">
                                <img src={foto.localUrl} className="h-24 w-full object-cover rounded-lg border-2 border-white shadow-sm" />
                                {!foto.remoteUrl && subiendoIndex !== index && (
                                    <button onClick={() => subirFoto(index)} className="absolute inset-0 bg-black/40 flex items-center justify-center rounded-lg"><span className="bg-emerald-500 text-white text-[10px] font-bold px-2 py-1 rounded shadow-lg">SUBIR</span></button>
                                )}
                                {subiendoIndex === index && (
                                    <div className="absolute inset-0 bg-white/60 flex items-center justify-center rounded-lg"><div className="w-5 h-5 border-2 border-blue-600 border-t-transparent rounded-full animate-spin"></div></div>
                                )}
                                {foto.remoteUrl && (
                                    <div className="absolute top-1 right-1 bg-emerald-500 text-white rounded-full p-0.5 shadow-md"><svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 13l4 4L19 7"></path></svg></div>
                                )}
                                <button onClick={() => eliminarFoto(index)} className="absolute -top-2 -left-2 bg-red-500 text-white rounded-full w-6 h-6 flex items-center justify-center shadow-lg font-bold">×</button>
                            </div>
                        ))}
                        {fotos.length < 3 && (
                            <label className="h-24 border-2 border-dashed border-blue-300 bg-blue-50 rounded-lg flex flex-col items-center justify-center cursor-pointer hover:bg-blue-100 transition-colors shadow-inner">
                                <span className="text-2xl text-blue-500">+</span>
                                <span className="text-[9px] font-bold text-blue-600 uppercase tracking-tighter">Foto {fotos.length + 1}</span>
                                <input type="file" accept="image/*" capture="environment" className="hidden" onChange={manejarCaptura} />
                            </label>
                        )}
                    </div>
                </div>
            );
        }

        // ==========================================
        // COMPONENTE: LOGIN
        // ==========================================
        function PantallaLogin() {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false);
            const [showPassword, setShowPassword] = useState(false);

            const manejarLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
                if (error) alert("Error de ingreso: " + error.message);
                setLoading(false);
            };

            return (
                <div className="min-h-screen bg-[#1e1e1e] flex items-center justify-center p-4 font-sans text-white">
                    <div className="bg-[#2a2a2a] w-full max-w-md rounded-2xl p-8 shadow-2xl border border-zinc-700">
                        <div className="flex items-center space-x-4 mb-8">
                            <div className="w-12 h-12 bg-amber-500 rounded-lg flex items-center justify-center p-2 shadow-lg"><span className="font-bold text-zinc-900 text-xl">RS</span></div>
                            <div><h1 className="text-2xl font-bold tracking-tight">RondaSync</h1><p className="text-xs text-zinc-400 uppercase tracking-widest">PTAR Talagante</p></div>
                        </div>
                        <h2 className="text-3xl font-bold mb-6">Bienvenido</h2>
                        <form onSubmit={manejarLogin} className="space-y-5">
                            <div><label className="block text-xs font-bold text-zinc-500 uppercase mb-2">Correo Electronico</label><input type="email" value={email} onChange={(e) => setEmail(e.target.value)} className="w-full bg-[#1e1e1e] border border-zinc-700 rounded-xl p-4 focus:border-amber-500 outline-none transition-all" required /></div>
                            <div className="relative"><label className="block text-xs font-bold text-zinc-500 uppercase mb-2">Contraseña</label><input type={showPassword ? "text" : "password"} value={password} onChange={(e) => setPassword(e.target.value)} className="w-full bg-[#1e1e1e] border border-zinc-700 rounded-xl p-4 focus:border-amber-500 outline-none transition-all" required /><button type="button" onClick={() => setShowPassword(!showPassword)} className="absolute right-4 top-11 text-zinc-500">👁️</button></div>
                            <button type="submit" disabled={loading} className="w-full bg-amber-500 hover:bg-amber-600 text-zinc-900 font-black py-4 rounded-xl uppercase tracking-widest shadow-xl transition-all">{loading ? 'Verificando...' : 'Entrar al Sistema'}</button>
                        </form>
                    </div>
                </div>
            );
        }

        // ==========================================
        // VISTAS PREVIAS (RESUMEN DINÁMICO, SCADA, RIESGOS)
        // ==========================================
        function VistaResumen({ prevValores, onComplete }) {
            const turno = prevValores?.turno;
            const gasometro = prevValores?.gasometro;

            if (!turno) {
                return (
                    <div className="p-4 max-w-md mx-auto min-h-screen font-sans">
                        <div className="bg-[#1e293b] p-4 rounded-xl text-white shadow-lg mb-6"><h2 className="text-xl font-bold">Resumen Turno Anterior</h2></div>
                        <div className="bg-gray-50 border border-gray-200 rounded-xl p-6 text-center">
                            <p className="text-sm text-gray-500 font-bold">No hay registros de turnos anteriores disponibles.</p>
                        </div>
                        <button onClick={onComplete} className="w-full bg-emerald-600 text-white font-black py-5 rounded-2xl shadow-xl mt-10 uppercase tracking-widest hover:bg-emerald-700 transition-colors">Entendido</button>
                    </div>
                );
            }

            const fechaTurno = new Date(turno.created_at).toLocaleString();
            const observaciones = gasometro?.observaciones || "Sin observaciones adicionales.";
            
            // Lógica de detección de anomalías del turno anterior
            const anomalias = [];
            if (gasometro?.estado_anclajes && gasometro.estado_anclajes !== 'Optimo') anomalias.push(`Anclajes: ${gasometro.estado_anclajes}`);
            if (gasometro?.lectura_lel_porcentaje > 0) anomalias.push(`LEL Detectado: ${gasometro.lectura_lel_porcentaje}%`);
            if (gasometro?.nivel_guarda_hidraulica && gasometro.nivel_guarda_hidraulica !== 'Nivel Normal') anomalias.push(`Guarda Hidráulica: ${gasometro.nivel_guarda_hidraulica}`);
            if (gasometro?.sopladores_condicion_mecanica && gasometro.sopladores_condicion_mecanica !== 'Operación Normal (Sin ruidos/vibración)') anomalias.push(`Sopladores: ${gasometro.sopladores_condicion_mecanica}`);
            if (gasometro?.flujo_agua_trampa === false) anomalias.push(`Trampa: Sin flujo de agua (Pérdida de sello)`);
            if (gasometro?.estado_valvula_corte === 'Sin candado de seguridad') anomalias.push(`Válvula Corte: Sin candado LOTO`);
            if (gasometro?.estado_gabinete_electrico && !gasometro.estado_gabinete_electrico.includes('Operativo')) anomalias.push(`Gabinete: ${gasometro.estado_gabinete_electrico}`);

            return (
                <div className="p-4 max-w-md mx-auto min-h-screen font-sans pb-10">
                    <div className="bg-[#1e293b] p-5 rounded-2xl text-white shadow-xl mb-6 flex items-center">
                        <span className="text-2xl mr-3">📋</span>
                        <h2 className="text-lg font-black uppercase tracking-tight">Traspaso de Turno</h2>
                    </div>

                    <div className="space-y-4">
                        {/* Info General */}
                        <div className="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 flex justify-between items-center">
                            <div>
                                <p className="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1">Operador Saliente</p>
                                <p className="text-sm font-bold text-gray-800">{turno.operador_nombre}</p>
                                <p className="text-[10px] text-gray-500 mt-1">{fechaTurno}</p>
                            </div>
                            <div className="bg-blue-50 text-blue-700 px-3 py-1 rounded-full text-xs font-black border border-blue-200">
                                {turno.tipo_turno}
                            </div>
                        </div>

                        {/* Observaciones Generales */}
                        <div className="bg-amber-50 rounded-2xl p-4 shadow-sm border border-amber-200">
                            <h3 className="text-[10px] font-black text-amber-800 uppercase tracking-widest mb-2 flex items-center"><span className="mr-2">📝</span> Observaciones del Turno</h3>
                            <p className="text-sm text-amber-900 font-medium italic">"{observaciones}"</p>
                        </div>

                        {/* Anomalías Detectadas (Solo aparece si hay fallas) */}
                        {anomalias.length > 0 && (
                            <div className="bg-red-50 rounded-2xl p-4 shadow-sm border border-red-200">
                                <h3 className="text-[10px] font-black text-red-800 uppercase tracking-widest mb-2 flex items-center"><span className="mr-2">⚠️</span> Atención Requerida (Heredado)</h3>
                                <ul className="space-y-2">
                                    {anomalias.map((anom, idx) => (
                                        <li key={idx} className="text-xs text-red-700 font-bold bg-white p-2 rounded border border-red-100">• {anom}</li>
                                    ))}
                                </ul>
                            </div>
                        )}

                        {/* Resumen SCADA Clave */}
                        <div className="bg-white rounded-2xl p-4 shadow-sm border border-gray-100">
                            <h3 className="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-3">Niveles SCADA Finales</h3>
                            <div className="grid grid-cols-2 gap-3 text-xs">
                                <div><span className="text-gray-500 block text-[9px] uppercase">Nivel Dig.</span><span className="font-bold text-gray-800">{turno.scada_dig_nivel_cm || '-'} cm</span></div>
                                <div><span className="text-gray-500 block text-[9px] uppercase">Nivel Gas.</span><span className="font-bold text-gray-800">{turno.scada_nivel_gasometro || '-'} %</span></div>
                                <div><span className="text-gray-500 block text-[9px] uppercase">Pres. Gas.</span><span className="font-bold text-gray-800">{turno.scada_presion_mbar || '-'} mbar</span></div>
                            </div>
                        </div>
                    </div>

                    <button onClick={onComplete} className="w-full bg-emerald-600 text-white font-black py-5 rounded-3xl shadow-xl mt-8 uppercase tracking-widest hover:bg-emerald-700 transition-all transform active:scale-95">Tomar Control del Turno</button>
                </div>
            );
        }

        function VistaScada({ datosGuardados, prevData, onComplete }) {
            const [scada, setScada] = useState(datosGuardados || {});
            return (
                <div className="p-4 max-w-md mx-auto space-y-4 min-h-screen pb-10 font-sans">
                    <div className="bg-[#1e293b] p-4 rounded-xl text-white shadow-lg"><h2 className="text-xl font-bold">Ingreso SCADA (WinCC)</h2></div>
                    <div className="bg-white rounded-2xl shadow-sm border border-gray-200 p-5 space-y-6">
                        <div>
                            <h4 className="text-xs font-black text-blue-600 uppercase mb-3 border-b pb-1">1. Digestor</h4>
                            <div className="grid grid-cols-3 gap-3">
                                <div><div className="flex justify-between items-center mb-1"><label className="text-[10px] text-gray-500 font-bold uppercase">Nivel (cm)</label><Fantasma valor={prevData?.scada_dig_nivel_cm} /></div><input type="number" value={scada.dig_nivel||''} onChange={e => setScada({...scada, dig_nivel: e.target.value})} className="w-full border-2 border-white shadow-sm p-3 rounded-xl text-center font-bold" /></div>
                                <div><div className="flex justify-between items-center mb-1"><label className="text-[10px] text-gray-500 font-bold uppercase">Pres. (mbar)</label><Fantasma valor={prevData?.scada_dig_presion_mbar} /></div><input type="number" value={scada.dig_presion||''} onChange={e => setScada({...scada, dig_presion: e.target.value})} className="w-full border-2 border-white shadow-sm p-3 rounded-xl text-center font-bold" /></div>
                                <div><div className="flex justify-between items-center mb-1"><label className="text-[10px] text-gray-500 font-bold uppercase">Temp (°C)</label><Fantasma valor={prevData?.scada_dig_temp_c} /></div><input type="number" value={scada.dig_temp||''} onChange={e => setScada({...scada, dig_temp: e.target.value})} className="w-full border-2 border-white shadow-sm p-3 rounded-xl text-center font-bold" /></div>
                            </div>
                        </div>
                        <div>
                            <h4 className="text-xs font-black text-amber-600 uppercase mb-3 border-b pb-1">2. Gasometro</h4>
                            <div className="grid grid-cols-2 gap-3">
                                <div><div className="flex justify-between items-center mb-1"><label className="text-[10px] text-gray-500 font-bold uppercase">Nivel (%)</label><Fantasma valor={prevData?.scada_nivel_gasometro} /></div><input type="number" value={scada.gas_nivel||''} onChange={e => setScada({...scada, gas_nivel: e.target.value})} className="w-full border-2 border-amber-100 bg-amber-50 shadow-inner p-3 rounded-xl text-center font-bold text-amber-900" /></div>
                                <div><div className="flex justify-between items-center mb-1"><label className="text-[10px] text-gray-500 font-bold uppercase">Pres. (mbar)</label><Fantasma valor={prevData?.scada_presion_mbar} /></div><input type="number" value={scada.gas_presion||''} onChange={e => setScada({...scada, gas_presion: e.target.value})} className="w-full border-2 border-amber-100 bg-amber-50 shadow-inner p-3 rounded-xl text-center font-bold text-amber-900" /></div>
                            </div>
                        </div>
                        <div>
                            <h4 className="text-xs font-black text-emerald-600 uppercase mb-3 border-b pb-1">3. Compresores y Consumos</h4>
                            <div className="grid grid-cols-2 gap-3 mb-3">
                                <div><div className="flex justify-between items-center mb-1"><label className="text-[10px] text-gray-500 font-bold uppercase">Flujo Comp. (m³/h)</label><Fantasma valor={prevData?.scada_flujo_biogas_nm3h} /></div><input type="number" value={scada.comp_flujo||''} onChange={e => setScada({...scada, comp_flujo: e.target.value})} className="w-full border-2 border-white shadow-sm p-3 rounded-xl text-center font-bold" /></div>
                                <div><div className="flex justify-between items-center mb-1"><label className="text-[10px] text-gray-500 font-bold uppercase">Pres. Imp. (mbar)</label><Fantasma valor={prevData?.scada_comp_presion_imp_mbar} /></div><input type="number" value={scada.comp_pres_imp||''} onChange={e => setScada({...scada, comp_pres_imp: e.target.value})} className="w-full border-2 border-white shadow-sm p-3 rounded-xl text-center font-bold" /></div>
                            </div>
                            <div className="grid grid-cols-2 gap-3">
                                <div><div className="flex justify-between items-center mb-1"><label className="text-[10px] text-gray-500 font-bold uppercase">Flujo Calderas</label><Fantasma valor={prevData?.scada_cald_flujo_m3h} /></div><input type="number" value={scada.cald_flujo||''} onChange={e => setScada({...scada, cald_flujo: e.target.value})} className="w-full border-2 border-white shadow-sm p-3 rounded-xl text-center font-bold" /></div>
                                <div><div className="flex justify-between items-center mb-1"><label className="text-[10px] text-gray-500 font-bold uppercase">Flujo Antorchas</label><Fantasma valor={prevData?.scada_ant_flujo_m3h} /></div><input type="number" value={scada.ant_flujo||''} onChange={e => setScada({...scada, ant_flujo: e.target.value})} className="w-full border-2 border-white shadow-sm p-3 rounded-xl text-center font-bold" /></div>
                            </div>
                        </div>
                    </div>
                    <button onClick={() => onComplete(scada)} className="w-full bg-emerald-600 text-white font-black py-5 rounded-2xl shadow-xl mt-8 uppercase tracking-widest hover:bg-emerald-700 transition-colors">Confirmar Datos SCADA</button>
                </div>
            );
        }

        function VistaRiesgos({ onComplete }) {
            const [c, setC] = useState({ epp1:false, epp2:false, epp3:false, epp4:false, ax1:false, ax2:false, ax3:false });
            const listo = c.epp1 && c.epp2 && c.epp3 && c.epp4 && c.ax1 && c.ax2 && c.ax3;
            
            return (
                <div className="p-4 max-w-md mx-auto space-y-4 min-h-screen pb-10 font-sans">
                    <div className="bg-[#1e293b] p-4 rounded-xl text-white shadow-lg"><h2 className="text-xl font-bold">Seguridad y EPP</h2></div>
                    <div className="bg-white rounded-2xl shadow-sm border p-5 space-y-3">
                        <h3 className="text-xs font-black text-gray-800 uppercase mb-4 border-b pb-2">Implementos y Equipos Obligatorios</h3>
                        <label className="flex items-center space-x-3 p-3 bg-gray-50 rounded-xl border border-gray-100 cursor-pointer"><input type="checkbox" onChange={e=>setC({...c, epp1:e.target.checked})} className="h-6 w-6 text-blue-600 rounded-lg"/> <span className="text-xs text-gray-700 leading-tight"><b className="text-gray-900 block">EPP:</b> Casco, lentes, guantes y zapatos</span></label>
                        <label className="flex items-center space-x-3 p-3 bg-gray-50 rounded-xl border border-gray-100 cursor-pointer"><input type="checkbox" onChange={e=>setC({...c, epp2:e.target.checked})} className="h-6 w-6 text-blue-600 rounded-lg"/> <span className="text-xs text-gray-700 leading-tight"><b className="text-gray-900 block">Equipos:</b> Detector multigas CH4, CO2, O2 y H2S</span></label>
                        <label className="flex items-center space-x-3 p-3 bg-gray-50 rounded-xl border border-gray-100 cursor-pointer"><input type="checkbox" onChange={e=>setC({...c, epp3:e.target.checked})} className="h-6 w-6 text-blue-600 rounded-lg"/> <span className="text-xs text-gray-700 leading-tight"><b className="text-gray-900 block">Protección:</b> Máscara para gases tóxicos</span></label>
                        <label className="flex items-center space-x-3 p-3 bg-gray-50 rounded-xl border border-gray-100 cursor-pointer"><input type="checkbox" onChange={e=>setC({...c, epp4:e.target.checked})} className="h-6 w-6 text-blue-600 rounded-lg"/> <span className="text-xs text-gray-700 leading-tight"><b className="text-gray-900 block">Artículos ATEX:</b> Tablet/Smartphone y Linterna</span></label>
                    </div>
                    <div className="bg-red-50 rounded-2xl shadow-sm border border-red-200 p-5">
                        <h3 className="text-xs font-black text-red-800 uppercase mb-3 border-b border-red-200 pb-2">Precaución Riesgo ATEX</h3>
                        <div className="space-y-2">
                            <label className="flex items-center space-x-3 p-2 bg-white rounded-lg border border-red-100 cursor-pointer"><input type="checkbox" onChange={e=>setC({...c, ax1:e.target.checked})} className="h-5 w-5 text-red-600"/> <span className="text-[11px] font-bold text-red-900">Z1: 1.5m de Guarda Hidráulica</span></label>
                            <label className="flex items-center space-x-3 p-2 bg-white rounded-lg border border-red-100 cursor-pointer"><input type="checkbox" onChange={e=>setC({...c, ax2:e.target.checked})} className="h-5 w-5 text-red-600"/> <span className="text-[11px] font-bold text-red-900">Z1: 1.0m de Válvulas y Purgas</span></label>
                            <label className="flex items-center space-x-3 p-2 bg-white rounded-lg border border-red-100 cursor-pointer"><input type="checkbox" onChange={e=>setC({...c, ax3:e.target.checked})} className="h-5 w-5 text-red-600"/> <span className="text-[11px] font-bold text-red-900">Z2: 0.35m de Bridas/Inst.</span></label>
                        </div>
                    </div>
                    <button onClick={onComplete} disabled={!listo} className={`w-full text-white font-black py-5 rounded-2xl shadow-xl mt-10 uppercase tracking-widest transition-all ${listo ? 'bg-emerald-600 hover:bg-emerald-700' : 'bg-gray-400 opacity-50 cursor-not-allowed'}`}>CONTINUAR</button>
                </div>
            );
        }

        // ==========================================
        // COMPONENTE: HUB CENTRAL (ACTUALIZADO PARA PASAR PREVVALORES)
        // ==========================================
        function HubCentral({ userEmail, prevValores, avanzarAInstalaciones }) {
            const [fechaHora, setFechaHora] = useState(new Date());
            const [turnoDetectado, setTurnoDetectado] = useState('');
            const [hubState, setHubState] = useState({ resumenOk: false, scadaData: null, riesgosOk: false, subvistaActiva: 'hub' });

            useEffect(() => {
                const timer = setInterval(() => setFechaHora(new Date()), 1000);
                const hora = new Date().getHours();
                setTurnoDetectado((hora >= 8 && hora < 20) ? '08:00 a 20:00' : '20:00 a 08:00');
                return () => clearInterval(timer);
            }, []);

            const scadaOk = hubState.scadaData !== null;
            const listoParaRonda = hubState.resumenOk && scadaOk && hubState.riesgosOk;

            if (hubState.subvistaActiva === 'resumen') return <VistaResumen prevValores={prevValores} onComplete={() => setHubState({...hubState, resumenOk: true, subvistaActiva: 'hub'})} />;
            if (hubState.subvistaActiva === 'scada') return <VistaScada datosGuardados={hubState.scadaData} prevData={prevValores?.turno} onComplete={(data) => setHubState({...hubState, scadaData: data, subvistaActiva: 'hub'})} />;
            if (hubState.subvistaActiva === 'riesgos') return <VistaRiesgos onComplete={() => setHubState({...hubState, riesgosOk: true, subvistaActiva: 'hub'})} />;

            return (
                <div className="p-4 max-w-md mx-auto min-h-screen space-y-6 font-sans">
                    <div className="bg-[#1e293b] p-6 rounded-3xl text-white shadow-xl space-y-4">
                        <div className="flex justify-between items-start border-b border-slate-700 pb-4">
                            <div><h1 className="text-2xl font-black tracking-tighter">RondaSync</h1><p className="text-[10px] text-amber-400 font-black uppercase tracking-widest">PTAR Talagante</p></div>
                            <button onClick={() => supabaseClient.auth.signOut()} className="text-[10px] font-black bg-red-500/20 text-red-300 px-3 py-1.5 rounded-full border border-red-500/30">SALIR</button>
                        </div>
                        <div className="flex justify-between items-end">
                            <div><p className="text-[10px] text-slate-400 font-bold uppercase mb-1">Operador</p><p className="text-sm font-bold">{userEmail}</p></div>
                            <div className="text-right"><p className="text-xs font-bold text-slate-300">{fechaHora.toLocaleDateString()}</p><p className="text-xl font-light text-white">{fechaHora.toLocaleTimeString()}</p></div>
                        </div>
                    </div>
                    <div className="bg-white p-5 rounded-2xl shadow-sm border border-gray-200 flex items-center justify-between">
                        <div><p className="text-[10px] text-gray-500 font-black uppercase mb-1">Turno de Operacion</p><select value={turnoDetectado} onChange={(e) => setTurnoDetectado(e.target.value)} className="font-black text-lg text-gray-800 bg-transparent outline-none cursor-pointer"><option value="08:00 a 20:00">08:00 a 20:00</option><option value="20:00 a 08:00">20:00 a 08:00</option></select></div>
                        <div className="bg-emerald-100 text-emerald-700 px-3 py-1 rounded-full text-[10px] font-black uppercase">Auto</div>
                    </div>
                    <div className="space-y-3">
                        <button onClick={() => setHubState({...hubState, subvistaActiva: 'resumen'})} className={`w-full flex justify-between items-center p-5 rounded-2xl border-2 transition-all ${hubState.resumenOk ? 'bg-emerald-50 border-emerald-500 shadow-inner' : 'bg-white border-gray-100 shadow-sm'}`}><div className="flex items-center space-x-4"><span className="text-2xl">{hubState.resumenOk ? '✅' : '📋'}</span><span className={`font-black text-sm uppercase ${hubState.resumenOk ? 'text-emerald-800' : 'text-gray-700'}`}>Traspaso de Turno</span></div></button>
                        <button onClick={() => setHubState({...hubState, subvistaActiva: 'scada'})} className={`w-full flex justify-between items-center p-5 rounded-2xl border-2 transition-all ${scadaOk ? 'bg-emerald-50 border-emerald-500 shadow-inner' : 'bg-white border-gray-100 shadow-sm'}`}><div className="flex items-center space-x-4"><span className="text-2xl">{scadaOk ? '✅' : '🖥️'}</span><span className={`font-black text-sm uppercase ${scadaOk ? 'text-emerald-800' : 'text-gray-700'}`}>Datos SCADA</span></div></button>
                        <button onClick={() => setHubState({...hubState, subvistaActiva: 'riesgos'})} className={`w-full flex justify-between items-center p-5 rounded-2xl border-2 transition-all ${hubState.riesgosOk ? 'bg-emerald-50 border-emerald-500 shadow-inner' : 'bg-white border-gray-100 shadow-sm'}`}><div className="flex items-center space-x-4"><span className="text-2xl">{hubState.riesgosOk ? '✅' : '🛑'}</span><span className={`font-black text-sm uppercase ${hubState.riesgosOk ? 'text-emerald-800' : 'text-gray-700'}`}>Seguridad y EPP</span></div></button>
                    </div>
                    <div className="pt-6">
                        <button onClick={() => avanzarAInstalaciones(turnoDetectado, hubState.scadaData)} disabled={!listoParaRonda} className={`w-full font-black py-6 rounded-3xl shadow-2xl text-lg uppercase tracking-[0.2em] transition-all transform active:scale-95 ${listoParaRonda ? 'bg-amber-500 text-zinc-900' : 'bg-gray-200 text-gray-400 cursor-not-allowed'}`}>COMENZAR RONDA</button>
                    </div>
                </div>
            );
        }

        // ==========================================
        // COMPONENTE: MENÚ DE INSTALACIONES
        // ==========================================
        function MenuInstalaciones({ areasDone, irAGasometro, revisarYFinalizar }) {
            const urlDigestor = "https://cbvipsjpvlgyipifidyo.supabase.co/storage/v1/object/public/inspeccion_fotos/Digestor.jpg";
            const urlGasometro = "https://cbvipsjpvlgyipifidyo.supabase.co/storage/v1/object/public/inspeccion_fotos/Gasometro%20vista%20general.jpeg";
            const urlCompresores = "https://cbvipsjpvlgyipifidyo.supabase.co/storage/v1/object/public/inspeccion_fotos/Sala%20de%20Compresores.jpg";
            const urlCalderas = "https://cbvipsjpvlgyipifidyo.supabase.co/storage/v1/object/public/inspeccion_fotos/Sala%20de%20Calderas.jpg";
            const urlAntorchas = "https://cbvipsjpvlgyipifidyo.supabase.co/storage/v1/object/public/inspeccion_fotos/Antorchas.jpeg";

            return (
                <div className="p-4 max-w-md mx-auto min-h-screen space-y-6 font-sans bg-gray-50">
                    <div className="bg-[#1e293b] p-4 rounded-2xl text-white shadow-xl flex items-center justify-between">
                        <h2 className="text-lg font-black uppercase tracking-tight">Ronda en Curso</h2>
                        <span className="bg-red-500 text-white text-[10px] font-black px-3 py-1 rounded-full animate-pulse shadow-lg uppercase">En Terreno</span>
                    </div>
                    <div>
                        <h3 className="text-[10px] font-black text-gray-400 uppercase mb-4 px-2 tracking-[0.2em]">Instalaciones PTAR</h3>
                        <div className="grid grid-cols-2 gap-4">
                            <button disabled className="bg-white p-2 rounded-3xl border-2 border-gray-100 opacity-60 text-left relative overflow-hidden"><div className="h-28 w-full rounded-2xl overflow-hidden mb-2"><img src={urlDigestor} className="w-full h-full object-cover grayscale" /></div><span className="font-black text-xs px-2 text-gray-500 uppercase">Digestor</span></button>
                            <button onClick={irAGasometro} className={`p-2 rounded-3xl border-2 transition-all text-left relative overflow-hidden shadow-lg ${areasDone.gasometro ? 'bg-emerald-50 border-emerald-500' : 'bg-white border-blue-400 hover:scale-105'}`}>{areasDone.gasometro && <div className="absolute top-4 right-4 z-10 bg-emerald-500 text-white rounded-full h-8 w-8 flex items-center justify-center shadow-xl border-2 border-white font-black">✓</div>}<div className="h-28 w-full rounded-2xl overflow-hidden mb-2 shadow-inner"><img src={urlGasometro} className="w-full h-full object-cover" /></div><span className={`font-black text-xs px-2 uppercase ${areasDone.gasometro ? 'text-emerald-800' : 'text-blue-900'}`}>Gasómetro</span></button>
                            <button disabled className="bg-white p-2 rounded-3xl border-2 border-gray-100 opacity-60 text-left relative overflow-hidden"><div className="h-28 w-full rounded-2xl overflow-hidden mb-2"><img src={urlCompresores} className="w-full h-full object-cover grayscale" /></div><span className="font-black text-xs px-2 text-gray-500 uppercase">Compresores</span></button>
                            <button disabled className="bg-white p-2 rounded-3xl border-2 border-gray-100 opacity-60 text-left relative overflow-hidden"><div className="h-28 w-full rounded-2xl overflow-hidden mb-2"><img src={urlCalderas} className="w-full h-full object-cover grayscale" /></div><span className="font-black text-xs px-2 text-gray-500 uppercase">Calderas</span></button>
                            <button disabled className="bg-white p-2 rounded-3xl border-2 border-gray-100 opacity-60 text-left relative overflow-hidden col-span-2"><div className="h-28 w-full rounded-2xl overflow-hidden mb-2"><img src={urlAntorchas} className="w-full h-full object-cover grayscale" /></div><span className="font-black text-xs px-2 text-gray-500 uppercase">Antorchas 1 y 2</span></button>
                        </div>
                    </div>
                    <div className="pt-10 pb-10 border-t border-gray-200">
                        <button onClick={revisarYFinalizar} className="w-full bg-zinc-900 text-white font-black py-5 rounded-3xl shadow-2xl uppercase tracking-widest transition-all transform active:scale-95">REVISAR Y FINALIZAR</button>
                    </div>
                </div>
            );
        }

        // ==========================================
        // COMPONENTE: RESUMEN FINAL
        // ==========================================
        function VistaResumenFinal({ turnoContexto, datosGasometro, setDatosGasometro, onConfirm, onBack, loading }) {
            const actualizarObservacion = (e) => {
                if(datosGasometro) {
                    setDatosGasometro({...datosGasometro, observaciones: e.target.value});
                }
            };

            return (
                <div className="p-4 max-w-md mx-auto min-h-screen space-y-6 font-sans bg-gray-100 pb-20">
                    <div className="bg-[#1e293b] p-5 rounded-2xl text-white shadow-xl flex items-center sticky top-0 z-20">
                        <span className="text-2xl mr-3">📋</span>
                        <h2 className="text-lg font-black uppercase tracking-tight">Confirmación de Ronda</h2>
                    </div>

                    <p className="text-xs text-gray-500 font-medium px-2">Revise detalladamente los datos registrados. Puede editar las observaciones generales antes de firmar el reporte.</p>

                    <div className="bg-white p-4 rounded-3xl shadow-sm border border-gray-200">
                        <h3 className="text-[10px] font-black text-blue-600 uppercase tracking-widest border-b pb-2 mb-3">Resumen SCADA</h3>
                        <div className="grid grid-cols-2 gap-y-3 text-xs">
                            <div className="text-gray-500">Nivel Dig.: <b className="text-gray-800">{turnoContexto?.scada?.dig_nivel || '-'} cm</b></div>
                            <div className="text-gray-500">Pres. Dig.: <b className="text-gray-800">{turnoContexto?.scada?.dig_presion || '-'} mbar</b></div>
                            <div className="text-gray-500">Nivel Gas.: <b className="text-gray-800">{turnoContexto?.scada?.gas_nivel || '-'} %</b></div>
                            <div className="text-gray-500">Pres. Gas.: <b className="text-gray-800">{turnoContexto?.scada?.gas_presion || '-'} mbar</b></div>
                            <div className="text-gray-500">Flujo Comp.: <b className="text-gray-800">{turnoContexto?.scada?.comp_flujo || '-'} m3/h</b></div>
                        </div>
                    </div>

                    {datosGasometro ? (
                        <div className="bg-white p-4 rounded-3xl shadow-sm border border-gray-200">
                            <h3 className="text-[10px] font-black text-emerald-600 uppercase tracking-widest border-b pb-2 mb-3">Terreno: Gasómetro</h3>
                            <div className="space-y-2 text-xs">
                                <div className="flex justify-between border-b border-gray-50 pb-1"><span className="text-gray-500">Altura:</span> <b className="text-gray-800">{datosGasometro.altura} m</b></div>
                                <div className="flex justify-between border-b border-gray-50 pb-1"><span className="text-gray-500">Presión:</span> <b className="text-gray-800">{datosGasometro.presion} mbar</b></div>
                                <div className="flex justify-between border-b border-gray-50 pb-1"><span className="text-gray-500">LEL Max:</span> <b className={parseFloat(datosGasometro.lel) > 0 ? "text-red-600" : "text-gray-800"}>{datosGasometro.lel} %</b></div>
                                <div className="flex justify-between border-b border-gray-50 pb-1"><span className="text-gray-500">Guarda Hidr.:</span> <b className="text-gray-800">{datosGasometro.guarda}</b></div>
                                <div className="flex justify-between border-b border-gray-50 pb-1"><span className="text-gray-500">Soplador 1:</span> <b className="text-gray-800">{datosGasometro.soplador_1}</b></div>
                                <div className="flex justify-between border-b border-gray-50 pb-1"><span className="text-gray-500">Soplador 2:</span> <b className="text-gray-800">{datosGasometro.soplador_2}</b></div>
                                <div className="flex justify-between border-b border-gray-50 pb-1"><span className="text-gray-500">Agua Trampa:</span> <b className={datosGasometro.agua_trampa ? "text-emerald-600" : "text-red-600"}>{datosGasometro.agua_trampa ? 'OK' : 'Falla'}</b></div>
                                <div className="flex justify-between"><span className="text-gray-500">Tablero Eléctrico:</span> <b className={datosGasometro.gabinete.includes('Operativo') ? "text-emerald-600 truncate max-w-[150px]" : "text-red-600 truncate max-w-[150px]"}>{datosGasometro.gabinete}</b></div>
                            </div>
                            
                            <div className="mt-5">
                                <label className="text-[10px] text-gray-500 font-black uppercase mb-2 block tracking-widest">Observaciones y Anomalias (Editable)</label>
                                <textarea 
                                    value={datosGasometro.observaciones} 
                                    onChange={actualizarObservacion} 
                                    className="w-full border-2 border-amber-200 bg-amber-50 p-4 rounded-2xl text-sm font-medium text-amber-900 focus:outline-none focus:border-amber-400" 
                                    rows="4" 
                                    placeholder="Agregue detalles finales de la ronda aquí..."
                                ></textarea>
                            </div>
                        </div>
                    ) : (
                        <div className="bg-red-50 p-4 rounded-3xl shadow-sm border border-red-200">
                            <h3 className="text-[10px] font-black text-red-600 uppercase tracking-widest mb-1">Terreno: Gasómetro</h3>
                            <p className="text-xs text-red-800 font-medium">No se realizó el registro de terreno en este módulo.</p>
                        </div>
                    )}

                    <div className="space-y-3 pt-4">
                        <button onClick={onConfirm} disabled={loading} className="w-full bg-emerald-600 text-white font-black py-6 rounded-3xl shadow-xl uppercase tracking-[0.1em] transition-all transform active:scale-95">
                            {loading ? 'FIRMANDO...' : 'FIRMADO Y CONFORME - GUARDAR'}
                        </button>
                        <button onClick={onBack} disabled={loading} className="w-full bg-gray-300 text-gray-700 font-black py-4 rounded-3xl uppercase tracking-widest transition-all">
                            Volver y Editar
                        </button>
                    </div>
                </div>
            );
        }

        // ==========================================
        // FORMULARIO GASÓMETRO
        // ==========================================
        function FormularioGasometro({ turnoId, prevData, listaFallas, listaEstadosSopladores, onTerminado }) {
            const [fd, setFd] = useState({ 
                anclajes: 'Optimo', altura: '', presion: '', lel: '', guarda: 'Nivel Normal', 
                soplador_1: 'Stand-by', soplador_2: 'Stand-by', condicion_sopladores: 'Operación Normal (Sin ruidos/vibración)',
                agua_trampa: true, valvula_corte: 'Abierta (Candado puesto)', 
                gabinete: 'Operativo (Luces normales, cerrado)', observaciones: '' 
            });
            
            const [fotos, setFotos] = useState({ 
                anclaje: [], altura: [], presion: [], lel: [], guarda: [], sopladores: [], trampa: [], gabinete: [] 
            });

            const manejarFotos = (campo, urls) => setFotos(prev => ({ ...prev, [campo]: urls }));

            const p = parseFloat(fd.presion); 
            const h = parseFloat(fd.altura); 
            const lel = parseFloat(fd.lel);
            
            const alarmaAltura = h > 10.1;
            const alarmaPresion = p >= 25;
            const alarmaLel = lel > 0;
            
            const requiresObservation = alarmaLel || fd.guarda !== 'Nivel Normal' || fd.anclajes !== 'Optimo' || fd.condicion_sopladores !== 'Operación Normal (Sin ruidos/vibración)' || !fd.agua_trampa || fd.valvula_corte === 'Sin candado de seguridad' || fd.gabinete !== 'Operativo (Luces normales, cerrado)' || alarmaAltura || alarmaPresion;
            const observationMissing = requiresObservation && fd.observaciones.trim() === '';
            
            const fotosCompletas = Object.values(fotos).every(arr => arr && arr.length > 0);
            const datosCompletos = fd.altura !== '' && fd.presion !== '' && fd.lel !== '';
            
            const canSubmit = fotosCompletas && datosCompletos && !observationMissing;

            const fallbackFallas = [
                { id: 'f1', grupo: 'Fugas', descripcion: 'Fuga de biogas por perno de anclaje' },
                { id: 'f2', grupo: 'Fugas', descripcion: 'Fuga de biogas por linea de brida/flange' },
                { id: 'f3', grupo: 'Fugas', descripcion: 'Fuga de aire entre membranas (base exterior)' },
                { id: 'm1', grupo: 'Mecanicos', descripcion: 'Rodon de membrana montado o mordido' },
                { id: 'm2', grupo: 'Mecanicos', descripcion: 'Doblez o pliegue anormal en membrana' },
                { id: 'm3', grupo: 'Mecanicos', descripcion: 'Pernos sueltos, cortados o faltantes' },
                { id: 'm4', grupo: 'Mecanicos', descripcion: 'Corrosion severa en pernos o flanges' },
                { id: 'o1', grupo: 'Otros', descripcion: 'Otra anomalia (Detallar en observaciones)' }
            ];

            const fallbackEstados = [
                { id: 'e1', descripcion: 'Operación Normal (Sin ruidos/vibración)' },
                { id: 'e2', descripcion: 'Vibración leve detectada' },
                { id: 'e3', descripcion: 'Ruido anormal en rodamientos' },
                { id: 'e4', descripcion: 'Filtro de aire requiere limpieza/cambio' },
                { id: 'e5', descripcion: 'Fuga de aire en conexión flexible' },
                { id: 'e6', descripcion: 'Falla total / Motor bloqueado' }
            ];

            let fallasAUsar = fallbackFallas;
            if (Array.isArray(listaFallas) && listaFallas.length > 0) fallasAUsar = listaFallas;

            let estadosAUsar = fallbackEstados;
            if (Array.isArray(listaEstadosSopladores) && listaEstadosSopladores.length > 0) estadosAUsar = listaEstadosSopladores;

            const fallasAgrupadas = fallasAUsar.reduce((acc, falla) => {
                if (!acc[falla.grupo]) acc[falla.grupo] = [];
                acc[falla.grupo].push(falla);
                return acc;
            }, {});

            return (
                <div className="p-4 max-w-md mx-auto space-y-6 min-h-screen pb-10 bg-gray-100 font-sans">
                    <div className="bg-[#1e293b] p-5 rounded-2xl text-white shadow-xl flex items-center sticky top-0 z-20">
                        <span className="text-2xl mr-3">🏗️</span>
                        <h2 className="text-lg font-black uppercase tracking-tight">Ronda Gasometro</h2>
                    </div>
                    
                    <div className="bg-white p-5 rounded-3xl border-l-[6px] border-l-blue-500 shadow-md">
                        <h3 className="text-[10px] font-black text-gray-400 uppercase mb-3 tracking-widest">PC-1: Membranas y Anclaje Base</h3>
                        <select onChange={e=>setFd({...fd, anclajes:e.target.value})} className={`w-full border-2 p-3 rounded-xl font-bold text-sm mb-2 transition-colors ${fd.anclajes !== 'Optimo' ? 'bg-yellow-50 border-yellow-300 text-yellow-800' : 'bg-gray-50 border-gray-100'}`}>
                            <option value="Optimo">✓ Estado Óptimo</option>
                            {Object.keys(fallasAgrupadas).map(grupo => (
                                <optgroup key={grupo} label={`⚠️ Falla: ${grupo}`}>
                                    {fallasAgrupadas[grupo].map(falla => (
                                        <option key={falla.id} value={falla.descripcion}>{falla.descripcion}</option>
                                    ))}
                                </optgroup>
                            ))}
                        </select>
                        <MultiFotoUploader idCampo="anclaje" turnoId={turnoId} onFotosActualizadas={manejarFotos} titulo="Fotos de Base, Pernos y Lonas" />
                    </div>

                    <div className="bg-white p-5 rounded-3xl border-l-[6px] border-l-blue-500 shadow-md space-y-8">
                        <h3 className="text-[10px] font-black text-gray-400 uppercase tracking-widest border-b pb-2">PC-2: Lecturas Medidores Gasómetro</h3>
                        
                        <div className={`p-4 rounded-2xl border-2 transition-all ${alarmaAltura ? 'bg-red-50 border-red-500' : 'bg-gray-50 border-gray-100'}`}>
                            <div className="flex justify-between items-center mb-2"><label className={`text-[10px] font-black uppercase ${alarmaAltura ? 'text-red-700' : 'text-gray-600'}`}>Altura Membrana Interna (m)</label><Fantasma valor={prevData?.altura_interna_m} /></div>
                            <input type="number" step="0.01" onChange={e=>setFd({...fd, altura:e.target.value})} className={`w-full border-2 p-4 rounded-xl text-center font-black text-xl mb-1 ${alarmaAltura ? 'bg-red-100 border-red-500 text-red-900' : 'border-white shadow-sm bg-white'}`}/>
                            {alarmaAltura && <p className="text-red-600 text-[10px] font-black mb-3 text-center animate-pulse tracking-widest">⚠️ ALARMA: Nivel Alto</p>}
                            <MultiFotoUploader idCampo="altura" turnoId={turnoId} onFotosActualizadas={manejarFotos} titulo="Fotos de Cinta Métrica / Lona" />
                        </div>
                        
                        <div className={`p-4 rounded-2xl border-2 transition-all ${alarmaPresion ? 'bg-red-50 border-red-500' : 'bg-gray-50 border-gray-100'}`}>
                            <div className="flex justify-between items-center mb-2"><label className={`text-[10px] font-black uppercase ${alarmaPresion ? 'text-red-700' : 'text-gray-600'}`}>Presión Intermembranas mbar</label><Fantasma valor={prevData?.presion_inter_membrana_mbar} /></div>
                            <input type="number" step="0.1" onChange={e=>setFd({...fd, presion:e.target.value})} className={`w-full border-2 p-4 rounded-xl text-center font-black text-xl mb-1 ${alarmaPresion ? 'bg-red-100 border-red-500 text-red-900' : 'border-white shadow-sm bg-white'}`}/>
                            {alarmaPresion && <p className="text-red-600 text-[10px] font-black mb-3 text-center animate-pulse tracking-widest">⚠️ ALARMA: Sobrepresión</p>}
                            <MultiFotoUploader idCampo="presion" turnoId={turnoId} onFotosActualizadas={manejarFotos} titulo="Fotos de Manómetro en U" />
                        </div>
                        
                        <div className={`p-4 rounded-2xl border-2 transition-all ${alarmaLel ? 'bg-red-50 border-red-500' : 'bg-gray-50 border-gray-100'}`}>
                            <div className="flex justify-between items-center mb-2"><label className={`text-[10px] font-black uppercase ${alarmaLel ? 'text-red-700' : 'text-gray-600'}`}>Lectura LEL Máxima (%)</label><Fantasma valor={prevData?.lectura_lel_porcentaje} /></div>
                            <input type="number" step="0.1" min="0" onKeyDown={(e) => e.key === '-' && e.preventDefault()} onChange={e=>{const val = Math.max(0, parseFloat(e.target.value) || 0); setFd({...fd, lel:e.target.value === '' ? '' : val})}} value={fd.lel} className={`w-full border-2 p-4 rounded-xl text-center font-black text-xl mb-1 ${alarmaLel ? 'bg-red-100 border-red-500 text-red-900' : 'border-white shadow-sm bg-white'}`}/>
                            {alarmaLel && <p className="text-red-600 text-[10px] font-black mb-3 text-center animate-pulse tracking-widest">⚠️ ALARMA: Fuga LEL Detectada</p>}
                            <MultiFotoUploader idCampo="lel" turnoId={turnoId} onFotosActualizadas={manejarFotos} titulo="Fotos de Pantalla Detector LEL" />
                        </div>
                    </div>

                    <div className="bg-white p-5 rounded-3xl border-l-[6px] border-l-blue-500 shadow-md">
                        <h3 className="text-[10px] font-black text-gray-400 uppercase mb-3 tracking-widest">PC-3: Guarda Hidráulica</h3>
                        <div className="flex justify-between items-center mb-2"><label className="text-xs text-gray-500 font-bold uppercase">Nivel en Visor</label><Fantasma valor={prevData?.nivel_guarda_hidraulica} /></div>
                        <select onChange={e=>setFd({...fd, guarda:e.target.value})} className={`w-full border-2 p-4 rounded-xl font-bold text-sm mb-2 transition-colors ${fd.guarda !== 'Nivel Normal' ? 'bg-red-50 border-red-300 text-red-800' : 'bg-gray-50 border-gray-100'}`}>
                            <option>Nivel Normal</option><option>Bajo (Perdida de sello)</option><option>Rebalse</option>
                        </select>
                        <MultiFotoUploader idCampo="guarda" turnoId={turnoId} onFotosActualizadas={manejarFotos} titulo="Fotos de Visor de Nivel" />
                    </div>

                    <div className="bg-white p-5 rounded-3xl border-l-[6px] border-l-blue-500 shadow-md">
                        <h3 className="text-[10px] font-black text-gray-400 uppercase mb-4 tracking-widest border-b pb-2">PC-4: Inyeccion de Aire</h3>
                        <div className="grid grid-cols-2 gap-3 mb-4">
                            <div><label className="text-[9px] text-gray-500 font-black uppercase mb-1 block">Soplador 1</label><select onChange={e=>setFd({...fd, soplador_1: e.target.value})} className="w-full border-2 border-gray-50 bg-gray-50 p-3 rounded-xl text-xs font-black"><option>Stand-by</option><option>Operativo</option><option>Fuera de Servicio</option></select></div>
                            <div><label className="text-[9px] text-gray-500 font-black uppercase mb-1 block">Soplador 2</label><select onChange={e=>setFd({...fd, soplador_2: e.target.value})} className="w-full border-2 border-gray-50 bg-gray-50 p-3 rounded-xl text-xs font-black"><option>Stand-by</option><option>Operativo</option><option>Fuera de Servicio</option></select></div>
                        </div>
                        <div className="mb-4"><label className="text-[9px] text-gray-500 font-black uppercase mb-1 block">Condición Mecánica</label><select onChange={e=>setFd({...fd, condicion_sopladores: e.target.value})} className={`w-full border-2 p-4 rounded-xl text-xs font-black transition-colors ${fd.condicion_sopladores !== 'Operación Normal (Sin ruidos/vibración)' ? 'bg-red-50 border-red-300 text-red-800' : 'bg-gray-50 border-gray-50'}`}>{estadosAUsar.map(estado => <option key={estado.id} value={estado.descripcion}>{estado.descripcion}</option>)}</select></div>
                        <MultiFotoUploader idCampo="sopladores" turnoId={turnoId} onFotosActualizadas={manejarFotos} titulo="Fotos Sopladores/Damper" />
                    </div>

                    <div className="bg-white p-5 rounded-3xl border-l-[6px] border-l-blue-500 shadow-md">
                        <h3 className="text-[10px] font-black text-gray-400 uppercase mb-3 tracking-widest">PC-5: Linea de Biogas</h3>
                        <label className={`flex items-center space-x-3 p-4 rounded-2xl border-2 mb-4 transition-all ${fd.agua_trampa ? 'bg-gray-50 border-gray-100' : 'bg-red-50 border-red-300 shadow-inner'}`}><input type="checkbox" defaultChecked onChange={e=>setFd({...fd, agua_trampa: e.target.checked})} className="h-6 w-6 text-blue-600 rounded-lg" /><span className={`text-xs font-black uppercase ${fd.agua_trampa ? 'text-gray-700' : 'text-red-700'}`}>Agua constante OK</span></label>
                        <div className="mb-2"><label className="text-[9px] text-gray-500 font-black uppercase mb-1 block">Valvula de Corte</label><select onChange={e=>setFd({...fd, valvula_corte:e.target.value})} className={`w-full border-2 p-4 rounded-xl font-black text-xs ${fd.valvula_corte === 'Sin candado de seguridad' ? 'bg-red-100 border-red-400 text-red-800' : 'bg-gray-50 border-gray-50'}`}><option>Abierta (Candado puesto)</option><option>Cerrada (Candado puesto)</option><option>Sin candado de seguridad</option></select></div>
                        <MultiFotoUploader idCampo="trampa" turnoId={turnoId} onFotosActualizadas={manejarFotos} titulo="Fotos Trampa y Válvula" />
                    </div>

                    <div className="bg-white p-5 rounded-3xl border-l-[6px] border-l-blue-500 shadow-md">
                        <h3 className="text-[10px] font-black text-gray-400 uppercase mb-3 tracking-widest">PC-6: Gabinete de Control Eléctrico</h3>
                        <div className="mb-2"><label className="text-[9px] text-gray-500 font-black uppercase mb-1 block">Estado del Tablero</label>
                            <select onChange={e=>setFd({...fd, gabinete:e.target.value})} className={`w-full border-2 p-4 rounded-xl font-black text-xs ${fd.gabinete !== 'Operativo (Luces normales, cerrado)' ? 'bg-red-50 border-red-300 text-red-800' : 'bg-gray-50 border-gray-100'}`}>
                                <option>Operativo (Luces normales, cerrado)</option>
                                <option>Falla: Luz de alarma encendida en panel</option>
                                <option>Falla: Selector en manual o desconectado</option>
                                <option>Falla: Daño físico o puerta abierta</option>
                                <option>Falla: Alta temperatura u olor a quemado</option>
                            </select>
                        </div>
                        <MultiFotoUploader idCampo="gabinete" turnoId={turnoId} onFotosActualizadas={manejarFotos} titulo="Fotos del Panel / Instrumentos" />
                    </div>

                    <div className="bg-white p-5 rounded-3xl shadow-md border border-gray-100">
                         <label className="text-[10px] text-gray-500 font-black uppercase mb-2 block tracking-widest">Observaciones Generales</label>
                         {observationMissing && <p className="text-[10px] text-red-600 font-black mb-2 animate-pulse uppercase">⚠️ Registro de observación obligatorio (Alarmas o Fallas activas)</p>}
                         <textarea onChange={e=>setFd({...fd, observaciones:e.target.value})} className={`w-full border-2 p-4 rounded-2xl text-sm font-medium transition-all ${observationMissing ? 'bg-red-50 border-red-400 shadow-inner' : 'bg-gray-50 border-gray-50'}`} rows="4" placeholder="Justifique alarmas LEL, niveles críticos, daños o fallas eléctricas..."></textarea>
                    </div>

                    {!fotosCompletas && <p className="text-center text-[10px] text-red-600 font-black uppercase tracking-tighter pt-4 animate-bounce">Mínimo 1 fotografía por cada PC (Son 8 Puntos) para finalizar</p>}
                    
                    <button onClick={() => onTerminado(fd, fotos)} disabled={!canSubmit} className={`w-full text-white font-black py-6 rounded-3xl shadow-2xl mt-6 uppercase tracking-[0.2em] transition-all transform active:scale-95 ${canSubmit ? 'bg-blue-600 hover:bg-blue-700' : 'bg-gray-300 text-gray-400 cursor-not-allowed'}`}>Aceptar y Volver</button>
                </div>
            );
        }

        // ==========================================
        // APP PRINCIPAL
        // ==========================================
        function App() {
            const [user, setUser] = useState(null);
            const [authChecking, setAuthChecking] = useState(true);
            const [pantallaActiva, setPantallaActiva] = useState('hub');
            const [turnoContexto, setTurnoContexto] = useState({ shift: '', scada: null, turnoIdBd: null });
            const [areasStatus, setAreasStatus] = useState({ gasometro: false });
            const [datosGasometroTemp, setDatosGasometroTemp] = useState(null);
            const [fotosGasometroTemp, setFotosGasometroTemp] = useState(null);
            const [isSavingDb, setIsSavingDb] = useState(false);
            const [valoresAnteriores, setValoresAnteriores] = useState({ turno: null, gasometro: null });
            const [listaFallas, setListaFallas] = useState([]);
            const [listaEstadosSopladores, setListaEstadosSopladores] = useState([]);

            const cargarMemoriaOperativa = async () => {
                try {
                    const { data: turnos } = await supabaseClient.from('registro_turnos').select('*').order('created_at', { ascending: false }).limit(1);
                    const { data: gasometros } = await supabaseClient.from('inspeccion_gasometro').select('*').order('created_at', { ascending: false }).limit(1);
                    setValoresAnteriores({ turno: turnos?.[0] || null, gasometro: gasometros?.[0] || null });
                } catch (error) { console.log("Offline"); }
            };

            const cargarCatalogos = async () => {
                try {
                    const { data: f } = await supabaseClient.from('catalogo_fallas_gasometro').select('*').order('grupo');
                    const { data: s } = await supabaseClient.from('catalogo_estados_sopladores').select('*');
                    if (f) setListaFallas(f);
                    if (s) setListaEstadosSopladores(s);
                } catch (error) { console.log("Offline"); }
            };

            useEffect(() => {
                supabaseClient.auth.getSession().then(({ data: { session } }) => {
                    setUser(session?.user ?? null);
                    if(session?.user) { cargarMemoriaOperativa(); cargarCatalogos(); }
                    setAuthChecking(false);
                });
                const { data: { subscription } } = supabaseClient.auth.onAuthStateChange((_event, session) => {
                    setUser(session?.user ?? null);
                    if(session?.user) { cargarMemoriaOperativa(); cargarCatalogos(); }
                });
                return () => subscription.unsubscribe();
            }, []);

            if (authChecking) return <div className="min-h-screen bg-[#1e1e1e]"></div>;
            if (!user) return <PantallaLogin />;

            const manejarArranqueRonda = async (shift, scada) => {
                setTurnoContexto({ shift, scada, turnoIdBd: 'Temp-' + Date.now() });
                setPantallaActiva('instalaciones');
            };

            const abrirResumen = () => setPantallaActiva('resumen_final');
            const volverAInstalaciones = () => setPantallaActiva('instalaciones');

            const manejarFinalizacionTotal = async () => {
                setIsSavingDb(true);
                try {
                    const { data: turnoData, error: errT } = await supabaseClient.from('registro_turnos').insert([{
                        operador_nombre: user.email, tipo_turno: turnoContexto.shift,
                        scada_nivel_gasometro: turnoContexto.scada.gas_nivel || null, scada_presion_mbar: turnoContexto.scada.gas_presion || null,
                        scada_flujo_biogas_nm3h: turnoContexto.scada.comp_flujo || null, scada_dig_nivel_cm: turnoContexto.scada.dig_nivel || null,
                        scada_dig_presion_mbar: turnoContexto.scada.dig_presion || null, scada_dig_temp_c: turnoContexto.scada.dig_temp || null,
                        scada_comp_presion_imp_mbar: turnoContexto.scada.comp_pres_imp || null, scada_cald_flujo_m3h: turnoContexto.scada.cald_flujo || null,
                        scada_ant_flujo_m3h: turnoContexto.scada.ant_flujo || null, atex_confirmado: true, estado_ronda: 'Completada', hora_fin: new Date()
                    }]).select();

                    if (!errT && areasStatus.gasometro) {
                        await supabaseClient.from('inspeccion_gasometro').insert([{
                            turno_id: turnoData[0].id, estado_anclajes: datosGasometroTemp.anclajes,
                            altura_interna_m: datosGasometroTemp.altura || null, presion_inter_membrana_mbar: datosGasometroTemp.presion || null, 
                            lectura_lel_porcentaje: datosGasometroTemp.lel || null, nivel_guarda_hidraulica: datosGasometroTemp.guarda,
                            soplador_1_estado: datosGasometroTemp.soplador_1, soplador_2_estado: datosGasometroTemp.soplador_2, 
                            sopladores_condicion_mecanica: datosGasometroTemp.condicion_sopladores, 
                            flujo_agua_trampa: datosGasometroTemp.agua_trampa, estado_valvula_corte: datosGasometroTemp.valvula_corte,
                            estado_gabinete_electrico: datosGasometroTemp.gabinete, observaciones: datosGasometroTemp.observaciones,
                            foto_anclaje: fotosGasometroTemp.anclaje, foto_altura: fotosGasometroTemp.altura,
                            foto_presion: fotosGasometroTemp.presion, foto_lel: fotosGasometroTemp.lel,
                            foto_guarda: fotosGasometroTemp.guarda, foto_sopladores: fotosGasometroTemp.sopladores,
                            foto_trampa: fotosGasometroTemp.trampa, foto_gabinete: fotosGasometroTemp.gabinete
                        }]);
                    }
                    setIsSavingDb(false);
                    setPantallaActiva('fin');
                } catch (error) { alert("Error: " + error.message); setIsSavingDb(false); }
            };

            return (
                <div className="bg-gray-100 min-h-screen">
                    {pantallaActiva === 'hub' && <HubCentral userEmail={user.email} prevValores={valoresAnteriores} avanzarAInstalaciones={manejarArranqueRonda} />}
                    {pantallaActiva === 'instalaciones' && <MenuInstalaciones areasDone={areasStatus} irAGasometro={() => setPantallaActiva('form_gasometro')} revisarYFinalizar={abrirResumen} />}
                    {pantallaActiva === 'form_gasometro' && <FormularioGasometro turnoId={turnoContexto.turnoIdBd} prevData={valoresAnteriores.gasometro} listaFallas={listaFallas} listaEstadosSopladores={listaEstadosSopladores} onTerminado={(d, f) => { setDatosGasometroTemp(d); setFotosGasometroTemp(f); setAreasStatus({...areasStatus, gasometro: true}); setPantallaActiva('instalaciones'); }} />}
                    {pantallaActiva === 'resumen_final' && <VistaResumenFinal turnoContexto={turnoContexto} datosGasometro={datosGasometroTemp} setDatosGasometro={setDatosGasometroTemp} onConfirm={manejarFinalizacionTotal} onBack={volverAInstalaciones} loading={isSavingDb} />}
                    {pantallaActiva === 'fin' && (
                        <div className="flex flex-col items-center justify-center min-h-screen p-6 bg-[#1e1e1e] text-center text-white">
                            <div className="bg-[#2a2a2a] p-10 rounded-[3rem] border border-zinc-700 shadow-2xl">
                                <div className="text-7xl mb-8">✅</div>
                                <h2 className="text-3xl font-black mb-4 tracking-tighter">Ronda Completada</h2>
                                <p className="text-zinc-400 mb-10 font-medium">Trazabilidad asegurada en el servidor central.</p>
                                <button onClick={() => window.location.reload()} className="w-full bg-amber-500 text-zinc-900 font-black py-5 rounded-2xl uppercase tracking-widest shadow-xl transform active:scale-95 transition-all">Nuevo Turno</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
