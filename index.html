<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RondaSync - PTAS Talagante</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        aguas: {
                            blue: '#0068B3',
                            green: '#009C62',
                            yellow: '#F4C300',
                            dark: '#004A80'
                        }
                    }
                }
            }
        }
    </script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // ==========================================
        // CONFIGURACIÓN SUPABASE
        // ==========================================
        const SUPABASE_URL  = 'https://cbvipsjpvlgyipifidyo.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_-9xy9fwszhg5RMqlilNn-A_wnK2VGCb';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const { useState, useEffect, useRef, useCallback } = React;

        // ==========================================
        // UTILIDADES
        // ==========================================

        /** Genera token de turno SIEMPRE en UTC-4 (Chile continental) */
        function getTokens() {
            const now   = new Date();
            const chile = new Date(now.toLocaleString('en-US', { timeZone: 'America/Santiago' }));
            const h     = chile.getHours();
            const fmt   = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;

            let currentStr, prevStr;
            if (h >= 8 && h < 20) {
                currentStr = `${fmt(chile)}-DIA`;
                const prev = new Date(chile); prev.setDate(chile.getDate() - 1);
                prevStr = `${fmt(prev)}-NOCHE`;
            } else {
                const base = h < 8 ? (()=>{ const d=new Date(chile); d.setDate(chile.getDate()-1); return d; })() : chile;
                currentStr = `${fmt(base)}-NOCHE`;
                prevStr    = `${fmt(base)}-DIA`;
            }
            return { currentStr, prevStr };
        }

        /** Pequeño badge de valor anterior */
        const Fantasma = ({ valor }) =>
            (valor === null || valor === undefined || valor === '')
                ? null
                : <span className="text-[9px] bg-blue-50 text-aguas-blue px-1.5 rounded font-bold border border-blue-200">Ant: {valor}</span>;

        /** Toast global */
        function useToast() {
            const [toasts, setToasts] = useState([]);
            const push = useCallback((msg, type = 'info') => {
                const id = Date.now();
                setToasts(t => [...t, { id, msg, type }]);
                setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 4000);
            }, []);
            const ToastContainer = () => (
                <div className="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 flex flex-col gap-2 w-full max-w-sm px-4 pointer-events-none">
                    {toasts.map(t => (
                        <div key={t.id} className={`fade-in px-5 py-3 rounded-2xl text-sm font-bold shadow-xl text-white ${t.type==='error' ? 'bg-red-600' : t.type==='success' ? 'bg-aguas-green' : 'bg-aguas-dark'}`}>
                            {t.msg}
                        </div>
                    ))}
                </div>
            );
            return { push, ToastContainer };
        }

        // ==========================================
        // MULTI-FOTO UPLOADER (con revoke de blobs)
        // ==========================================
        function MultiFotoUploader({ idCampo, turnoId, onFotosActualizadas, fotosIniciales = [] }) {
            const [fotos, setFotos]         = useState(fotosIniciales);
            const [subiendoIdx, setSubiendoIdx] = useState(null);
            const blobRefs = useRef([]);

            useEffect(() => {
                return () => blobRefs.current.forEach(url => URL.revokeObjectURL(url));
            }, []);

            const manejarCaptura = (e) => {
                const archivo = e.target.files[0];
                if (!archivo || fotos.length >= 3) return;
                const localUrl = URL.createObjectURL(archivo);
                blobRefs.current.push(localUrl);
                setFotos(prev => [...prev, { localUrl, realFile: archivo, remoteUrl: null }]);
            };

            const subirFoto = async (index) => {
                const foto = fotos[index];
                if (!foto.realFile || foto.remoteUrl) return;
                setSubiendoIdx(index);
                const ext      = foto.realFile.name.split('.').pop();
                const nombre   = `${turnoId}-${idCampo}-${index}-${Date.now()}.${ext}`;
                const { error } = await sb.storage.from('inspeccion_fotos').upload(nombre, foto.realFile);
                if (!error) {
                    const { data } = sb.storage.from('inspeccion_fotos').getPublicUrl(nombre);
                    setFotos(prev => {
                        const copia = [...prev];
                        copia[index] = { ...copia[index], remoteUrl: data.publicUrl };
                        const urls = copia.map(f => f.remoteUrl).filter(Boolean);
                        onFotosActualizadas(idCampo, urls);
                        return copia;
                    });
                }
                setSubiendoIdx(null);
            };

            const eliminarFoto = (index) => {
                setFotos(prev => {
                    const copia = prev.filter((_, i) => i !== index);
                    onFotosActualizadas(idCampo, copia.map(f => f.remoteUrl).filter(Boolean));
                    return copia;
                });
            };

            return (
                <div className="mt-3">
                    <div className="grid grid-cols-3 gap-2">
                        {fotos.map((foto, index) => (
                            <div key={index} className="relative group">
                                <img src={foto.localUrl || foto.remoteUrl} className="h-24 w-full object-cover rounded-lg border-2 border-white shadow-sm" alt="" />
                                {!foto.remoteUrl && subiendoIdx !== index && (
                                    <button onClick={() => subirFoto(index)} className="absolute inset-0 bg-black/40 flex items-center justify-center rounded-lg">
                                        <span className="bg-aguas-green text-white text-[10px] font-bold px-2 py-1 rounded shadow-lg">SUBIR</span>
                                    </button>
                                )}
                                {subiendoIdx === index && (
                                    <div className="absolute inset-0 bg-white/60 flex items-center justify-center rounded-lg">
                                        <div className="w-5 h-5 border-2 border-aguas-blue border-t-transparent rounded-full animate-spin"></div>
                                    </div>
                                )}
                                {foto.remoteUrl && (
                                    <div className="absolute top-1 right-1 bg-aguas-green text-white rounded-full p-0.5 shadow-md">
                                        <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 13l4 4L19 7"/></svg>
                                    </div>
                                )}
                                <button onClick={() => eliminarFoto(index)} className="absolute -top-2 -left-2 bg-red-500 text-white rounded-full w-6 h-6 flex items-center justify-center shadow-lg font-bold text-sm">×</button>
                            </div>
                        ))}
                        {fotos.length < 3 && (
                            <label className="h-24 border-2 border-dashed border-aguas-blue bg-blue-50/50 rounded-lg flex flex-col items-center justify-center cursor-pointer hover:bg-blue-100 transition-colors shadow-inner">
                                <span className="text-2xl text-aguas-blue">+</span>
                                <span className="text-[9px] font-bold text-aguas-blue uppercase tracking-tighter">Foto {fotos.length + 1}</span>
                                <input type="file" accept="image/*" capture="environment" className="hidden" onChange={manejarCaptura} />
                            </label>
                        )}
                    </div>
                </div>
            );
        }

        // ==========================================
        // LOGIN
        // ==========================================
        function PantallaLogin({ onLogin }) {
            const [email, setEmail]             = useState('');
            const [password, setPassword]       = useState('');
            const [loading, setLoading]         = useState(false);
            const [showPass, setShowPass]       = useState(false);
            const [error, setError]             = useState('');

            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true); setError('');
                const { data, error: err } = await sb.auth.signInWithPassword({ email, password });
                if (err) {
                    setError(err.message.includes('Invalid login') ? 'Correo o contraseña incorrectos.' : 'Error: ' + err.message);
                    setLoading(false);
                } else if (data.session) {
                    onLogin(data.session.user);
                } else {
                    setError('No se pudo establecer sesión.'); setLoading(false);
                }
            };

            return (
                <div className="min-h-screen bg-gray-100 flex items-center justify-center p-4 font-sans">
                    <div className="bg-white w-full max-w-md rounded-3xl p-8 shadow-2xl border-t-8 border-aguas-blue fade-in">
                        <div className="flex flex-col items-center mb-8">
                            <div className="w-16 h-16 bg-aguas-blue rounded-2xl flex items-center justify-center shadow-lg mb-4">
                                <span className="font-black text-white text-3xl tracking-tighter">RS</span>
                            </div>
                            <h1 className="text-2xl font-black text-aguas-dark tracking-tight">RondaSync</h1>
                            <p className="text-[10px] text-aguas-green font-black uppercase tracking-[0.3em] mt-1">PTAS Talagante</p>
                        </div>
                        <form onSubmit={handleSubmit} className="space-y-5">
                            {error && <div className="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl text-[11px] font-bold text-center animate-pulse">⚠️ {error}</div>}
                            <div>
                                <label className="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2">Correo</label>
                                <input type="email" value={email} onChange={e=>setEmail(e.target.value)} className="w-full bg-gray-50 border-2 border-gray-200 rounded-xl p-4 focus:border-aguas-blue outline-none" required />
                            </div>
                            <div className="relative">
                                <label className="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2">Contraseña</label>
                                <input type={showPass ? 'text' : 'password'} value={password} onChange={e=>setPassword(e.target.value)} className="w-full bg-gray-50 border-2 border-gray-200 rounded-xl p-4 pr-12 focus:border-aguas-blue outline-none" required />
                                <button type="button" onClick={()=>setShowPass(!showPass)} className="absolute right-4 top-[2.35rem] p-1 text-gray-400 hover:text-aguas-blue outline-none">
                                    {showPass
                                        ? <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.638 0-8.573-3.007-9.963-7.178a10.027 10.027 0 012.093-3.834M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.52 10.52 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.243 4.243L9.88 9.88"/></svg>
                                        : <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                                    }
                                </button>
                            </div>
                            <button type="submit" disabled={loading} className="w-full bg-aguas-blue text-white font-black py-4 rounded-xl uppercase tracking-widest shadow-lg hover:bg-aguas-dark active:scale-95 transition-all mt-6 disabled:opacity-60">
                                {loading ? 'Verificando...' : 'Iniciar Sesión'}
                            </button>
                        </form>
                    </div>
                </div>
            );
        }

        // ==========================================
        // SCADA INICIAL
        // ==========================================
        function VistaScada({ datosGuardados, prevData, onSave, onBack }) {
            const isLocked = !!datosGuardados;
            const camposScada = [
                { key: 'dig_nivel',    label: 'Nivel (cm)',      dbKey: 'scada_dig_nivel_cm',            group: 'Digestor',             color: 'blue' },
                { key: 'dig_presion',  label: 'Pres. (mb)',      dbKey: 'scada_dig_presion_mbar',        group: 'Digestor',             color: 'blue' },
                { key: 'dig_temp',     label: 'Temp (°C)',       dbKey: 'scada_dig_temp_c',              group: 'Digestor',             color: 'blue' },
                { key: 'gas_nivel',    label: 'Nivel (%)',       dbKey: 'scada_nivel_gasometro',         group: 'Gasómetro',            color: 'yellow' },
                { key: 'gas_presion',  label: 'Pres. (mb)',      dbKey: 'scada_presion_mbar',            group: 'Gasómetro',            color: 'yellow' },
                { key: 'comp_flujo',   label: 'Flujo Comp.',     dbKey: 'scada_flujo_biogas_nm3h',       group: 'Compresores/Calderas', color: 'green' },
                { key: 'comp_pres',    label: 'Pres. Imp. (mb)', dbKey: 'scada_comp_presion_imp_mbar',   group: 'Compresores/Calderas', color: 'green' },
                { key: 'cald_flujo',   label: 'Flujo Calderas',  dbKey: 'scada_cald_flujo_m3h',          group: 'Compresores/Calderas', color: 'green' },
                { key: 'ant_flujo',    label: 'Flujo Antorchas', dbKey: 'scada_ant_flujo_m3h',           group: 'Compresores/Calderas', color: 'green' },
            ];

            const grupos = [...new Set(camposScada.map(c => c.group))];
            const initState = Object.fromEntries(camposScada.map(c => [c.key, '']));
            const [vals, setVals] = useState(initState);
            const set = (k, v) => setVals(prev => ({...prev, [k]: v}));

            const colorClass = { blue: 'border-aguas-blue', yellow: 'border-aguas-yellow', green: 'border-aguas-green' };
            const bgClass    = { blue: 'bg-gray-50', yellow: 'bg-amber-50', green: 'bg-gray-50' };

            if (isLocked) {
                return (
                    <div className="p-4 max-w-md mx-auto space-y-4 min-h-screen pb-20 font-sans fade-in">
                        <div className="bg-aguas-blue p-5 rounded-2xl text-white shadow-xl flex justify-between items-center">
                            <h2 className="text-lg font-black uppercase">SCADA Inicial</h2>
                            <button onClick={onBack} className="bg-white/20 px-3 py-1 rounded-full text-xs font-bold hover:bg-white/30">Volver</button>
                        </div>
                        <div className="bg-blue-50 border-2 border-blue-200 p-4 rounded-2xl flex items-center justify-between">
                            <p className="text-[10px] font-black text-aguas-blue uppercase">Línea Base Sellada por {datosGuardados.operador_nombre?.split('@')[0]}</p>
                            <span className="text-3xl">🔒</span>
                        </div>
                        <div className="bg-white rounded-3xl shadow-md border p-5 space-y-5">
                            {grupos.map(grupo => (
                                <div key={grupo}>
                                    <h4 className="text-[10px] font-black text-gray-500 uppercase mb-3 border-b pb-1">{grupo}</h4>
                                    <div className="grid grid-cols-3 gap-3">
                                        {camposScada.filter(c => c.group === grupo).map(c => (
                                            <div key={c.key} className="bg-gray-50 p-3 rounded-xl text-center">
                                                <p className="text-[9px] text-gray-400 font-black uppercase">{c.label}</p>
                                                <p className="font-black text-gray-800">{datosGuardados[c.dbKey] ?? '—'}</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            }

            return (
                <div className="p-4 max-w-md mx-auto space-y-4 min-h-screen pb-20 font-sans fade-in">
                    <div className="bg-aguas-blue p-5 rounded-2xl text-white shadow-xl flex justify-between items-center">
                        <h2 className="text-lg font-black uppercase">Línea Base SCADA</h2>
                        <button onClick={onBack} className="bg-white/20 px-3 py-1 rounded-full text-xs font-bold hover:bg-white/30">Volver</button>
                    </div>
                    <div className="bg-white rounded-3xl shadow-md border border-gray-100 p-5 space-y-6">
                        {grupos.map(grupo => (
                            <div key={grupo}>
                                <h4 className="text-[10px] font-black text-gray-500 uppercase mb-3 border-b pb-1">{grupo}</h4>
                                <div className="grid grid-cols-3 gap-3">
                                    {camposScada.filter(c => c.group === grupo).map(c => (
                                        <div key={c.key}>
                                            <div className="flex justify-between items-center mb-1">
                                                <label className="text-[9px] text-gray-400 font-black">{c.label}</label>
                                                <Fantasma valor={prevData?.[c.dbKey]} />
                                            </div>
                                            <input
                                                type="number"
                                                value={vals[c.key]}
                                                onChange={e => set(c.key, e.target.value)}
                                                className={`w-full border-2 p-3 rounded-xl text-center font-bold outline-none focus:${colorClass[c.color]} ${bgClass[c.color]}`}
                                            />
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ))}
                    </div>
                    <button onClick={() => onSave(vals, camposScada)} className="w-full bg-aguas-green text-white font-black py-6 rounded-3xl shadow-xl uppercase tracking-widest hover:bg-[#008251] flex justify-center items-center active:scale-95 transition-all">
                        <span className="text-xl mr-2">🔒</span> Sellar Base SCADA
                    </button>
                </div>
            );
        }

        // ==========================================
        // RIESGOS (P.O.W.R.A.)
        // ==========================================
        function VistaRiesgos({ modulo, onComplete, onBack }) {
            const [epp, setEpp]   = useState({ epp1:false, epp2:false, epp3:false, epp4:false });
            const [ax, setAx]     = useState([]);

            const atexData = {
                gasometro:   [{ id:1, color:'red',   text:'Z1: Válvula Damper y Purga (r=1.0m)' }, { id:2, color:'amber', text:'Z2: Guarda Hidráulica (r=1.5m)' }],
                digestor:    [{ id:1, color:'red',   text:'Z1: Interior Digestor y Escotillas' },   { id:2, color:'amber', text:'Z2: Válvulas Baja Pres.' }],
                compresores: [{ id:1, color:'red',   text:'Z1: Caseta y Arqueta Purgas' },          { id:2, color:'amber', text:'Z2: Rejillas ventilación' }],
                calderas:    [{ id:1, color:'red',   text:'Z1: Arqueta canalización biogás' }],
                antorchas:   [{ id:1, color:'red',   text:'Z1: Purga automática (r=0.35m)' },       { id:2, color:'amber', text:'Z2: Tanque GLP / Base (r=2.0m)' }],
                area50:      [{ id:1, color:'amber', text:'Riesgo H2S: Mantener detector activo' }, { id:2, color:'amber', text:'Riesgo Caídas: Pasarelas flotador' }],
                area60:      [{ id:1, color:'red',   text:'Riesgo Térmico: Tuberías > 40°C' },       { id:2, color:'amber', text:'Alta Presión: Líneas de Lodo' }],
                area70:      [{ id:1, color:'red',   text:'Atrapamiento: Equipos rotativos' },       { id:2, color:'amber', text:'Ruido >85dB: Uso de fonos' }, { id:3, color:'amber', text:'Químico: Superficie resbaladiza (Polímero)' }]
            };

            const riesgos = atexData[modulo] || [];
            const toggleAx = id => setAx(prev => prev.includes(id) ? prev.filter(i=>i!==id) : [...prev, id]);
            const listo = epp.epp1 && epp.epp2 && epp.epp3 && epp.epp4 && ax.length === riesgos.length;

            const nombres = { gasometro:'Gasómetro', digestor:'Digestor', compresores:'Compresores', calderas:'Calderas', antorchas:'Antorchas y GLP', area50:'Área 50 (Flotador)', area60:'Área 60 (Intercambiador)', area70:'Área 70 (Centrífugas)' };

            return (
                <div className="p-4 max-w-md mx-auto space-y-4 min-h-screen pb-10 font-sans fade-in">
                    <div className="bg-aguas-dark p-5 rounded-2xl text-white shadow-xl flex justify-between items-center">
                        <div className="flex items-center"><span className="text-2xl mr-3">🛑</span><h2 className="text-lg font-black uppercase">P.O.W.R.A.</h2></div>
                        <button onClick={onBack} className="bg-white/20 px-3 py-1 rounded-full text-xs font-bold hover:bg-white/30">Volver</button>
                    </div>
                    <p className="text-[11px] text-gray-500 font-black px-2 uppercase tracking-widest text-center">Evaluación: {nombres[modulo]}</p>

                    <div className="bg-white rounded-3xl shadow-sm border p-5 space-y-3">
                        {[['epp1','Casco, Lentes, Guantes'],['epp2','Detector Multigas Activo'],['epp3','Máscara / Filtros'],['epp4','Equipos Móviles Seguros']].map(([k,label]) => (
                            <label key={k} className="flex items-center space-x-3 p-3 bg-gray-50 rounded-2xl border cursor-pointer hover:bg-gray-100 transition-colors">
                                <input type="checkbox" onChange={e=>setEpp({...epp,[k]:e.target.checked})} className="h-6 w-6 rounded text-aguas-blue" />

                        ))}
                    </div>

                    <div className="bg-red-50/50 rounded-3xl shadow-sm border border-red-200 p-5">
                        <h3 className="text-[10px] font-black text-red-600 uppercase mb-2 border-b border-red-200 pb-2">Peligros Específicos del Área</h3>
                        <div className="space-y-3">
                            {riesgos.map(r => (
                                <label key={r.id} className={`flex items-center space-x-3 p-3 bg-white rounded-2xl border-2 ${r.color==='red' ? 'border-red-200 hover:border-red-400' : 'border-amber-200 hover:border-amber-400'} cursor-pointer transition-colors`}>
                                    <input type="checkbox" onChange={()=>toggleAx(r.id)} className="h-6 w-6 rounded-lg" />
                                    <span className={`text-[11px] font-black leading-tight ${r.color==='red' ? 'text-red-800' : 'text-amber-800'}`}>{r.text}</span>
                                </label>
                            ))}
                        </div>
                    </div>
                    <button onClick={onComplete} disabled={!listo} className={`w-full text-white font-black py-6 rounded-3xl shadow-xl uppercase tracking-[0.2em] transition-all active:scale-95 ${listo ? 'bg-aguas-green hover:bg-[#008251]' : 'bg-gray-300 cursor-not-allowed'}`}>
                        Autorizar Ingreso
                    </button>
                </div>
            );
        }

        // ==========================================
        // FORMULARIO GASÓMETRO
        // ==========================================
        function FormularioGasometro({ turnoId, prevData, onTerminado }) {
            const [fd, setFd] = useState({ anclajes:'Optimo', altura:'', presion:'', lel:'', guarda:'Nivel Normal', soplador_1:'Operativo', soplador_2:'Operativo', condicion_sopladores:'Sin ruidos', agua_trampa:'Normal', valvula_corte:'Abierta', gabinete:'Operativo - Sin alarmas', observaciones:'' });

        // ==========================================

        // ==========================================
        // FORMULARIO ÁREA 70 (NUEVO: DESHIDRATACIÓN)
        // ==========================================
        function FormularioArea70({ turnoId, prevData, onTerminado }) {
            const [fd, setFd] = useState({ centrifuga:'A', torque:'', vel_rel:'', polipack:'', bombas:'Optimo', observaciones:'' });

            const alTorque = torq < 33 || torq > 45;
            const alVel = vel < 2.5 || vel > 6.5;
            const alPoli = poli < 50;
            
            const reqObs = fd.bombas !== 'Optimo' || alTorque || alVel || alPoli;
            const camposOblig = ['a70_centrifuga','a70_polipack'];
            const canSubmit = camposOblig.every(c=>fotos[c]?.length>0) && fd.torque !== '' && fd.vel_rel !== '' && fd.polipack !== '' && (!reqObs || fd.observaciones.trim() !== '');

            return (
                <div className="p-4 max-w-md mx-auto space-y-6 min-h-screen pb-10 font-sans fade-in">
                    <div className="bg-[#1e293b] p-5 rounded-2xl text-white shadow-xl"><h2 className="text-lg font-black uppercase">Área 70: Deshidratación</h2></div>

                    <div className="bg-white p-5 rounded-3xl border-l-[6px] border-l-aguas-blue shadow-sm border">
                        <h3 className="text-[10px] font-black text-gray-400 uppercase mb-3">PC-1: Centrífugas</h3>
                        <label className="text-[10px] font-black uppercase block mb-1">Centrífuga Activa</label>
                        <select value={fd.centrifuga} onChange={e=>setFd({...fd,centrifuga:e.target.value})} className="w-full border-2 p-3 rounded-xl text-sm mb-3 outline-none focus:border-aguas-blue">
                            <option>A</option><option>B</option><option>Móvil</option>
                        </select>
                        <div className="grid grid-cols-2 gap-3 mb-3">
                            <div>
                                <div className="flex justify-between mb-1"><label className="text-[9px] font-black uppercase">Torque (%)</label><Fantasma valor={prevData?.torque}/></div>
                                <input type="number" step="0.1" value={fd.torque} onChange={e=>setFd({...fd,torque:e.target.value})} className={`w-full border-2 p-3 rounded-xl text-center text-lg outline-none focus:border-aguas-blue ${alTorque ? 'bg-red-50 border-red-400 text-red-800' : ''}`}/>
                                {alTorque && <p className="text-[8px] text-red-600 font-bold mt-1">⚠️ Rango: 33 - 45</p>}

                            <div>
                                <div className="flex justify-between mb-1"><label className="text-[9px] font-black uppercase">Vel. Relativa</label><Fantasma valor={prevData?.velocidad_relativa}/></div>
                                <input type="number" step="0.1" value={fd.vel_rel} onChange={e=>setFd({...fd,vel_rel:e.target.value})} className={`w-full border-2 p-3 rounded-xl text-center text-lg outline-none focus:border-aguas-blue ${alVel ? 'bg-red-50 border-red-400 text-red-800' : ''}`}/>

                        <MultiFotoUploader idCampo="a70_centrifuga" turnoId={turnoId} onFotosActualizadas={mf} titulo="Tablero / Equipo" />

                    <div className="bg-white p-5 rounded-3xl border-l-[6px] border-l-aguas-green shadow-sm border">

                        <div className="flex justify-between mb-1"><label className="text-[9px] font-black uppercase">Nivel Tolva Polímero (%)</label><Fantasma valor={prevData?.nivel_polipack}/></div>
                        <input type="number" value={fd.polipack} onChange={e=>setFd({...fd,polipack:e.target.value})} className={`w-full border-2 p-3 rounded-xl text-center text-lg mb-3 outline-none focus:border-aguas-blue ${alPoli ? 'bg-red-50 border-red-400 text-red-800' : ''}`}/>
                        {alPoli && <p className="text-[9px] text-red-600 font-bold -mt-2 mb-2">⚠️ Rellenar tolva ({">"} 50%)</p>}
                        
                        <label className="text-[10px] font-black uppercase block mb-1">Bombas Dosificadoras</label>
                        <select value={fd.bombas} onChange={e=>setFd({...fd,bombas:e.target.value})} className="w-full border-2 p-3 rounded-xl text-sm mb-2 outline-none focus:border-aguas-blue">
                            <option>Optimo</option><option>Fuga de polímero</option><option>Falla de flujo</option>

        // ==========================================
        // TRASPASO DE TURNO
        // ==========================================
        function VistaTraspaso({ prevTurno, prevGasometro, prevDigestor, prevCompresores, prevCalderas, prevAntorchas, prevA50, prevA60, prevA70, onBack }) {
            if (!prevTurno) return (
                <div className="p-4 max-w-md mx-auto min-h-screen fade-in">
                    <div className="bg-white p-6 rounded-3xl shadow-sm text-center border mt-10">
                        <p className="font-bold text-gray-500 text-sm">No hay datos del turno anterior.</p>
                        <button onClick={onBack} className="mt-6 bg-aguas-blue text-white px-6 py-3 rounded-xl font-black uppercase text-sm">Volver</button>
                    </div>
                </div>
            );

            const anomalias = [];
            if (prevGasometro) {
                if (prevGasometro.estado_anclajes && prevGasometro.estado_anclajes !== 'Optimo') anomalias.push(`Gasómetro: Anclajes ${prevGasometro.estado_anclajes}`);
                if (prevGasometro.lectura_lel_porcentaje > 0) anomalias.push(`Gasómetro: LEL ${prevGasometro.lectura_lel_porcentaje}%`);
                if (prevGasometro.nivel_guarda_hidraulica && prevGasometro.nivel_guarda_hidraulica !== 'Nivel Normal') anomalias.push(`Gasómetro: Guarda ${prevGasometro.nivel_guarda_hidraulica}`);
                if (prevGasometro.estado_gabinete_electrico && !prevGasometro.estado_gabinete_electrico.includes('Operativo')) anomalias.push(`Gasómetro: Gabinete Falla`);
            }
            if (prevDigestor) {
                if (prevDigestor.estado_escotillas !== 'Optimo (Sin fugas)') anomalias.push(`Digestor: ${prevDigestor.estado_escotillas}`);
                if (prevDigestor.estado_valvulas !== 'Optimo') anomalias.push(`Digestor: Válvulas ${prevDigestor.estado_valvulas}`);
                if (prevDigestor.estado_purgas !== 'Operativa (Sin obstrucciones)') anomalias.push(`Digestor: ${prevDigestor.estado_purgas}`);
            }
            if (prevCompresores) {
                if (prevCompresores.estado_compresores !== 'Optimo') anomalias.push(`Compresores: ${prevCompresores.estado_compresores}`);
            }
            if (prevCalderas) {
                if (prevCalderas.estado_quemador !== 'Optimo') anomalias.push(`Calderas: Quemador ${prevCalderas.estado_quemador}`);
            }
            if (prevAntorchas) {
                if (prevAntorchas.estado_quemador !== 'Optimo') anomalias.push(`Antorchas: ${prevAntorchas.estado_quemador}`);
            }
            if (prevA50) {
                if (prevA50.altura_lodo_cm > 120) anomalias.push(`Área 50: Manto Lodo Alto (${prevA50.altura_lodo_cm}cm)`);
                if (prevA50.presion_balon_bar < 3) anomalias.push(`Área 50: Presión Balón Baja (${prevA50.presion_balon_bar}bar)`);
            }
            if (prevA60) {
                if (prevA60.temp_lodo_entrada_c <= 34) anomalias.push(`Área 60: T° Entrada Baja (${prevA60.temp_lodo_entrada_c}°C)`);
                if (prevA60.temp_lodo_salida_c >= 35.5) anomalias.push(`Área 60: T° Salida Alta (${prevA60.temp_lodo_salida_c}°C)`);
            }
            if (prevA70) {
                if (prevA70.torque < 33 || prevA70.torque > 45) anomalias.push(`Área 70: Torque Anormal (${prevA70.torque}%)`);
                if (prevA70.velocidad_relativa < 2.5 || prevA70.velocidad_relativa > 6.5) anomalias.push(`Área 70: Vel. Relativa Anormal (${prevA70.velocidad_relativa})`);
                if (prevA70.nivel_polipack < 50) anomalias.push(`Área 70: Polipack Bajo (${prevA70.nivel_polipack}%)`);
            }

            const obsList = [
                { area:'Gasómetro',  text: prevGasometro?.observaciones },
                { area:'Digestor',   text: prevDigestor?.observaciones },
                { area:'Compresores',text: prevCompresores?.observaciones },
                { area:'Calderas',   text: prevCalderas?.observaciones },
                { area:'Antorchas',  text: prevAntorchas?.observaciones },
                { area:'Área 50',    text: prevA50?.observaciones },
                { area:'Área 60',    text: prevA60?.observaciones },
                { area:'Área 70',    text: prevA70?.observaciones },
            ].filter(o => o.text?.trim());

            return (
                <div className="p-4 max-w-md mx-auto min-h-screen font-sans pb-10 space-y-4 fade-in">
                    <div className="bg-aguas-blue p-5 rounded-2xl text-white shadow-xl flex justify-between items-center sticky top-0 z-20">
                        <div className="flex items-center"><span className="text-2xl mr-3">📋</span><h2 className="text-lg font-black uppercase tracking-tight">Traspaso de Turno</h2></div>
                        <button onClick={onBack} className="bg-white/20 px-3 py-1 rounded-full text-xs font-bold hover:bg-white/30">Volver</button>
                    </div>

                    <div className="bg-white rounded-3xl p-5 shadow-sm border border-gray-100 flex justify-between items-center">
                        <div>
                            <p className="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1">Operador Saliente</p>
                            <p className="text-sm font-bold text-gray-800">{prevTurno.operador_nombre}</p>
                            <p className="text-[10px] text-gray-500 mt-1">{new Date(prevTurno.created_at).toLocaleString('es-CL')}</p>
                        </div>
                        <div className="bg-blue-50 text-aguas-blue px-3 py-1 rounded-full text-xs font-black border border-blue-200 uppercase">{prevTurno.tipo_turno}</div>
                    </div>

                    {prevTurno.setpoints_ajustados && (
                        <div className="bg-blue-50 rounded-3xl p-5 shadow-sm border border-blue-200">
                            <h3 className="text-[10px] font-black text-aguas-blue uppercase tracking-widest mb-2">⚙️ Ajustes Operacionales</h3>
                            <p className="text-sm text-blue-900 font-medium italic">"{prevTurno.setpoints_ajustados}"</p>
                        </div>
                    )}

                    {anomalias.length > 0 && (
                        <div className="bg-red-50 rounded-3xl p-5 shadow-sm border border-red-200">
                            <h3 className="text-[10px] font-black text-red-800 uppercase tracking-widest mb-3 flex items-center"><span className="text-lg mr-2">⚠️</span> {anomalias.length} Alertas Detectadas</h3>
                            <ul className="space-y-2">{anomalias.map((a,i)=><li key={i} className="text-xs text-red-700 font-bold bg-white p-2 rounded-xl border border-red-100">• {a}</li>)}</ul>
                        </div>
                    )}

                    {!anomalias.length && (
                        <div className="bg-emerald-50 rounded-3xl p-5 shadow-sm border border-emerald-200 flex items-center space-x-3">
                            <span className="text-2xl">✅</span>
                            <p className="text-sm font-black text-emerald-800">Turno anterior sin anomalías registradas</p>
                        </div>
                    )}

                    {obsList.length > 0 && (
                        <div className="bg-amber-50 rounded-3xl p-5 shadow-sm border border-amber-200">
                            <h3 className="text-[10px] font-black text-amber-800 uppercase tracking-widest mb-3">📝 Observaciones</h3>
                            <div className="space-y-3">
                                {obsList.map((o,idx)=>(
                                    <div key={idx} className="bg-white p-3 rounded-xl border border-amber-100">
                                        <p className="text-[9px] font-black text-amber-600 uppercase">{o.area}</p>
                                        <p className="text-xs text-amber-900 font-medium italic mt-1">"{o.text}"</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    <div className="bg-white rounded-3xl p-5 shadow-sm border border-gray-100">
                        <h3 className="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-4 border-b border-gray-100 pb-2">SCADA del Turno Saliente</h3>
                        <div className="grid grid-cols-3 gap-2 text-xs">
                            {[
                                {label:'Nivel Dig.',  val: prevTurno.scada_dig_nivel_cm,        unit:'cm',  bg:'bg-gray-50'},
                                {label:'Pres. Dig.',  val: prevTurno.scada_dig_presion_mbar,    unit:'mb',  bg:'bg-gray-50'},
                                {label:'Temp Dig.',   val: prevTurno.scada_dig_temp_c,          unit:'°C',  bg:'bg-gray-50'},
                                {label:'Nivel Gas.',  val: prevTurno.scada_nivel_gasometro,     unit:'%',   bg:'bg-amber-50'},
                                {label:'Pres. Gas.',  val: prevTurno.scada_presion_mbar,        unit:'mb',  bg:'bg-amber-50'},
                                {label:'Flujo Comp.', val: prevTurno.scada_flujo_biogas_nm3h,   unit:'',    bg:'bg-gray-50'},
                                {label:'Pres. Imp.',  val: prevTurno.scada_comp_presion_imp_mbar,unit:'mb',  bg:'bg-gray-50'},
                                {label:'Flujo Cald.', val: prevTurno.scada_cald_flujo_m3h,       unit:'',    bg:'bg-gray-50'},
                                {label:'Flujo Ant.',  val: prevTurno.scada_ant_flujo_m3h,        unit:'',    bg:'bg-gray-50'},
                            ].map(({label,val,unit,bg},i)=>(
                                <div key={i} className={`${bg} p-2 rounded-xl text-center`}>
                                    <span className="text-gray-400 block text-[9px] font-black uppercase mb-1">{label}</span>
                                    <span className="font-bold text-gray-800">{val ?? '—'}{val && unit ? ' '+unit : ''}</span>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // RESUMEN FINAL Y CIERRE
        // ==========================================
        function VistaResumenFinal({ shiftToken, user, allData, onConfirm, onBack, isSaving }) {
            const [setpoints, setSetpoints] = useState('');
            const [firmado, setFirmado] = useState(false);

            return (
                <div className="p-4 max-w-md mx-auto min-h-screen font-sans pb-10 space-y-4 fade-in">
                    <div className="bg-aguas-dark p-5 rounded-2xl text-white shadow-xl flex justify-between items-center sticky top-0 z-20">
                        <div className="flex items-center"><span className="text-2xl mr-3">✅</span><h2 className="text-lg font-black uppercase">Cierre de Turno</h2></div>
                        <button onClick={onBack} className="bg-white/20 px-3 py-1 rounded-full text-xs font-bold hover:bg-white/30">Volver</button>
                    </div>

                    <div className="bg-white rounded-3xl p-5 shadow-sm border border-gray-100">
                        <p className="text-[10px] font-black text-gray-400 uppercase mb-1">Operador</p>
                        <p className="font-bold text-gray-800">{user.email}</p>
                        <p className="text-[10px] text-gray-400 mt-1">{shiftToken}</p>
                    </div>

                    <div className="bg-white rounded-3xl p-5 shadow-sm border border-gray-100">
                        <p className="text-[10px] font-black text-gray-400 uppercase mb-3">Módulos Completados</p>
                        <div className="grid grid-cols-2 gap-2">
                            {[['SCADA',allData.scada],['Gasómetro',allData.gas],['Digestor',allData.dig],['Compresores',allData.comp],['Calderas',allData.cald],['Antorchas',allData.ant],['Área 50',allData.a50],['Área 60',allData.a60],['Área 70',allData.a70]].map(([name,done])=>(
                                <div key={name} className={`flex items-center space-x-2 p-2 rounded-xl text-xs font-bold ${done ? 'bg-emerald-50 text-emerald-700' : 'bg-red-50 text-red-600'}`}>
                                    <span>{done ? '✓' : '✗'}</span><span>{name}</span>
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="bg-white rounded-3xl p-5 shadow-sm border border-gray-100">
                        <label className="text-[10px] font-black uppercase mb-2 block">Ajustes Operacionales / Novedades</label>
                        <textarea value={setpoints} onChange={e=>setSetpoints(e.target.value)} className="w-full border-2 p-4 rounded-2xl text-sm outline-none focus:border-aguas-blue" rows="3" placeholder="Setpoints modificados, acciones pendientes para el próximo turno..."></textarea>
                    </div>

                    <label className="flex items-center space-x-3 p-4 bg-aguas-dark/5 border-2 border-aguas-dark rounded-2xl cursor-pointer">
                        <input type="checkbox" checked={firmado} onChange={e=>setFirmado(e.target.checked)} className="h-6 w-6" />
                        <span className="text-xs font-black text-aguas-dark uppercase">Confirmo que la información es veraz y completa</span>
                    </label>

                    <button onClick={()=>onConfirm(setpoints)} disabled={!firmado || isSaving} className={`w-full text-white font-black py-6 rounded-3xl shadow-xl uppercase tracking-[0.2em] active:scale-95 transition-all ${firmado && !isSaving ? 'bg-aguas-green hover:bg-[#008251]' : 'bg-gray-300 cursor-not-allowed'}`}>
                        {isSaving ? 'Cerrando Turno...' : 'Cerrar Turno Definitivamente'}
                    </button>
                </div>
            );
        }

        // ==========================================
        // APP PRINCIPAL
        // ==========================================
        function App() {
            const [user, setUser]                     = useState(null);
            const [authChecking, setAuthChecking]     = useState(true);
            const [vista, setVista]                   = useState('hub');
            const [moduloDestino, setModuloDestino]   = useState(null);
            const [isSaving, setIsSaving]             = useState(false);
            const [syncInProgress, setSyncInProgress] = useState(false);
            const { push: toast, ToastContainer }     = useToast();

            const { currentStr, prevStr } = getTokens();
            const [shiftToken]  = useState(currentStr);
            const [prevToken]   = useState(prevStr);

            const [currentScada, setCurrentScada] = useState(null);
            const [currentGas, setCurrentGas]     = useState(null);
            const [currentDig, setCurrentDig]     = useState(null);
            const [currentComp, setCurrentComp]   = useState(null);
            const [currentCald, setCurrentCald]   = useState(null);
            const [currentAnt, setCurrentAnt]     = useState(null);
            const [currentA50, setCurrentA50]     = useState(null);
            const [currentA60, setCurrentA60]     = useState(null);
            const [currentA70, setCurrentA70]     = useState(null);
            const [prevData, setPrevData]         = useState({});

            // ---- Carga colaborativa consolidada ----
            const cargarDatos = useCallback(async (silencioso = false) => {
                if (!silencioso) setSyncInProgress(true);
                try {
                    const tablas = ['registro_turnos','inspeccion_gasometro','inspeccion_digestor','inspeccion_compresores','inspeccion_calderas','inspeccion_antorchas','inspeccion_area50','inspeccion_area60','inspeccion_area70'];
                    const queries = tablas.flatMap(t => [
                        sb.from(t).select('*').eq('turno_token', shiftToken).maybeSingle(),
                        sb.from(t).select('*').eq('turno_token', prevToken).maybeSingle(),
                    ]);
                    const results = await Promise.all(queries);
                    const errores = results.filter(r => r.error);
                    if (errores.length) throw new Error(errores.map(e => e.error.message).join('; '));

                    const [cs,,cg,,cd,,cc,,ccal,,cant,,ca5,,ca6,,ca7,] = results.map(r => r.data);
                    const prev = {};
                    results.forEach((r, i) => { if (i%2===1) { const key = ['turno','gasometro','digestor','compresores','calderas','antorchas','area50','area60','area70'][Math.floor(i/2)]; prev[key] = r.data; } });

                    setCurrentScada(cs  ?? null);
                    setCurrentGas(cg    ?? null);
                    setCurrentDig(cd    ?? null);
                    setCurrentComp(cc   ?? null);
                    setCurrentCald(ccal ?? null);
                    setCurrentAnt(cant  ?? null);
                    setCurrentA50(ca5   ?? null);
                    setCurrentA60(ca6   ?? null);
                    setCurrentA70(ca7   ?? null);
                    setPrevData(prev);
                    if (!silencioso) toast('Datos sincronizados ✓', 'success');
                } catch (e) {
                    console.error(e);
                    toast('Error de sincronización: ' + e.message, 'error');
                } finally {
                    setSyncInProgress(false);
                }
            }, [shiftToken, prevToken]);

            useEffect(() => {
                sb.auth.getSession().then(({ data: { session } }) => {
                    setUser(session?.user ?? null);
                    setAuthChecking(false);
                });
            }, []);

            useEffect(() => {
                if (user) cargarDatos(true);
            }, [user]);

            if (authChecking) return <div className="min-h-screen bg-gray-100 flex items-center justify-center"><div className="w-10 h-10 border-4 border-aguas-blue border-t-transparent rounded-full animate-spin"></div></div>;
            if (!user)        return <PantallaLogin onLogin={u => setUser(u)} />;

            // ---- Guardado genérico ----
            const guardarGenerico = async (tabla, currentData, payload) => {
                setIsSaving(true);
                try {
                    const base = { turno_token: shiftToken, turno_id: currentScada?.id ?? null, operador_nombre: user.email, ...payload };
                    const { error } = currentData?.id
                        ? await sb.from(tabla).update(base).eq('id', currentData.id)
                        : await sb.from(tabla).insert([base]);
                    if (error) throw error;
                    await cargarDatos(true);
                    toast('Módulo sellado ✓', 'success');
                    setVista('hub');
                } catch (e) {
                    toast(`Error guardando ${tabla}: ` + e.message, 'error');
                } finally {
                    setIsSaving(false);
                }
            };

            // ---- Handlers específicos ----
            const handleSaveScada = async (vals, campos) => {
                setIsSaving(true);
                try {
                    const payload = {
                        turno_token:   shiftToken,
                        operador_nombre: user.email,
                        tipo_turno:    shiftToken.includes('DIA') ? 'Día' : 'Noche',
                        hora_inicio:   currentScada?.hora_inicio ?? new Date().toISOString(),
                    };
                    campos.forEach(c => { payload[c.dbKey] = vals[c.key] !== '' ? vals[c.key] : null; });

                    const { error } = currentScada?.id
                        ? await sb.from('registro_turnos').update(payload).eq('id', currentScada.id)
                        : await sb.from('registro_turnos').insert([payload]);
                    if (error) throw error;
                    await cargarDatos(true);
                    toast('SCADA sellado ✓', 'success');
                    setVista('hub');
                } catch(e) {
                    toast('Error SCADA: ' + e.message, 'error');
                } finally {
                    setIsSaving(false);
                }
            };

            const handleSaveGasometro = (d, fotos) => guardarGenerico('inspeccion_gasometro', currentGas, {
                estado_anclajes: d.anclajes, altura_interna_m: d.altura||null, presion_inter_membrana_mbar: d.presion||null,
                lectura_lel_porcentaje: d.lel||null, nivel_guarda_hidraulica: d.guarda,
                soplador_1_estado: d.soplador_1, soplador_2_estado: d.soplador_2,
                sopladores_condicion_mecanica: d.condicion_sopladores, flujo_agua_trampa: d.agua_trampa,
                estado_valvula_corte: d.valvula_corte, estado_gabinete_electrico: d.gabinete,
                observaciones: d.observaciones,
                foto_anclaje: fotos.anclaje?.[0]||null, foto_altura: fotos.altura?.[0]||null,
                foto_presion: fotos.presion?.[0]||null, foto_lel: fotos.lel?.[0]||null,
                foto_guarda: fotos.guarda?.[0]||null, foto_sopladores: fotos.sopladores?.[0]||null,
                foto_trampa: fotos.trampa?.[0]||null, foto_gabinete: fotos.gabinete?.[0]||null,
            });

            const handleSaveDigestor = (d, fotos) => guardarGenerico('inspeccion_digestor', currentDig, {
                estado_escotillas: d.escotillas, estado_valvulas: d.valvulas,
                estado_purgas: d.purgas, estado_revestimiento: d.revestimiento, observaciones: d.observaciones,
                foto_escotillas: fotos.escotillas?.[0]||null, foto_valvulas: fotos.valvulas?.[0]||null,
                foto_purgas: fotos.purgas?.[0]||null, foto_revestimiento: fotos.revestimiento?.[0]||null,
            });

            const handleSaveCompresores = (d, fotos) => guardarGenerico('inspeccion_compresores', currentComp, {
                estado_compresores: d.estado_gral, estado_filtros: d.filtros, estado_chiller: d.chiller,
                estado_valvulas: d.valvulas, estado_tablero: d.tablero, observaciones: d.observaciones,
                foto_compresores: fotos.general?.[0]||null, foto_filtros: fotos.filtros?.[0]||null,
                foto_chiller: fotos.chiller?.[0]||null, foto_valvulas: fotos.valvulas?.[0]||null,
                foto_tablero: fotos.tablero?.[0]||null,
            });

            const handleSaveCalderas = (d, fotos) => guardarGenerico('inspeccion_calderas', currentCald, {
                estado_quemador: d.quemador, estado_circuito_agua: d.circuito, estado_bombas: d.bombas,
                estado_chimenea: d.chimenea, estado_tablero: d.tablero, observaciones: d.observaciones,
                foto_quemador: fotos.quemador?.[0]||null, foto_circuito_agua: fotos.circuito?.[0]||null,
                foto_bombas: fotos.bombas?.[0]||null, foto_chimenea: fotos.chimenea?.[0]||null,
                foto_tablero: fotos.tablero?.[0]||null,
            });

            const handleSaveAntorchas = (d, fotos) => guardarGenerico('inspeccion_antorchas', currentAnt, {
                estado_quemador: d.quemador, estado_valvulas: d.valvulas, nivel_glp_pct: d.nivel_glp||null,
                estado_tablero: d.tablero, observaciones: d.observaciones,
                foto_quemador: fotos.ant_quemador?.[0]||null, foto_valvulas: fotos.ant_valvulas?.[0]||null,
                foto_glp: fotos.ant_glp?.[0]||null, foto_tablero: fotos.ant_tablero?.[0]||null,
            });

            const handleSaveA50 = (d, fotos) => guardarGenerico('inspeccion_area50', currentA50, {
                estado_rastras: d.rastras, altura_lodo_cm: d.altura||null, nivel_balon_cm: d.nivel||null,
                presion_balon_bar: d.presion||null, camara_mezcla_pct: d.mezcla||null, observaciones: d.observaciones,
                foto_flotador: fotos.a50_flotador?.[0]||null, foto_balon: fotos.a50_balon?.[0]||null,
            });

            const handleSaveA60 = (d, fotos) => guardarGenerico('inspeccion_area60', currentA60, {
                temp_lodo_entrada_c: d.temp_in||null, temp_lodo_salida_c: d.temp_out||null,
                estado_bombas: d.bombas, observaciones: d.observaciones,
                foto_intercambiador: fotos.a60_inter?.[0]||null, foto_bombas: fotos.a60_bombas?.[0]||null,
            });

            const handleSaveA70 = (d, fotos) => guardarGenerico('inspeccion_area70', currentA70, {
                centrifuga_activa: d.centrifuga, torque: d.torque||null, velocidad_relativa: d.vel_rel||null,
                nivel_polipack: d.polipack||null, estado_bombas: d.bombas, observaciones: d.observaciones,
                foto_centrifuga: fotos.a70_centrifuga?.[0]||null, foto_polipack: fotos.a70_polipack?.[0]||null,
            });

            const handleCerrarTurno = async (setpoints) => {
                setIsSaving(true);
                try {
                    if (!currentScada?.id) throw new Error('No hay registro de turno activo.');
                    const { error } = await sb.from('registro_turnos').update({
                        hora_fin: new Date().toISOString(),
                        turno_cerrado: true,
                        setpoints_ajustados: setpoints || null,
                    }).eq('id', currentScada.id);
                    if (error) throw error;
                    setVista('turno_cerrado');
                } catch(e) {
                    toast('Error al cerrar turno: ' + e.message, 'error');
                } finally {
                    setIsSaving(false);
                }
            };

            // ---- LOADER OVERLAY ----
            const Loader = () => (
                <div className="fixed inset-0 bg-aguas-dark/90 z-50 flex flex-col items-center justify-center text-white backdrop-blur-sm">
                    <div className="text-4xl animate-spin mb-6 text-aguas-yellow">⚙️</div>
                    <h2 className="font-black tracking-[0.3em] uppercase">Guardando Evidencia...</h2>
                </div>
            );

            // ---- FLAGS ----
            const scadaDone = !!currentScada; const gasDone   = !!currentGas;
            const digDone   = !!currentDig;   const compDone  = !!currentComp;
            const caldDone  = !!currentCald;  const antDone   = !!currentAnt;
            const a50Done   = !!currentA50;   const a60Done   = !!currentA60;
            const a70Done   = !!currentA70;
            const todosCompletos = scadaDone && gasDone && digDone && compDone && caldDone && antDone && a50Done && a60Done && a70Done;

            const navTo = (modulo) => { setModuloDestino(modulo); setVista('riesgos'); };

            // ---- RUTAS ----
            if (vista === 'turno_cerrado') return (
                <div className="min-h-screen bg-gray-100 flex items-center justify-center p-6 font-sans">
                    <div className="bg-white p-8 rounded-3xl text-center shadow-xl border-t-8 border-aguas-green fade-in max-w-sm w-full">
                        <div className="text-5xl mb-4">🎉</div>
                        <h2 className="text-xl font-black text-aguas-dark mb-2 uppercase">Turno Cerrado</h2>
                        <p className="text-sm text-gray-500 mb-6">El turno ha sido registrado y sellado correctamente.</p>
                        <button onClick={async()=>{ await sb.auth.signOut(); setUser(null); setVista('hub'); }} className="bg-aguas-blue text-white px-8 py-4 rounded-xl font-black uppercase tracking-widest shadow-md w-full hover:bg-aguas-dark transition-colors">Cerrar Sesión</button>
                    </div>
                </div>
            );

            if (vista === 'scada')       return <>{isSaving && <Loader/>}<VistaScada datosGuardados={currentScada} prevData={prevData.turno} onSave={handleSaveScada} onBack={()=>setVista('hub')} /></>;
            if (vista === 'riesgos')     return <VistaRiesgos modulo={moduloDestino} onComplete={()=>setVista(moduloDestino)} onBack={()=>setVista('hub')} />;
            if (vista === 'gasometro')   return <>{isSaving && <Loader/>}<FormularioGasometro turnoId={shiftToken} prevData={prevData.gasometro} onTerminado={handleSaveGasometro} /></>;
            if (vista === 'digestor')    return <>{isSaving && <Loader/>}<FormularioDigestor  turnoId={shiftToken} prevData={prevData.digestor}  onTerminado={handleSaveDigestor} /></>;
            if (vista === 'compresores') return <>{isSaving && <Loader/>}<FormularioCompresores turnoId={shiftToken} prevData={prevData.compresores} onTerminado={handleSaveCompresores} /></>;
            if (vista === 'calderas')    return <>{isSaving && <Loader/>}<FormularioCalderas  turnoId={shiftToken} prevData={prevData.calderas}  onTerminado={handleSaveCalderas} /></>;
            if (vista === 'antorchas')   return <>{isSaving && <Loader/>}<FormularioAntorchas turnoId={shiftToken} prevData={prevData.antorchas} onTerminado={handleSaveAntorchas} /></>;
            if (vista === 'area50')      return <>{isSaving && <Loader/>}<FormularioArea50    turnoId={shiftToken} prevData={prevData.area50}    onTerminado={handleSaveA50} /></>;
            if (vista === 'area60')      return <>{isSaving && <Loader/>}<FormularioArea60    turnoId={shiftToken} prevData={prevData.area60}    onTerminado={handleSaveA60} /></>;
            if (vista === 'area70')      return <>{isSaving && <Loader/>}<FormularioArea70    turnoId={shiftToken} prevData={prevData.area70}    onTerminado={handleSaveA70} /></>;
            if (vista === 'traspaso')    return <VistaTraspaso prevTurno={prevData.turno} prevGasometro={prevData.gasometro} prevDigestor={prevData.digestor} prevCompresores={prevData.compresores} prevCalderas={prevData.calderas} prevAntorchas={prevData.antorchas} prevA50={prevData.area50} prevA60={prevData.area60} prevA70={prevData.area70} onBack={()=>setVista('hub')} />;
            if (vista === 'resumen_final') return <VistaResumenFinal shiftToken={shiftToken} user={user} allData={{scada:scadaDone,gas:gasDone,dig:digDone,comp:compDone,cald:caldDone,ant:antDone,a50:a50Done,a60:a60Done,a70:a70Done}} onConfirm={handleCerrarTurno} onBack={()=>setVista('hub')} isSaving={isSaving} />;

            // ---- HUB ----
            const urlDigestor   = "https://cbvipsjpvlgyipifidyo.supabase.co/storage/v1/object/public/inspeccion_fotos/Digestor.jpg";
            const urlGasometro  = "https://cbvipsjpvlgyipifidyo.supabase.co/storage/v1/object/public/inspeccion_fotos/Gasometro%20vista%20general.jpeg";
            const urlCompresores = "https://cbvipsjpvlgyipifidyo.supabase.co/storage/v1/object/public/inspeccion_fotos/Sala%20de%20Compresores.jpg";
            const urlCalderas   = "https://cbvipsjpvlgyipifidyo.supabase.co/storage/v1/object/public/inspeccion_fotos/Sala%20de%20Calderas.jpg";
            const urlAntorchas  = "https://cbvipsjpvlgyipifidyo.supabase.co/storage/v1/object/public/inspeccion_fotos/Antorchas.jpeg";

            const ModuloCard = ({ label, done, onClick, img, className='', icono='' }) => (
                <button onClick={onClick} className={`p-2 rounded-3xl border-2 transition-all text-left relative shadow-sm ${done ? 'bg-emerald-50 border-aguas-green' : 'bg-white border-gray-200 hover:border-aguas-blue hover:shadow-md'} ${className}`}>
                    {done && <div className="absolute top-3 right-3 z-10 bg-aguas-green text-white rounded-full h-8 w-8 flex items-center justify-center shadow-xl border-2 border-white font-black text-sm">✓</div>}
                    <div className="h-28 w-full rounded-2xl overflow-hidden mb-2 shadow-inner bg-gradient-to-br from-aguas-blue/20 to-aguas-dark/30">
                        {img
                            ? <img src={img} className="w-full h-full object-cover" alt={label} loading="lazy" />
                            : <div className="w-full h-full flex items-center justify-center text-4xl opacity-30">{icono}</div>
                        }
                    </div>
                    <span className={`font-black text-xs px-2 uppercase ${done ? 'text-aguas-green' : 'text-gray-700'}`}>{label}</span>
                </button>
            );

            return (
                <div className="p-4 max-w-md mx-auto min-h-screen space-y-6 font-sans bg-gray-50 pb-10 fade-in">
                    <ToastContainer />

                    {/* Header */}
                    <div className="bg-white p-6 rounded-3xl border-t-[12px] border-aguas-blue shadow-xl">
                        <div className="flex justify-between items-start border-b border-gray-100 pb-4 mb-4">
                            <div className="flex items-center">
                                <div className="w-10 h-10 bg-aguas-blue rounded-xl flex items-center justify-center shadow-md mr-3">
                                    <span className="font-black text-white text-sm">RS</span>
                                </div>
                                <div>
                                    <h1 className="text-xl font-black text-aguas-dark tracking-tighter">RondaSync</h1>
                                    <p className="text-[10px] text-aguas-green font-black uppercase tracking-widest">{shiftToken}</p>
                                </div>
                            </div>
                            <button onClick={async()=>{ await sb.auth.signOut(); setUser(null); }} className="text-[10px] font-black bg-red-50 text-red-600 px-4 py-2 rounded-xl border border-red-100 hover:bg-red-100 shadow-sm transition-all">SALIR</button>
                        </div>
                        <div className="flex justify-between items-center">
                            <div>
                                <p className="text-[9px] text-gray-400 font-black uppercase tracking-widest mb-1">Operador</p>
                                <p className="text-sm font-bold text-gray-800 truncate max-w-[160px]">{user.email.split('@')[0]}</p>
                            </div>
                            <button onClick={()=>cargarDatos(false)} disabled={syncInProgress} className="bg-aguas-blue hover:bg-aguas-dark disabled:opacity-60 text-white px-4 py-2 rounded-xl text-[10px] font-black flex items-center shadow-md active:scale-95 transition-all">
                                <span className={`mr-2 ${syncInProgress ? 'animate-spin' : ''}`}>🔄</span>
                                {syncInProgress ? 'Sync...' : 'Sincronizar'}
                            </button>
                        </div>
                    </div>

                    {/* Acciones */}
                    <div className="space-y-3">
                        <button onClick={()=>setVista('traspaso')} className="w-full flex justify-between items-center p-5 rounded-2xl border-2 bg-white border-aguas-yellow shadow-sm hover:border-amber-400 transition-all group">
                            <div className="flex items-center space-x-4"><span className="text-2xl">📋</span><span className="font-black text-sm uppercase text-gray-800 group-hover:text-aguas-blue">Traspaso de Turno</span></div>
                            <span className="text-[10px] bg-aguas-yellow text-amber-900 px-3 py-1 rounded-lg font-black uppercase">Ver</span>
                        </button>
                        <button onClick={()=>setVista('scada')} className={`w-full flex justify-between items-center p-5 rounded-2xl border-2 transition-all ${scadaDone ? 'bg-emerald-50 border-aguas-green shadow-inner' : 'bg-white border-gray-200 shadow-sm hover:border-aguas-blue'}`}>
                            <div className="flex items-center space-x-4">
                                <span className="text-2xl">{scadaDone ? '🔒' : '🖥️'}</span>
                                <div className="text-left">
                                    <span className={`font-black text-sm uppercase block ${scadaDone ? 'text-aguas-green' : 'text-gray-800'}`}>Línea Base SCADA</span>
                                    {scadaDone && <span className="text-[9px] font-bold text-emerald-600 uppercase">Por {currentScada.operador_nombre.split('@')[0]}</span>}
                                </div>
                            </div>
                            <span className={`text-[10px] font-black uppercase px-3 py-1 rounded-lg ${scadaDone ? 'bg-emerald-100 text-emerald-800' : 'bg-blue-100 text-blue-800 shadow-sm'}`}>{scadaDone ? 'Ver' : 'Llenar'}</span>
                        </button>
                    </div>

                    {/* Biogás */}
                    <div>
                        <h3 className="text-[10px] font-black text-gray-400 uppercase tracking-widest px-1 mb-3 border-b border-gray-200 pb-2">Circuito de Biogás</h3>
                        <div className="grid grid-cols-2 gap-4">
                            <ModuloCard label="Digestor"   done={digDone}  onClick={()=>navTo('digestor')}   img={urlDigestor}   />
                            <ModuloCard label="Gasómetro"  done={gasDone}  onClick={()=>navTo('gasometro')}  img={urlGasometro}  />
                            <ModuloCard label="Compresores" done={compDone} onClick={()=>navTo('compresores')} img={urlCompresores} />
                            <ModuloCard label="Calderas"   done={caldDone} onClick={()=>navTo('calderas')}   img={urlCalderas}   />
                            <ModuloCard label="Antorchas y GLP" done={antDone} onClick={()=>navTo('antorchas')} img={urlAntorchas} className="col-span-2" />
                        </div>
                    </div>

                    {/* Lodos */}
                    <div>
                        <h3 className="text-[10px] font-black text-gray-400 uppercase tracking-widest px-1 mb-3 border-b border-gray-200 pb-2">Línea de Lodos</h3>
                        <div className="grid grid-cols-2 gap-4">
                            <ModuloCard label="Área 50" done={a50Done} onClick={()=>navTo('area50')} icono="🌊" />
                            <ModuloCard label="Área 60" done={a60Done} onClick={()=>navTo('area60')} icono="🌡️" />
                            <ModuloCard label="Área 70" done={a70Done} onClick={()=>navTo('area70')} icono="⚙️" className="col-span-2" />
                        </div>
                    </div>

                    {/* Progreso */}
                    <div className="bg-white rounded-2xl p-4 shadow-sm border border-gray-100">
                        <div className="flex justify-between items-center mb-2">
                            <p className="text-[10px] font-black text-gray-400 uppercase tracking-widest">Progreso del Turno</p>
                            <p className="text-[10px] font-black text-aguas-blue">{[scadaDone,gasDone,digDone,compDone,caldDone,antDone,a50Done,a60Done,a70Done].filter(Boolean).length} / 9</p>
                        </div>
                        <div className="w-full bg-gray-100 rounded-full h-2.5 overflow-hidden">
                            <div className="bg-aguas-green h-2.5 rounded-full transition-all duration-700" style={{width: `${[scadaDone,gasDone,digDone,compDone,caldDone,antDone,a50Done,a60Done,a70Done].filter(Boolean).length / 9 * 100}%`}}></div>
                        </div>
                    </div>

                    {/* Cierre */}
                    {todosCompletos && (
                        <button onClick={()=>setVista('resumen_final')} className="w-full bg-aguas-dark text-white font-black py-6 rounded-3xl shadow-2xl uppercase tracking-[0.2em] hover:bg-black active:scale-95 transition-all">
                            Revisar y Cerrar Turno
                        </button>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
