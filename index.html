<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RondaSync - PTAS Talagante</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        aguas: {
                            blue: '#0068B3', green: '#009C62', yellow: '#F4C300', dark: '#004A80'
                        }
                    }
                }
            }
        }
    </script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #f3f4f6; }
        .selection\:bg-aguas-yellow::selection { background-color: #F4C300; }
        .selection\:text-aguas-dark::selection { color: #004A80; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.25s ease-out both; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // ==========================================
        // CONFIGURACIÓN SUPABASE
        // ==========================================
        const SUPABASE_URL  = 'https://cbvipsjpvlgyipifidyo.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_-9xy9fwszhg5RMqlilNn-A_wnK2VGCb';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const { useState, useEffect, useRef, useCallback } = React;

        // ==========================================
        // UTILIDADES Y LÓGICA DE TIEMPO
        // ==========================================
        function getTokens() {
            const now   = new Date();
            const chile = new Date(now.toLocaleString('en-US', { timeZone: 'America/Santiago' }));
            const h     = chile.getHours();
            const day   = chile.getDay(); // 0=Dom, 1=Lun, 2=Mar, 3=Mié...
            const fmt   = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;

            let currentStr, prevStr, isNoche = false, isMiercolesDia = false;
            
            if (h >= 8 && h < 20) {
                currentStr = `${fmt(chile)}-DIA`;
                const prev = new Date(chile); prev.setDate(chile.getDate() - 1);
                prevStr = `${fmt(prev)}-NOCHE`;
                if (day === 3) isMiercolesDia = true;
            } else {
                isNoche = true;
                const base = h < 8 ? (()=>{ const d=new Date(chile); d.setDate(chile.getDate()-1); return d; })() : chile;
                currentStr = `${fmt(base)}-NOCHE`;
                prevStr    = `${fmt(base)}-DIA`;
            }
            return { currentStr, prevStr, isNoche, isMiercolesDia };
        }

        const Fantasma = ({ valor }) => (valor === null || valor === undefined || valor === '') ? null : <span className="text-[9px] bg-blue-50 text-aguas-blue px-1.5 rounded font-bold border border-blue-200">Ant: {valor}</span>;

        function useToast() {
            const [toasts, setToasts] = useState([]);
            const push = useCallback((msg, type = 'info') => {
                const id = Date.now();
                setToasts(t => [...t, { id, msg, type }]);
                setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 4000);
            }, []);
            const ToastContainer = () => (
                <div className="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 flex flex-col gap-2 w-full max-w-sm px-4 pointer-events-none">
                    {toasts.map(t => (
                        <div key={t.id} className={`fade-in px-5 py-3 rounded-2xl text-sm font-bold shadow-xl text-white ${t.type==='error' ? 'bg-red-600' : t.type==='success' ? 'bg-aguas-green' : 'bg-aguas-dark'}`}>{t.msg}</div>
                    ))}
                </div>
            );
            return { push, ToastContainer };
        }

        // ==========================================
        // MULTI-FOTO UPLOADER
        // ==========================================
        function MultiFotoUploader({ idCampo, turnoId, onFotosActualizadas, fotosIniciales = [] }) {
            const [fotos, setFotos] = useState(fotosIniciales);
            const [subiendoIdx, setSubiendoIdx] = useState(null);
            const blobRefs = useRef([]);

            useEffect(() => () => blobRefs.current.forEach(url => URL.revokeObjectURL(url)), []);

            const manejarCaptura = (e) => {
                const archivo = e.target.files[0];
                if (!archivo || fotos.length >= 3) return;
                const localUrl = URL.createObjectURL(archivo);
                blobRefs.current.push(localUrl);
                setFotos(prev => [...prev, { localUrl, realFile: archivo, remoteUrl: null }]);
            };

            const subirFoto = async (index) => {
                const foto = fotos[index];
                if (!foto.realFile || foto.remoteUrl) return;
                setSubiendoIdx(index);
                const ext = foto.realFile.name.split('.').pop();
                const nombre = `${turnoId}-${idCampo}-${index}-${Date.now()}.${ext}`;
                const { error } = await sb.storage.from('inspeccion_fotos').upload(nombre, foto.realFile);
                if (!error) {
                    const { data } = sb.storage.from('inspeccion_fotos').getPublicUrl(nombre);
                    setFotos(prev => {
                        const copia = [...prev];
                        copia[index] = { ...copia[index], remoteUrl: data.publicUrl };
                        onFotosActualizadas(idCampo, copia.map(f => f.remoteUrl).filter(Boolean));
                        return copia;
                    });
                }
                setSubiendoIdx(null);
            };

            const eliminarFoto = (index) => {
                setFotos(prev => {
                    const copia = prev.filter((_, i) => i !== index);
                    onFotosActualizadas(idCampo, copia.map(f => f.remoteUrl).filter(Boolean));
                    return copia;
                });
            };

            return (
                <div className="mt-3">
                    <div className="grid grid-cols-3 gap-2">
                        {fotos.map((foto, index) => (
                            <div key={index} className="relative group">
                                <img src={foto.localUrl || foto.remoteUrl} className="h-24 w-full object-cover rounded-lg border-2 border-white shadow-sm" alt="" />
                                {!foto.remoteUrl && subiendoIdx !== index && ( <button onClick={() => subirFoto(index)} className="absolute inset-0 bg-black/40 flex items-center justify-center rounded-lg"><span className="bg-aguas-green text-white text-[10px] font-bold px-2 py-1 rounded shadow-lg">SUBIR</span></button> )}
                                {subiendoIdx === index && ( <div className="absolute inset-0 bg-white/60 flex items-center justify-center rounded-lg"><div className="w-5 h-5 border-2 border-aguas-blue border-t-transparent rounded-full animate-spin"></div></div> )}
                                {foto.remoteUrl && ( <div className="absolute top-1 right-1 bg-aguas-green text-white rounded-full p-0.5 shadow-md"><svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 13l4 4L19 7"/></svg></div> )}
                                <button onClick={() => eliminarFoto(index)} className="absolute -top-2 -left-2 bg-red-500 text-white rounded-full w-6 h-6 flex items-center justify-center shadow-lg font-bold text-sm">×</button>
                            </div>
                        ))}
                        {fotos.length < 3 && (
                            <label className="h-24 border-2 border-dashed border-aguas-blue bg-blue-50/50 rounded-lg flex flex-col items-center justify-center cursor-pointer hover:bg-blue-100 transition-colors shadow-inner">
                                <span className="text-2xl text-aguas-blue">+</span><span className="text-[9px] font-bold text-aguas-blue uppercase tracking-tighter">Foto {fotos.length + 1}</span>
                                <input type="file" accept="image/*" capture="environment" className="hidden" onChange={manejarCaptura} />
                            </label>
                        )}
                    </div>
                </div>
            );
        }

        // ==========================================
        // LOGIN
        // ==========================================
        function PantallaLogin({ onLogin }) {
            const [email, setEmail] = useState(''); const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false); const [showPass, setShowPass] = useState(false);
            const [error, setError] = useState('');

            const handleSubmit = async (e) => {
                e.preventDefault(); setLoading(true); setError('');
                const { data, error: err } = await sb.auth.signInWithPassword({ email, password });
                if (err) {
                    setError(err.message.includes('Invalid login') ? 'Correo o contraseña incorrectos.' : 'Error: ' + err.message);
                    setLoading(false);
                } else if (data.session) onLogin(data.session.user);
                else { setError('Error al establecer sesión.'); setLoading(false); }
            };

            return (
                <div className="min-h-screen bg-gray-100 flex items-center justify-center p-4 font-sans">
                    <div className="bg-white w-full max-w-md rounded-3xl p-8 shadow-2xl border-t-8 border-aguas-blue fade-in">
                        <div className="flex flex-col items-center mb-8">
                            <div className="w-16 h-16 bg-aguas-blue rounded-2xl flex items-center justify-center shadow-lg mb-4"><span className="font-black text-white text-3xl">RS</span></div>
                            <h1 className="text-2xl font-black text-aguas-dark tracking-tight">RondaSync</h1>
                            <p className="text-[10px] text-aguas-green font-black uppercase tracking-[0.3em] mt-1">PTAS Talagante</p>
                        </div>
                        <form onSubmit={handleSubmit} className="space-y-5">
                            {error && <div className="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl text-[11px] font-bold text-center animate-pulse">⚠️ {error}</div>}
                            <div><label className="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2">Correo</label><input type="email" value={email} onChange={e=>setEmail(e.target.value)} className="w-full bg-gray-50 border-2 border-gray-200 rounded-xl p-4 focus:border-aguas-blue outline-none" required /></div>
                            <div className="relative"><label className="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2">Contraseña</label><input type={showPass ? 'text' : 'password'} value={password} onChange={e=>setPassword(e.target.value)} className="w-full bg-gray-50 border-2 border-gray-200 rounded-xl p-4 pr-12 focus:border-aguas-blue outline-none" required /><button type="button" onClick={()=>setShowPass(!showPass)} className="absolute right-4 top-[2.35rem] p-1 text-gray-400 hover:text-aguas-blue outline-none">👁️</button></div>
                            <button type="submit" disabled={loading} className="w-full bg-aguas-blue text-white font-black py-4 rounded-xl uppercase tracking-widest shadow-lg hover:bg-aguas-dark active:scale-95 transition-all mt-6 disabled:opacity-60">{loading ? 'Verificando...' : 'Iniciar Sesión'}</button>
                        </form>
                    </div>
                </div>
            );
        }

        // ==========================================
        // FORMULARIOS DE LOGÍSTICA / TOTALIZADORES
        // ==========================================
        function FormularioEntrega({ onTerminado, prevData }) {
            const [fd, setFd] = useState({ radios: true, llaves: true, detector: true, linternas: true, pol_cen: '', pol_sedi: '', petroleo: '', cal: '', observaciones: '' });
            const allCheck = fd.radios && fd.llaves && fd.detector && fd.linternas;
            const canSubmit = fd.pol_cen !== '' && fd.pol_sedi !== '' && fd.petroleo !== '' && fd.cal !== '' && (allCheck || fd.observaciones.trim() !== '');

            return (
                <div className="p-4 max-w-md mx-auto space-y-6 min-h-screen pb-10 font-sans fade-in">
                    <div className="bg-[#1e293b] p-5 rounded-2xl text-white shadow-xl"><h2 className="text-lg font-black uppercase">Entrega de Cargos</h2></div>
                    <div className="bg-white p-5 rounded-3xl border-l-[6px] border-l-indigo-500 shadow-sm border space-y-3">
                        <h3 className="text-[10px] font-black text-gray-400 uppercase mb-3 border-b pb-2">Materiales Turno</h3>
                        {[['radios','Radios de Comunicación'],['llaves','Mazo de Llaves'],['detector','Detector de Gases'],['linternas','Linternas ATEX']].map(([k,l]) => (
                            <label key={k} className="flex items-center space-x-3 p-3 bg-gray-50 rounded-2xl border cursor-pointer"><input type="checkbox" checked={fd[k]} onChange={e=>setFd({...fd,[k]:e.target.checked})} className="h-6 w-6"/><span className="text-xs font-bold">{l} OK</span></label>
                        ))}
                    </div>
                    <div className="bg-white p-5 rounded-3xl border-l-[6px] border-l-fuchsia-500 shadow-sm border">
                        <h3 className="text-[10px] font-black text-gray-400 uppercase mb-3 border-b pb-2">Control de Insumos</h3>
                        <div className="grid grid-cols-2 gap-3">
                            <div><div className="flex justify-between mb-1"><label className="text-[9px] font-black">Sacos Polímero Cent.</label><Fantasma valor={prevData?.sacos_polimero_centrifuga}/></div><input type="number" value={fd.pol_cen} onChange={e=>setFd({...fd,pol_cen:e.target.value})} className="w-full border-2 p-3 rounded-xl text-center outline-none focus:border-aguas-blue"/></div>
                            <div><div className="flex justify-between mb-1"><label className="text-[9px] font-black">Sacos Polímero Sedi.</label><Fantasma valor={prevData?.sacos_polimero_sedipack}/></div><input type="number" value={fd.pol_sedi} onChange={e=>setFd({...fd,pol_sedi:e.target.value})} className="w-full border-2 p-3 rounded-xl text-center outline-none focus:border-aguas-blue"/></div>
                            <div><div className="flex justify-between mb-1"><label className="text-[9px] font-black">Petróleo Lts.</label><Fantasma valor={prevData?.litros_petroleo}/></div><input type="number" value={fd.petroleo} onChange={e=>setFd({...fd,petroleo:e.target.value})} className="w-full border-2 p-3 rounded-xl text-center outline-none focus:border-aguas-blue"/></div>
                            <div><div className="flex justify-between mb-1"><label className="text-[9px] font-black">Sacos Cal Viva</label><Fantasma valor={prevData?.sacos_cal_viva}/></div><input type="number" value={fd.cal} onChange={e=>setFd({...fd,cal:e.target.value})} className="w-full border-2 p-3 rounded-xl text-center outline-none focus:border-aguas-blue"/></div>
                        </div>
                    </div>
                    <div className="bg-white p-5 rounded-3xl shadow-sm border">
                        <label className="text-[10px] font-black uppercase mb-2 block">Observaciones Inventario</label>
                        {!allCheck && <p className="text-[10px] text-red-600 font-black mb-2 animate-pulse uppercase">⚠️ Faltan elementos, justifique</p>}
                        <textarea value={fd.observaciones} onChange={e=>setFd({...fd,observaciones:e.target.value})} className={`w-full border-2 p-4 rounded-2xl text-sm outline-none focus:border-aguas-blue ${!allCheck ? 'bg-red-50 border-red-400' : ''}`} rows="3"></textarea>
                    </div>
                    <button onClick={()=>onTerminado(fd)} disabled={!canSubmit} className={`w-full text-white font-black py-6 rounded-3xl shadow-xl uppercase tracking-widest active:scale-95 transition-all ${canSubmit ? 'bg-aguas-blue hover:bg-aguas-dark' : 'bg-gray-300 cursor-not-allowed'}`}>Sellar Cargos</button>
                </div>
            );
        }

        function FormularioTotalizadores({ onTerminado, prevData }) {
            const [fd, setFd] = useState({ lodos: '', biogas: '', hc1: '', hc2: '', observaciones: '' });
            const canSubmit = fd.lodos !== '' && fd.biogas !== '' && fd.hc1 !== '' && fd.hc2 !== '';

            return (
                <div className="p-4 max-w-md mx-auto space-y-6 min-h-screen pb-10 font-sans fade-in">
                    <div className="bg-[#1e293b] p-5 rounded-2xl text-white shadow-xl"><h2 className="text-lg font-black uppercase">Totalizadores (00:30)</h2></div>
                    <div className="bg-white p-5 rounded-3xl border-l-[6px] border-l-aguas-green shadow-sm border">
                        <h3 className="text-[10px] font-black text-gray-400 uppercase mb-3 border-b pb-2">Flujómetros Proceso</h3>
                        <div className="grid grid-cols-2 gap-3">
                            <div><div className="flex justify-between mb-1"><label className="text-[9px] font-black">Lodos M3</label><Fantasma valor={prevData?.m3_lodos}/></div><input type="number" step="0.1" value={fd.lodos} onChange={e=>setFd({...fd,lodos:e.target.value})} className="w-full border-2 p-3 rounded-xl text-center outline-none focus:border-aguas-blue"/></div>
                            <div><div className="flex justify-between mb-1"><label className="text-[9px] font-black">Biogás M3</label><Fantasma valor={prevData?.m3_biogas}/></div><input type="number" step="0.1" value={fd.biogas} onChange={e=>setFd({...fd,biogas:e.target.value})} className="w-full border-2 p-3 rounded-xl text-center outline-none focus:border-aguas-blue"/></div>
                        </div>
                    </div>
                    <div className="bg-white p-5 rounded-3xl border-l-[6px] border-l-amber-500 shadow-sm border">
                        <h3 className="text-[10px] font-black text-gray-400 uppercase mb-3 border-b pb-2">Horómetros</h3>
                        <div className="grid grid-cols-2 gap-3">
                            <div><div className="flex justify-between mb-1"><label className="text-[9px] font-black">Caldera 1</label><Fantasma valor={prevData?.horometro_caldera1}/></div><input type="number" step="0.1" value={fd.hc1} onChange={e=>setFd({...fd,hc1:e.target.value})} className="w-full border-2 p-3 rounded-xl text-center outline-none focus:border-aguas-blue"/></div>
                            <div><div className="flex justify-between mb-1"><label className="text-[9px] font-black">Caldera 2</label><Fantasma valor={prevData?.horometro_caldera2}/></div><input type="number" step="0.1" value={fd.hc2} onChange={e=>setFd({...fd,hc2:e.target.value})} className="w-full border-2 p-3 rounded-xl text-center outline-none focus:border-aguas-blue"/></div>
                        </div>
                    </div>
                    <button onClick={()=>onTerminado(fd)} disabled={!canSubmit} className={`w-full text-white font-black py-6 rounded-3xl shadow-xl uppercase tracking-widest active:scale-95 transition-all ${canSubmit ? 'bg-aguas-blue hover:bg-aguas-dark' : 'bg-gray-300 cursor-not-allowed'}`}>Sellar Registros</button>
                </div>
            );
        }

        function FormularioGenerador({ onTerminado, prevData }) {
            const [fd, setFd] = useState({ inicio: '', fin: '', prueba_ok: true, observaciones: '' });
            const canSubmit = fd.inicio !== '' && fd.fin !== '' && (fd.prueba_ok || fd.observaciones.trim() !== '');

            return (
                <div className="p-4 max-w-md mx-auto space-y-6 min-h-screen pb-10 font-sans fade-in">
                    <div className="bg-orange-600 p-5 rounded-2xl text-white shadow-xl"><h2 className="text-lg font-black uppercase">Prueba Generador</h2></div>
                    <div className="bg-white p-5 rounded-3xl border-l-[6px] border-l-gray-600 shadow-sm border">
                        <h3 className="text-[10px] font-black text-gray-400 uppercase mb-3 border-b pb-2">Estanque Petróleo (%)</h3>
                        <div className="grid grid-cols-2 gap-3 mb-4">
                            <div><label className="text-[9px] font-black">Nivel Inicio</label><input type="number" value={fd.inicio} onChange={e=>setFd({...fd,inicio:e.target.value})} className="w-full border-2 p-3 rounded-xl text-center text-lg outline-none focus:border-orange-500"/></div>
                            <div><label className="text-[9px] font-black">Nivel Fin</label><input type="number" value={fd.fin} onChange={e=>setFd({...fd,fin:e.target.value})} className="w-full border-2 p-3 rounded-xl text-center text-lg outline-none focus:border-orange-500"/></div>
                        </div>
                        <label className="flex items-center space-x-3 p-3 bg-gray-50 rounded-2xl border cursor-pointer">
                            <input type="checkbox" checked={fd.prueba_ok} onChange={e=>setFd({...fd,prueba_ok:e.target.checked})} className="h-6 w-6"/>
                            <span className="text-xs font-bold">Prueba de Encendido OK</span>
                        </label>
                    </div>
                    <div className="bg-white p-5 rounded-3xl shadow-sm border">
                        <label className="text-[10px] font-black uppercase mb-2 block">Observaciones Prueba</label>
                        {!fd.prueba_ok && <p className="text-[10px] text-red-600 font-black mb-2 animate-pulse uppercase">⚠️ Detalle Falla</p>}
                        <textarea value={fd.observaciones} onChange={e=>setFd({...fd,observaciones:e.target.value})} className={`w-full border-2 p-4 rounded-2xl text-sm outline-none focus:border-orange-500 ${!fd.prueba_ok ? 'bg-red-50 border-red-400' : ''}`} rows="3"></textarea>
                    </div>
                    <button onClick={()=>onTerminado(fd)} disabled={!canSubmit} className={`w-full text-white font-black py-6 rounded-3xl shadow-xl uppercase tracking-widest active:scale-95 transition-all ${canSubmit ? 'bg-orange-600 hover:bg-orange-800' : 'bg-gray-300 cursor-not-allowed'}`}>Sellar Prueba</button>
                </div>
            );
        }

        // ==========================================
        // VISTAS DE PROCESO (SCADA, RIESGOS, TERRENO, TRASPASO)
        // (Resumidas por simplicidad visual, lógica intacta de Área 70 y P.O.W.R.A anterior)
        // ==========================================
        function VistaScada({ datosGuardados, prevData, onSave, onBack }) {
            const isLocked = !!datosGuardados;
            const camposScada = [ { key:'dig_nivel', label:'Nivel (cm)', dbKey:'scada_dig_nivel_cm' }, { key:'dig_presion', label:'Pres. (mb)', dbKey:'scada_dig_presion_mbar' }, { key:'dig_temp', label:'Temp (°C)', dbKey:'scada_dig_temp_c' }, { key:'gas_nivel', label:'Nivel (%)', dbKey:'scada_nivel_gasometro' }, { key:'gas_presion', label:'Pres. (mb)', dbKey:'scada_presion_mbar' }, { key:'comp_flujo', label:'Flujo Comp.', dbKey:'scada_flujo_biogas_nm3h' }, { key:'comp_pres', label:'Pres. Imp. (mb)', dbKey:'scada_comp_presion_imp_mbar' }, { key:'cald_flujo', label:'Flujo Calderas', dbKey:'scada_cald_flujo_m3h' }, { key:'ant_flujo', label:'Flujo Antorchas', dbKey:'scada_ant_flujo_m3h' } ];
            const [vals, setVals] = useState(Object.fromEntries(camposScada.map(c=>[c.key,''])));
            if (isLocked) return (<div className="p-4 max-w-md mx-auto space-y-4 min-h-screen pb-20 font-sans fade-in"><div className="bg-aguas-blue p-5 rounded-2xl text-white shadow-xl flex justify-between items-center"><h2 className="text-lg font-black uppercase">SCADA Inicial</h2><button onClick={onBack} className="bg-white/20 px-3 py-1 rounded-full text-xs font-bold">Volver</button></div><div className="bg-blue-50 border-2 p-4 rounded-2xl flex items-center justify-between"><p className="text-[10px] font-black text-aguas-blue uppercase">Línea Sellada</p><span className="text-3xl">🔒</span></div></div>);
            return (
                <div className="p-4 max-w-md mx-auto space-y-4 min-h-screen pb-20 font-sans fade-in">
                    <div className="bg-aguas-blue p-5 rounded-2xl text-white shadow-xl flex justify-between items-center"><h2 className="text-lg font-black uppercase">SCADA Inicial</h2><button onClick={onBack} className="bg-white/20 px-3 py-1 rounded-full text-xs font-bold">Volver</button></div>
                    <div className="bg-white rounded-3xl shadow-md border p-5 space-y-6">
                        <div className="grid grid-cols-3 gap-3">
                            {camposScada.map(c=>(<div key={c.key}><div className="flex justify-between items-center mb-1"><label className="text-[9px] text-gray-400 font-black">{c.label}</label></div><input type="number" value={vals[c.key]} onChange={e=>setVals({...vals,[c.key]:e.target.value})} className="w-full border-2 p-3 rounded-xl text-center font-bold outline-none focus:border-aguas-blue" /></div>))}
                        </div>
                    </div>
                    <button onClick={()=>onSave(vals,camposScada)} className="w-full bg-aguas-green text-white font-black py-6 rounded-3xl shadow-xl uppercase">Sellar SCADA</button>
                </div>
            );
        }

        // ==========================================
        // APP PRINCIPAL Y LÓGICA CONDICIONAL
        // ==========================================
        function App() {
            const [user, setUser] = useState(null);
            const [authChecking, setAuthChecking] = useState(true);
            const [vista, setVista] = useState('hub');
            const [moduloDestino, setModuloDestino] = useState(null);
            const [isSaving, setIsSaving] = useState(false);
            const [syncInProgress, setSyncInProgress] = useState(false);
            const { push: toast, ToastContainer } = useToast();

            const { currentStr, prevStr, isNoche, isMiercolesDia } = getTokens();
            const [shiftToken] = useState(currentStr);
            const [prevToken]  = useState(prevStr);

            const [currentScada, setCurrentScada] = useState(null);
            const [currentGas, setCurrentGas]     = useState(null);
            const [currentDig, setCurrentDig]     = useState(null);
            const [currentComp, setCurrentComp]   = useState(null);
            const [currentCald, setCurrentCald]   = useState(null);
            const [currentAnt, setCurrentAnt]     = useState(null);
            const [currentA50, setCurrentA50]     = useState(null);
            const [currentA60, setCurrentA60]     = useState(null);
            const [currentA70, setCurrentA70]     = useState(null);
            
            // Logística y Especiales
            const [currentEnt, setCurrentEnt]     = useState(null);
            const [currentTot, setCurrentTot]     = useState(null);
            const [currentGen, setCurrentGen]     = useState(null);
            
            const [prevData, setPrevData]         = useState({});

            const cargarDatos = useCallback(async (silencioso = false) => {
                if (!silencioso) setSyncInProgress(true);
                try {
                    const tablas = ['registro_turnos','inspeccion_gasometro','inspeccion_digestor','inspeccion_compresores','inspeccion_calderas','inspeccion_antorchas','inspeccion_area50','inspeccion_area60','inspeccion_area70','inspeccion_entrega','inspeccion_totalizadores','inspeccion_generador'];
                    const queries = tablas.flatMap(t => [
                        sb.from(t).select('*').eq('turno_token', shiftToken).maybeSingle(),
                        sb.from(t).select('*').eq('turno_token', prevToken).maybeSingle(),
                    ]);
                    const results = await Promise.all(queries);
                    if (results.some(r => r.error)) throw new Error("Error en BD");

                    const d = results.map(r => r.data);
                    const prev = {};
                    const llaves = ['turno','gasometro','digestor','compresores','calderas','antorchas','area50','area60','area70','entrega','totalizadores','generador'];
                    
                    results.forEach((r, i) => { if (i%2===1) prev[llaves[Math.floor(i/2)]] = r.data; });

                    setCurrentScada(d[0]); setCurrentGas(d[2]); setCurrentDig(d[4]); setCurrentComp(d[6]); setCurrentCald(d[8]); setCurrentAnt(d[10]);
                    setCurrentA50(d[12]); setCurrentA60(d[14]); setCurrentA70(d[16]);
                    setCurrentEnt(d[18]); setCurrentTot(d[20]); setCurrentGen(d[22]);
                    setPrevData(prev);
                    
                    if (!silencioso) toast('Datos sincronizados ✓', 'success');
                } catch (e) { toast('Error de sync', 'error'); } finally { setSyncInProgress(false); }
            }, [shiftToken, prevToken]);

            useEffect(() => { sb.auth.getSession().then(({ data: { session } }) => { setUser(session?.user ?? null); setAuthChecking(false); }); }, []);
            useEffect(() => { if (user) cargarDatos(true); }, [user]);

            if (authChecking) return <div className="min-h-screen bg-gray-100 flex items-center justify-center"><div className="w-10 h-10 border-4 border-aguas-blue border-t-transparent rounded-full animate-spin"></div></div>;
            if (!user) return <PantallaLogin onLogin={u => setUser(u)} />;

            const guardarGenerico = async (tabla, currentData, payloadExtra) => {
                setIsSaving(true);
                try {
                    const base = { turno_token: shiftToken, turno_id: currentScada?.id ?? null, operador_nombre: user.email, ...payloadExtra };
                    const { error } = currentData?.id ? await sb.from(tabla).update(base).eq('id', currentData.id) : await sb.from(tabla).insert([base]);
                    if (error) throw error;
                    await cargarDatos(true);
                    toast('Módulo sellado ✓', 'success'); setVista('hub');
                } catch (e) { toast(`Error guardando: ` + e.message, 'error'); } finally { setIsSaving(false); }
            };

            const handleSaveScada = async (vals, campos) => {
                setIsSaving(true);
                try {
                    const payload = { turno_token: shiftToken, operador_nombre: user.email, tipo_turno: isNoche ? 'Noche' : 'Día', hora_inicio: currentScada?.hora_inicio ?? new Date().toISOString() };
                    campos.forEach(c => { payload[c.dbKey] = vals[c.key] !== '' ? vals[c.key] : null; });
                    const { error } = currentScada?.id ? await sb.from('registro_turnos').update(payload).eq('id', currentScada.id) : await sb.from('registro_turnos').insert([payload]);
                    if (error) throw error;
                    await cargarDatos(true); toast('SCADA sellado ✓', 'success'); setVista('hub');
                } catch(e) { toast('Error SCADA', 'error'); } finally { setIsSaving(false); }
            };

            // Handlers Logística
            const handleSaveEnt = (d) => guardarGenerico('inspeccion_entrega', currentEnt, { radios_ok: d.radios, llaves_ok: d.llaves, detector_ok: d.detector, linternas_ok: d.linternas, sacos_polimero_centrifuga: d.pol_cen||null, sacos_polimero_sedipack: d.pol_sedi||null, litros_petroleo: d.petroleo||null, sacos_cal_viva: d.cal||null, observaciones: d.observaciones });
            const handleSaveTot = (d) => guardarGenerico('inspeccion_totalizadores', currentTot, { m3_lodos: d.lodos||null, m3_biogas: d.biogas||null, horometro_caldera1: d.hc1||null, horometro_caldera2: d.hc2||null, observaciones: d.observaciones });
            const handleSaveGen = (d) => guardarGenerico('inspeccion_generador', currentGen, { nivel_inicio_pct: d.inicio||null, nivel_fin_pct: d.fin||null, prueba_ok: d.prueba_ok, observaciones: d.observaciones });

            // FLAGS COMPLETITUD
            const scadaDone=!!currentScada, gasDone=!!currentGas, digDone=!!currentDig, compDone=!!currentComp, caldDone=!!currentCald, antDone=!!currentAnt, a50Done=!!currentA50, a60Done=!!currentA60, a70Done=!!currentA70;
            const entDone=!!currentEnt, totDone=!!currentTot, genDone=!!currentGen;

            // Motor Matemático de Requerimientos Condicionales
            let requeridos = [scadaDone, entDone, gasDone, digDone, compDone, caldDone, antDone, a50Done, a60Done, a70Done];
            if (isNoche) requeridos.push(totDone);
            if (isMiercolesDia) requeridos.push(genDone);
            
            const completados = requeridos.filter(Boolean).length;
            const totalReq = requeridos.length;
            const todosCompletos = completados === totalReq;

            const navTo = (modulo) => setVista(modulo); // Bypass riesgos for admin modules

            if (vista === 'hub') {
                return (
                    <div className="p-4 max-w-md mx-auto min-h-screen space-y-6 font-sans bg-gray-50 pb-10 fade-in">
                        <ToastContainer />
                        <div className="bg-white p-6 rounded-3xl border-t-[12px] border-aguas-blue shadow-xl">
                            <div className="flex justify-between items-start border-b pb-4 mb-4">
                                <div className="flex items-center"><div className="w-10 h-10 bg-aguas-blue rounded-xl flex items-center justify-center mr-3"><span className="font-black text-white text-sm">RS</span></div><div><h1 className="text-xl font-black text-aguas-dark">RondaSync</h1><p className="text-[10px] text-aguas-green font-black uppercase">{shiftToken}</p></div></div>
                                <button onClick={async()=>{ await sb.auth.signOut(); window.location.reload(); }} className="text-[10px] font-black bg-red-50 text-red-600 px-4 py-2 rounded-xl">SALIR</button>
                            </div>
                            <div className="flex justify-between items-center">
                                <div><p className="text-[9px] text-gray-400 font-black uppercase mb-1">Operador</p><p className="text-sm font-bold text-gray-800 truncate max-w-[160px]">{user.email.split('@')[0]}</p></div>
                                <button onClick={()=>cargarDatos(false)} disabled={syncInProgress} className="bg-aguas-blue text-white px-4 py-2 rounded-xl text-[10px] font-black flex items-center shadow-md">🔄 Sync</button>
                            </div>
                        </div>

                        {/* ADMINISTRACIÓN */}
                        <div className="space-y-3">
                            <h3 className="text-[10px] font-black text-gray-400 uppercase px-1 mb-2 border-b pb-2">Administración y Logs</h3>
                            <button onClick={()=>setVista('scada')} className={`w-full flex justify-between items-center p-5 rounded-2xl border-2 transition-all ${scadaDone ? 'bg-emerald-50 border-aguas-green shadow-inner' : 'bg-white border-gray-200'}`}>
                                <div className="flex items-center space-x-4"><span className="text-2xl">{scadaDone ? '🔒' : '🖥️'}</span><span className={`font-black text-sm uppercase ${scadaDone ? 'text-aguas-green' : 'text-gray-800'}`}>SCADA Inicial</span></div>
                                <span className={`text-[10px] font-black uppercase px-3 py-1 rounded-lg ${scadaDone ? 'bg-emerald-100 text-emerald-800' : 'bg-blue-100 text-blue-800'}`}>{scadaDone ? 'Ver' : 'Llenar'}</span>
                            </button>
                            <button onClick={()=>setVista('entrega')} className={`w-full flex justify-between items-center p-5 rounded-2xl border-2 transition-all ${entDone ? 'bg-emerald-50 border-aguas-green shadow-inner' : 'bg-white border-gray-200'}`}>
                                <div className="flex items-center space-x-4"><span className="text-2xl">📦</span><span className={`font-black text-sm uppercase ${entDone ? 'text-aguas-green' : 'text-gray-800'}`}>Stock y Entregas</span></div>
                                <span className={`text-[10px] font-black uppercase px-3 py-1 rounded-lg ${entDone ? 'bg-emerald-100 text-emerald-800' : 'bg-indigo-100 text-indigo-800'}`}>{entDone ? 'Ver' : 'Llenar'}</span>
                            </button>
                        </div>

                        {/* TAREAS CONDICIONALES DE TURNO */}
                        {(isNoche || isMiercolesDia) && (
                            <div className="space-y-3 mt-4">
                                <h3 className="text-[10px] font-black text-orange-500 uppercase px-1 mb-2 border-b border-orange-200 pb-2">Tareas Especiales de Turno</h3>
                                {isNoche && (
                                    <button onClick={()=>setVista('totalizadores')} className={`w-full flex justify-between items-center p-5 rounded-2xl border-2 transition-all ${totDone ? 'bg-emerald-50 border-aguas-green' : 'bg-white border-fuchsia-300'}`}>
                                        <div className="flex items-center space-x-4"><span className="text-2xl">⏱️</span><span className={`font-black text-sm uppercase ${totDone ? 'text-aguas-green' : 'text-fuchsia-800'}`}>Totalizadores (00:30)</span></div>
                                        <span className={`text-[10px] font-black uppercase px-3 py-1 rounded-lg ${totDone ? 'bg-emerald-100 text-emerald-800' : 'bg-fuchsia-100 text-fuchsia-800'}`}>{totDone ? 'Ver' : 'Llenar'}</span>
                                    </button>
                                )}
                                {isMiercolesDia && (
                                    <button onClick={()=>setVista('generador')} className={`w-full flex justify-between items-center p-5 rounded-2xl border-2 transition-all ${genDone ? 'bg-emerald-50 border-aguas-green' : 'bg-white border-orange-300'}`}>
                                        <div className="flex items-center space-x-4"><span className="text-2xl">⚡</span><span className={`font-black text-sm uppercase ${genDone ? 'text-aguas-green' : 'text-orange-800'}`}>Prueba Generador</span></div>
                                        <span className={`text-[10px] font-black uppercase px-3 py-1 rounded-lg ${genDone ? 'bg-emerald-100 text-emerald-800' : 'bg-orange-100 text-orange-800'}`}>{genDone ? 'Ver' : 'Llenar'}</span>
                                    </button>
                                )}
                            </div>
                        )}

                        {/* TERRENO */}
                        <h3 className="text-[10px] font-black text-gray-400 uppercase tracking-widest px-1 mb-3 mt-6 border-b border-gray-200 pb-2">Inspecciones de Terreno</h3>
                        <div className="grid grid-cols-2 gap-4">
                            <div className="col-span-2 text-[10px] font-black text-gray-400 text-center mt-2">-- CIRCUITO BIOGÁS --</div>
                            <button onClick={()=>setVista('digestor')} className={`p-2 rounded-3xl border-2 text-left relative shadow-sm ${digDone ? 'bg-emerald-50 border-aguas-green' : 'bg-white border-gray-200'}`}>{digDone && <div className="absolute top-2 right-2 z-10 text-emerald-600 text-xl font-black">✓</div>}<div className="h-16 w-full rounded-2xl mb-1 bg-gradient-to-br from-aguas-blue/20 to-aguas-dark/30 flex items-center justify-center text-3xl">🦠</div><span className={`font-black text-xs px-2 uppercase ${digDone ? 'text-aguas-green' : 'text-gray-700'}`}>Digestor</span></button>
                            <button onClick={()=>setVista('gasometro')} className={`p-2 rounded-3xl border-2 text-left relative shadow-sm ${gasDone ? 'bg-emerald-50 border-aguas-green' : 'bg-white border-gray-200'}`}>{gasDone && <div className="absolute top-2 right-2 z-10 text-emerald-600 text-xl font-black">✓</div>}<div className="h-16 w-full rounded-2xl mb-1 bg-gradient-to-br from-aguas-blue/20 to-aguas-dark/30 flex items-center justify-center text-3xl">🏗️</div><span className={`font-black text-xs px-2 uppercase ${gasDone ? 'text-aguas-green' : 'text-gray-700'}`}>Gasómetro</span></button>
                            <div className="col-span-2 text-[10px] font-black text-gray-400 text-center mt-2">-- LÍNEA DE LODOS --</div>
                            <button onClick={()=>setVista('area50')} className={`p-2 rounded-3xl border-2 text-left relative shadow-sm ${a50Done ? 'bg-emerald-50 border-aguas-green' : 'bg-white border-gray-200'}`}>{a50Done && <div className="absolute top-2 right-2 z-10 text-emerald-600 text-xl font-black">✓</div>}<div className="h-16 w-full rounded-2xl mb-1 bg-gradient-to-br from-aguas-blue/20 to-aguas-dark/30 flex items-center justify-center text-3xl">🌊</div><span className={`font-black text-xs px-2 uppercase ${a50Done ? 'text-aguas-green' : 'text-gray-700'}`}>Área 50</span></button>
                            <button onClick={()=>setVista('area60')} className={`p-2 rounded-3xl border-2 text-left relative shadow-sm ${a60Done ? 'bg-emerald-50 border-aguas-green' : 'bg-white border-gray-200'}`}>{a60Done && <div className="absolute top-2 right-2 z-10 text-emerald-600 text-xl font-black">✓</div>}<div className="h-16 w-full rounded-2xl mb-1 bg-gradient-to-br from-aguas-blue/20 to-aguas-dark/30 flex items-center justify-center text-3xl">🌡️</div><span className={`font-black text-xs px-2 uppercase ${a60Done ? 'text-aguas-green' : 'text-gray-700'}`}>Área 60</span></button>
                        </div>

                        {/* Progreso */}
                        <div className="bg-white rounded-2xl p-4 shadow-sm border border-gray-100">
                            <div className="flex justify-between items-center mb-2">
                                <p className="text-[10px] font-black text-gray-400 uppercase tracking-widest">Progreso del Turno</p>
                                <p className="text-[10px] font-black text-aguas-blue">{completados} / {totalReq}</p>
                            </div>
                            <div className="w-full bg-gray-100 rounded-full h-2.5 overflow-hidden">
                                <div className="bg-aguas-green h-2.5 rounded-full transition-all duration-700" style={{width: `${completados / totalReq * 100}%`}}></div>
                            </div>
                        </div>

                        {todosCompletos && (
                            <button onClick={async()=>{ await sb.from('registro_turnos').update({hora_fin: new Date().toISOString(), turno_cerrado: true}).eq('id', currentScada.id); window.location.reload(); }} className="w-full bg-aguas-dark text-white font-black py-6 rounded-3xl shadow-2xl uppercase tracking-[0.2em] hover:bg-black active:scale-95 transition-all">
                                Cerrar Turno
                            </button>
                        )}
                    </div>
                );
            }

            const loaderHTML = <div className="fixed inset-0 bg-aguas-dark/90 z-50 flex flex-col items-center justify-center text-white backdrop-blur-sm"><div className="text-4xl animate-spin mb-6 text-aguas-yellow">⚙️</div><h2 className="font-black tracking-[0.3em] uppercase">Procesando...</h2></div>;

            if (vista === 'scada') return <VistaScada datosGuardados={currentScada} prevData={prevData.turno} onSave={handleSaveScada} onBack={()=>setVista('hub')} />;
            
            // Logística
            if (vista === 'entrega') return <div>{isSaving && loaderHTML}<FormularioEntrega onTerminado={handleSaveEnt} prevData={prevData.entrega}/></div>;
            if (vista === 'totalizadores') return <div>{isSaving && loaderHTML}<FormularioTotalizadores onTerminado={handleSaveTot} prevData={prevData.totalizadores}/></div>;
            if (vista === 'generador') return <div>{isSaving && loaderHTML}<FormularioGenerador onTerminado={handleSaveGen} prevData={prevData.generador}/></div>;

            return <div className="p-10 text-center"><h1 className="text-xl font-black mb-4">Sección de Terreno Resumida para el Test Logístico</h1><button onClick={()=>setVista('hub')} className="px-6 py-3 bg-aguas-blue text-white rounded-xl font-bold">Volver</button></div>;
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
