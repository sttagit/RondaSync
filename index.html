<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RondaSync - Inspección Biogás</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // ==========================================
        // 1. CONFIGURACIÓN DE SUPABASE
        // IMPORTANTE: Reemplaza estos valores con las credenciales de tu panel de Supabase
        // ==========================================
        const SUPABASE_URL = 'TU_URL_DE_SUPABASE';
        const SUPABASE_ANON_KEY = 'TU_ANON_KEY_DE_SUPABASE';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const { useState } = React;

        // ==========================================
        // 2. COMPONENTE: INICIO DE TURNO (GABINETE)
        // ==========================================
        function InicioTurno({ onTurnoIniciado }) {
            const [loading, setLoading] = useState(false);
            const [formData, setFormData] = useState({
                operador_nombre: '',
                tipo_turno: 'Mañana',
                scada_nivel_gasometro: '',
                scada_presion_mbar: '',
                scada_flujo_biogas_nm3h: ''
            });
            const [atexConfirmado, setAtexConfirmado] = useState(false);

            const handleChange = (e) => {
                setFormData({ ...formData, [e.target.name]: e.target.value });
            };

            const iniciarRonda = async () => {
                if (!atexConfirmado || !formData.operador_nombre) {
                    return alert("Debes ingresar tu nombre y confirmar el protocolo ATEX.");
                }
                
                setLoading(true);
                const { data, error } = await supabaseClient
                    .from('registro_turnos')
                    .insert([{
                        operador_nombre: formData.operador_nombre,
                        tipo_turno: formData.tipo_turno,
                        scada_nivel_gasometro: formData.scada_nivel_gasometro || null,
                        scada_presion_mbar: formData.scada_presion_mbar || null,
                        scada_flujo_biogas_nm3h: formData.scada_flujo_biogas_nm3h || null,
                        atex_confirmado: atexConfirmado
                    }])
                    .select();

                setLoading(false);

                if (error) {
                    console.error("Error iniciando turno:", error);
                    alert("Error al conectar con la base de datos.");
                } else if (data && data.length > 0) {
                    onTurnoIniciado(data[0].id);
                }
            };

            return (
                <div className="p-4 max-w-md mx-auto bg-gray-100 min-h-screen space-y-4">
                    <h2 className="text-xl font-bold text-gray-800 border-b pb-2">Inicio de Turno</h2>
                    
                    <div className="bg-white rounded-xl shadow-sm p-4 space-y-3">
                        <div>
                            <label className="block text-xs font-medium text-gray-500">Operador</label>
                            <input type="text" name="operador_nombre" onChange={handleChange} className="mt-1 w-full rounded border p-2 bg-gray-50" placeholder="Nombre y Apellido" />
                        </div>
                        <div>
                            <label className="block text-xs font-medium text-gray-500">Turno</label>
                            <select name="tipo_turno" onChange={handleChange} className="mt-1 w-full rounded border p-2 bg-gray-50">
                                <option>Mañana</option><option>Tarde</option><option>Noche</option>
                            </select>
                        </div>
                    </div>

                    <div className="bg-white rounded-xl shadow-sm p-4">
                        <h3 className="text-sm font-bold text-gray-800 mb-3">Registro Sala SCADA</h3>
                        <div className="grid grid-cols-2 gap-3">
                            <input type="number" step="0.1" name="scada_nivel_gasometro" onChange={handleChange} className="rounded border p-2 bg-gray-50 text-center font-bold" placeholder="Nivel %" />
                            <input type="number" step="0.1" name="scada_presion_mbar" onChange={handleChange} className="rounded border p-2 bg-gray-50 text-center font-bold" placeholder="Presión mbar" />
                        </div>
                    </div>

                    <div className="bg-white rounded-xl shadow-sm p-4 border-2 border-red-100">
                        <h3 className="text-sm font-bold text-red-700 mb-2 flex items-center">
                            Protocolo de Seguridad (ATEX)
                        </h3>
                        <label className="flex items-start space-x-3 p-3 bg-red-50 rounded-lg">
                            <input type="checkbox" checked={atexConfirmado} onChange={(e) => setAtexConfirmado(e.target.checked)} className="h-6 w-6 text-red-600 mt-1" />
                            <span className="text-sm text-red-900">He revisado las condiciones del proceso, el plano ATEX y comprendo los riesgos asociados a esta ronda.</span>
                        </label>
                    </div>

                    <button 
                        onClick={iniciarRonda} disabled={!atexConfirmado || loading}
                        className={`w-full font-bold py-4 rounded-xl shadow-lg text-white transition-colors ${atexConfirmado && !loading ? 'bg-green-600 hover:bg-green-700' : 'bg-gray-400 cursor-not-allowed'}`}>
                        {loading ? 'Sincronizando...' : 'INICIAR RONDA EN TERRENO'}
                    </button>
                </div>
            );
        }

        // ==========================================
        // 3. COMPONENTE: RONDA GASÓMETRO (TERRENO)
        // ==========================================
        function RondaGasometro({ turnoId, onRondaFinalizada }) {
            const [loading, setLoading] = useState(false);
            const [formData, setFormData] = useState({
                senalizaciones_ok: false,
                alarmas_desactivadas: true,
                estado_anclajes: 'Óptimo',
                altura_interna_m: '',
                presion_inter_membrana_mbar: '',
                lectura_lel_porcentaje: '',
                nivel_guarda_hidraulica: 'Nivel Normal',
                trampas_drenadas: false,
                estado_sopladores: 'Operativo',
                observaciones: ''
            });

            const handleChange = (e) => {
                const { name, value, type, checked } = e.target;
                setFormData({ ...formData, [name]: type === 'checkbox' ? checked : value });
            };

            const finalizarRonda = async () => {
                setLoading(true);
                const { error } = await supabaseClient
                    .from('inspeccion_gasometro')
                    .insert([{
                        turno_id: turnoId,
                        ...formData,
                        altura_interna_m: formData.altura_interna_m || null,
                        presion_inter_membrana_mbar: formData.presion_inter_membrana_mbar || null,
                        lectura_lel_porcentaje: formData.lectura_lel_porcentaje || null
                    }]);

                // Actualizar estado general del turno a 'Completada'
                await supabaseClient.from('registro_turnos').update({ estado_ronda: 'Completada', hora_fin: new Date() }).eq('id', turnoId);
                
                setLoading(false);
                if (error) {
                    console.error("Error guardando inspección:", error);
                    alert("Error al guardar en la base de datos.");
                } else {
                    onRondaFinalizada();
                }
            };

            return (
                <div className="p-4 max-w-md mx-auto bg-gray-100 min-h-screen space-y-4 pb-20">
                    <h2 className="text-xl font-bold text-gray-800 border-b-2 border-gray-300 pb-2">Ronda: Gasómetro</h2>

                    <section className="bg-white rounded-xl shadow-sm p-4 space-y-3">
                        <h3 className="text-sm font-bold text-blue-800 uppercase border-b pb-1">A. Entorno y Periféricos</h3>
                        <label className="flex items-center space-x-3 bg-gray-50 p-2 rounded">
                            <input type="checkbox" name="senalizaciones_ok" onChange={handleChange} className="h-5 w-5 text-blue-600" />
                            <span className="text-sm text-gray-700">Señalizaciones en buen estado</span>
                        </label>
                        <label className="flex items-center space-x-3 bg-gray-50 p-2 rounded">
                            <input type="checkbox" name="trampas_drenadas" onChange={handleChange} className="h-5 w-5 text-blue-600" />
                            <span className="text-sm text-gray-700">Trampas de condensado drenadas</span>
                        </label>
                    </section>

                    <section className="bg-white rounded-xl shadow-sm p-4 grid grid-cols-2 gap-3">
                        <h3 className="text-sm font-bold text-blue-800 uppercase border-b pb-1 col-span-2">B. Instrumentación</h3>
                        <div>
                            <label className="block text-xs font-medium text-gray-500">Altura Interna (m)</label>
                            <input type="number" step="0.1" name="altura_interna_m" onChange={handleChange} className="mt-1 w-full border p-2 rounded text-center" />
                        </div>
                        <div>
                            <label className="block text-xs font-medium text-gray-500">Presión Inter (mbar)</label>
                            <input type="number" step="0.1" name="presion_inter_membrana_mbar" onChange={handleChange} className="mt-1 w-full border p-2 rounded text-center" />
                        </div>
                        <div className="col-span-2">
                            <label className="block text-xs font-medium text-gray-500">Detector LEL (%)</label>
                            <input type="number" step="0.1" name="lectura_lel_porcentaje" onChange={handleChange} className={`mt-1 w-full border p-2 rounded text-center font-bold ${formData.lectura_lel_porcentaje > 0 ? 'bg-red-100 text-red-700' : 'bg-gray-50'}`} placeholder="0.0" />
                        </div>
                    </section>

                    <section className="bg-white rounded-xl shadow-sm p-4 space-y-2">
                        <h3 className="text-sm font-bold text-blue-800 uppercase border-b pb-1">C. Observaciones</h3>
                        <textarea name="observaciones" onChange={handleChange} className="w-full border p-2 rounded mt-1 bg-gray-50 text-sm" rows="3" placeholder="Detalles de la operación o anomalías..."></textarea>
                    </section>

                    <button onClick={finalizarRonda} disabled={loading} className="w-full bg-blue-600 hover:bg-blue-700 transition-colors text-white font-bold py-4 rounded-xl shadow-lg text-lg">
                        {loading ? 'Guardando Registro...' : 'FINALIZAR RONDA GASÓMETRO'}
                    </button>
                </div>
            );
        }

        // ==========================================
        // 4. COMPONENTE PRINCIPAL: APP (Controlador)
        // ==========================================
        function App() {
            const [vistaActual, setVistaActual] = useState('inicio'); // Estados: 'inicio', 'gasometro', 'fin'
            const [turnoActivoId, setTurnoActivoId] = useState(null);

            const manejarTurnoIniciado = (id) => {
                setTurnoActivoId(id);
                setVistaActual('gasometro');
            };

            const manejarRondaFinalizada = () => {
                setVistaActual('fin');
            };

            return (
                <div className="bg-gray-200 min-h-screen font-sans">
                    {vistaActual === 'inicio' && <InicioTurno onTurnoIniciado={manejarTurnoIniciado} />}
                    
                    {vistaActual === 'gasometro' && <RondaGasometro turnoId={turnoActivoId} onRondaFinalizada={manejarRondaFinalizada} />}
                    
                    {vistaActual === 'fin' && (
                        <div className="flex flex-col items-center justify-center min-h-screen p-10 text-center">
                            <div className="bg-white p-8 rounded-xl shadow-md max-w-sm w-full">
                                <svg className="w-16 h-16 text-green-500 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                <h2 className="text-2xl font-bold text-gray-800">¡Ronda Sincronizada!</h2>
                                <p className="mt-2 text-sm text-gray-600">Los datos se han guardado exitosamente en la base de datos.</p>
                                <button onClick={() => setVistaActual('inicio')} className="mt-6 w-full bg-blue-600 hover:bg-blue-700 text-white font-bold px-4 py-3 rounded-lg transition-colors">
                                    Iniciar Nuevo Turno
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // ==========================================
        // 5. RENDERIZADO AL DOM
        // ==========================================
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
