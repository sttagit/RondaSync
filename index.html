<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RondaSync - PTAR Talagante</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body className="bg-gray-200">
    <div id="root"></div>

    <script type="text/babel">
        // ==========================================
        // CONFIGURACIÓN DE SUPABASE
        // ==========================================
        const SUPABASE_URL = 'https://cbvipsjpvlgyipifidyo.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_-9xy9fwszhg5RMqlilNn-A_wnK2VGCb';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const { useState, useEffect, useRef } = React;

        function getTokens() {
            const now = new Date();
            let hours = now.getHours();
            let currentStr = ''; let prevStr = '';
            const formatDt = (d) => d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');

            if (hours < 8) { 
                const prevDay = new Date(now); prevDay.setDate(now.getDate() - 1);
                currentStr = formatDt(prevDay) + '-NOCHE';
                prevStr = formatDt(prevDay) + '-DIA';
            } else if (hours >= 8 && hours < 20) { 
                currentStr = formatDt(now) + '-DIA';
                const prevDay = new Date(now); prevDay.setDate(now.getDate() - 1);
                prevStr = formatDt(prevDay) + '-NOCHE';
            } else { 
                currentStr = formatDt(now) + '-NOCHE';
                prevStr = formatDt(now) + '-DIA';
            }
            return { currentStr, prevStr };
        }

        const Fantasma = ({ valor }) => (valor === null || valor === undefined || valor === '') ? null : <span className="text-[9px] bg-blue-100 text-blue-700 px-1.5 rounded font-bold">Ant: {valor}</span>;

        // ==========================================
        // MULTI-FOTO UPLOADER
        // ==========================================
        function MultiFotoUploader({ idCampo, turnoId, onFotosActualizadas, titulo, fotosIniciales = [] }) {
            const [fotos, setFotos] = useState(fotosIniciales);
            const [subiendoIndex, setSubiendoIndex] = useState(null);

            const manejarCaptura = (e) => {
                const archivo = e.target.files[0];
                if (!archivo || fotos.length >= 3) return;
                const nuevaFoto = { localUrl: URL.createObjectURL(archivo), realFile: archivo, remoteUrl: null };
                setFotos([...fotos, nuevaFoto]);
            };

            const subirFoto = async (index) => {
                const foto = fotos[index];
                if (!foto.realFile || foto.remoteUrl) return;
                setSubiendoIndex(index);
                const ext = foto.realFile.name.split('.').pop();
                const nombreArchivo = `${turnoId}-${idCampo}-${index}-${Date.now()}.${ext}`;

                const { error } = await supabaseClient.storage.from('inspeccion_fotos').upload(nombreArchivo, foto.realFile);
                if (error) {
                    alert("Error: " + error.message);
                } else {
                    const { data } = supabaseClient.storage.from('inspeccion_fotos').getPublicUrl(nombreArchivo);
                    const nuevasFotos = [...fotos];
                    nuevasFotos[index].remoteUrl = data.publicUrl;
                    setFotos(nuevasFotos);
                    onFotosActualizadas(idCampo, nuevasFotos.map(f => f.remoteUrl).filter(url => url !== null));
                }
                setSubiendoIndex(null);
            };

            const eliminarFoto = (index) => {
                const nuevasFotos = fotos.filter((_, i) => i !== index);
                setFotos(nuevasFotos);
                onFotosActualizadas(idCampo, nuevasFotos.map(f => f.remoteUrl).filter(url => url !== null));
            };

            return (
                <div className="mt-3 space-y-2">
                    <div className="grid grid-cols-3 gap-2">
                        {fotos.map((foto, index) => (
                            <div key={index} className="relative group">
                                <img src={foto.localUrl} className="h-24 w-full object-cover rounded-lg border-2 border-white shadow-sm" />
                                {!foto.remoteUrl && subiendoIndex !== index && (
                                    <button onClick={() => subirFoto(index)} className="absolute inset-0 bg-black/40 flex items-center justify-center rounded-lg"><span className="bg-emerald-500 text-white text-[10px] font-bold px-2 py-1 rounded shadow-lg">SUBIR</span></button>
                                )}
                                {subiendoIndex === index && (
                                    <div className="absolute inset-0 bg-white/60 flex items-center justify-center rounded-lg"><div className="w-5 h-5 border-2 border-blue-600 border-t-transparent rounded-full animate-spin"></div></div>
                                )}
                                {foto.remoteUrl && (
                                    <div className="absolute top-1 right-1 bg-emerald-500 text-white rounded-full p-0.5 shadow-md"><svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 13l4 4L19 7"></path></svg></div>
                                )}
                                <button onClick={() => eliminarFoto(index)} className="absolute -top-2 -left-2 bg-red-500 text-white rounded-full w-6 h-6 flex items-center justify-center shadow-lg font-bold">×</button>
                            </div>
                        ))}
                        {fotos.length < 3 && (
                            <label className="h-24 border-2 border-dashed border-blue-300 bg-blue-50 rounded-lg flex flex-col items-center justify-center cursor-pointer hover:bg-blue-100 transition-colors shadow-inner">
                                <span className="text-2xl text-blue-500">+</span>
                                <span className="text-[9px] font-bold text-blue-600 uppercase tracking-tighter">Foto {fotos.length + 1}</span>
                                <input type="file" accept="image/*" capture="environment" className="hidden" onChange={manejarCaptura} />
                            </label>
                        )}
                    </div>
                </div>
            );
        }

        // ==========================================
        // LOGIN
        // ==========================================
        function PantallaLogin() {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false);
            const [showPassword, setShowPassword] = useState(false);

            const manejarLogin = async (e) => {
                e.preventDefault(); setLoading(true);
                const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
                if (error) alert("Error de ingreso: " + error.message);
                setLoading(false);
            };

            return (
                <div className="min-h-screen bg-[#1e1e1e] flex items-center justify-center p-4 font-sans text-white">
                    <div className="bg-[#2a2a2a] w-full max-w-md rounded-3xl p-8 shadow-2xl border border-zinc-700">
                        <div className="flex items-center space-x-4 mb-8">
                            <div className="w-12 h-12 bg-amber-500 rounded-xl flex items-center justify-center p-2 shadow-lg"><span className="font-black text-zinc-900 text-xl">RS</span></div>
                            <div><h1 className="text-2xl font-black tracking-tight">RondaSync</h1><p className="text-xs text-zinc-400 uppercase tracking-widest">PTAR Talagante</p></div>
                        </div>
                        <h2 className="text-3xl font-bold mb-6">Bienvenido</h2>
                        <form onSubmit={manejarLogin} className="space-y-5">
                            <div><label className="block text-xs font-bold text-zinc-500 uppercase mb-2">Correo Electrónico</label><input type="email" value={email} onChange={e => setEmail(e.target.value)} className="w-full bg-[#1e1e1e] border border-zinc-700 rounded-xl p-4 focus:border-amber-500 outline-none transition-all" required /></div>
                            <div className="relative"><label className="block text-xs font-bold text-zinc-500 uppercase mb-2">Contraseña</label><input type={showPassword ? "text" : "password"} value={password} onChange={e => setPassword(e.target.value)} className="w-full bg-[#1e1e1e] border border-zinc-700 rounded-xl p-4 focus:border-amber-500 outline-none transition-all" required /><button type="button" onClick={() => setShowPassword(!showPassword)} className="absolute right-4 top-11 text-zinc-500">👁️</button></div>
                            <button type="submit" disabled={loading} className="w-full bg-amber-500 hover:bg-amber-600 text-zinc-900 font-black py-4 rounded-xl uppercase tracking-widest shadow-xl transition-all mt-4">{loading ? 'Verificando...' : 'Entrar al Sistema'}</button>
                        </form>
                    </div>
                </div>
            );
        }

        // ==========================================
        // VISTA SCADA (SCADA Inicial Inmutable)
        // ==========================================
        function VistaScada({ datosGuardados, prevData, onSave, onBack }) {
            const isLocked = !!datosGuardados; 
            const [scada, setScada] = useState({
                dig_nivel: '', dig_presion: '', dig_temp: '',
                gas_nivel: '', gas_presion: '',
                comp_flujo: '', comp_pres_imp: '',
                cald_flujo: '', ant_flujo: ''
            });

            if (isLocked) {
                return (
                    <div className="p-4 max-w-md mx-auto space-y-4 min-h-screen pb-20 font-sans">
                        <div className="bg-[#1e293b] p-4 rounded-xl text-white shadow-lg flex justify-between items-center"><h2 className="text-lg font-bold uppercase">SCADA Inicial</h2><button onClick={onBack} className="bg-slate-700 px-3 py-1 rounded-full text-xs font-bold hover:bg-slate-600">Volver</button></div>
                        <div className="bg-blue-50 border border-blue-200 p-4 rounded-2xl flex items-center justify-between shadow-inner">
                            <div><p className="text-[10px] font-black text-blue-800 uppercase tracking-widest">Línea Base Registrada</p><p className="text-sm font-bold text-blue-900 mt-1">{datosGuardados.operador_nombre.split('@')[0]}</p><p className="text-[10px] text-blue-600 font-bold">{new Date(datosGuardados.created_at).toLocaleTimeString()}</p></div>
                            <span className="text-3xl">🔒</span>
                        </div>
                        <div className="bg-white rounded-2xl shadow-sm border border-gray-200 p-5 space-y-6 opacity-90">
                            <div>
                                <h4 className="text-xs font-black text-blue-600 uppercase mb-3 border-b pb-1">1. Digestor</h4>
                                <div className="grid grid-cols-3 gap-3">
                                    <div className="bg-gray-50 p-2 rounded-xl text-center border border-gray-100"><p className="text-[9px] text-gray-500 font-bold uppercase">Nivel</p><p className="font-black text-gray-800">{datosGuardados.scada_dig_nivel_cm} cm</p></div>
                                    <div className="bg-gray-50 p-2 rounded-xl text-center border border-gray-100"><p className="text-[9px] text-gray-500 font-bold uppercase">Presión</p><p className="font-black text-gray-800">{datosGuardados.scada_dig_presion_mbar} mb</p></div>
                                    <div className="bg-gray-50 p-2 rounded-xl text-center border border-gray-100"><p className="text-[9px] text-gray-500 font-bold uppercase">Temp</p><p className="font-black text-gray-800">{datosGuardados.scada_dig_temp_c} °C</p></div>
                                </div>
                            </div>
                            <div>
                                <h4 className="text-xs font-black text-amber-600 uppercase mb-3 border-b pb-1">2. Gasometro</h4>
                                <div className="grid grid-cols-2 gap-3">
                                    <div className="bg-amber-50 p-2 rounded-xl text-center border border-amber-100"><p className="text-[9px] text-amber-700 font-bold uppercase">Nivel</p><p className="font-black text-amber-900">{datosGuardados.scada_nivel_gasometro} %</p></div>
                                    <div className="bg-amber-50 p-2 rounded-xl text-center border border-amber-100"><p className="text-[9px] text-amber-700 font-bold uppercase">Presión</p><p className="font-black text-amber-900">{datosGuardados.scada_presion_mbar} mb</p></div>
                                </div>
                            </div>
                            <div>
                                <h4 className="text-xs font-black text-emerald-600 uppercase mb-3 border-b pb-1">3. Compresores y Consumos</h4>
                                <div className="grid grid-cols-2 gap-3 mb-3">
                                    <div className="bg-gray-50 p-2 rounded-xl text-center border border-gray-100"><p className="text-[9px] text-gray-500 font-bold uppercase">Flujo Comp.</p><p className="font-black text-gray-800">{datosGuardados.scada_flujo_biogas_nm3h}</p></div>
                                    <div className="bg-gray-50 p-2 rounded-xl text-center border border-gray-100"><p className="text-[9px] text-gray-500 font-bold uppercase">Pres. Imp.</p><p className="font-black text-gray-800">{datosGuardados.scada_comp_presion_imp_mbar} mb</p></div>
                                    <div className="bg-gray-50 p-2 rounded-xl text-center border border-gray-100"><p className="text-[9px] text-gray-500 font-bold uppercase">Flujo Cald.</p><p className="font-black text-gray-800">{datosGuardados.scada_cald_flujo_m3h}</p></div>
                                    <div className="bg-gray-50 p-2 rounded-xl text-center border border-gray-100"><p className="text-[9px] text-gray-500 font-bold uppercase">Flujo Ant.</p><p className="font-black text-gray-800">{datosGuardados.scada_ant_flujo_m3h}</p></div>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="p-4 max-w-md mx-auto space-y-4 min-h-screen pb-20 font-sans">
                    <div className="bg-[#1e293b] p-4 rounded-xl text-white shadow-lg flex justify-between items-center"><h2 className="text-lg font-bold uppercase">Línea Base SCADA</h2><button onClick={onBack} className="bg-slate-700 px-3 py-1 rounded-full text-xs font-bold">Volver</button></div>
                    <p className="text-xs text-gray-500 font-medium px-2">Ingrese el estado inicial de recepción de planta. Una vez guardado, este registro quedará bloqueado para el turno actual.</p>
                    
                    <div className="bg-white rounded-2xl shadow-sm border border-gray-200 p-5 space-y-6">
                        <div>
                            <h4 className="text-xs font-black text-blue-600 uppercase mb-3 border-b pb-1">1. Digestor</h4>
                            <div className="grid grid-cols-3 gap-3">
                                <div><div className="flex justify-between items-center mb-1"><label className="text-[10px] text-gray-500 font-bold uppercase">Nivel (cm)</label><Fantasma valor={prevData?.scada_dig_nivel_cm} /></div><input type="number" value={scada.dig_nivel} onChange={e => setScada({...scada, dig_nivel: e.target.value})} className="w-full border-2 border-white shadow-sm p-3 rounded-xl text-center font-bold bg-gray-50 focus:border-blue-400 outline-none" /></div>
                                <div><div className="flex justify-between items-center mb-1"><label className="text-[10px] text-gray-500 font-bold uppercase">Pres. (mb)</label><Fantasma valor={prevData?.scada_dig_presion_mbar} /></div><input type="number" value={scada.dig_presion} onChange={e => setScada({...scada, dig_presion: e.target.value})} className="w-full border-2 border-white shadow-sm p-3 rounded-xl text-center font-bold bg-gray-50 focus:border-blue-400 outline-none" /></div>
                                <div><div className="flex justify-between items-center mb-1"><label className="text-[10px] text-gray-500 font-bold uppercase">Temp (°C)</label><Fantasma valor={prevData?.scada_dig_temp_c} /></div><input type="number" value={scada.dig_temp} onChange={e => setScada({...scada, dig_temp: e.target.value})} className="w-full border-2 border-white shadow-sm p-3 rounded-xl text-center font-bold bg-gray-50 focus:border-blue-400 outline-none" /></div>
                            </div>
                        </div>
                        <div>
                            <h4 className="text-xs font-black text-amber-600 uppercase mb-3 border-b pb-1">2. Gasometro</h4>
                            <div className="grid grid-cols-2 gap-3">
                                <div><div className="flex justify-between items-center mb-1"><label className="text-[10px] text-gray-500 font-bold uppercase">Nivel (%)</label><Fantasma valor={prevData?.scada_nivel_gasometro} /></div><input type="number" value={scada.gas_nivel} onChange={e => setScada({...scada, gas_nivel: e.target.value})} className="w-full border-2 border-amber-100 bg-amber-50 shadow-inner p-3 rounded-xl text-center font-bold text-amber-900 focus:border-amber-400 outline-none" /></div>
                                <div><div className="flex justify-between items-center mb-1"><label className="text-[10px] text-gray-500 font-bold uppercase">Pres. (mb)</label><Fantasma valor={prevData?.scada_presion_mbar} /></div><input type="number" value={scada.gas_presion} onChange={e => setScada({...scada, gas_presion: e.target.value})} className="w-full border-2 border-amber-100 bg-amber-50 shadow-inner p-3 rounded-xl text-center font-bold text-amber-900 focus:border-amber-400 outline-none" /></div>
                            </div>
                        </div>
                        <div>
                            <h4 className="text-xs font-black text-emerald-600 uppercase mb-3 border-b pb-1">3. Compresores y Consumos</h4>
                            <div className="grid grid-cols-2 gap-3 mb-3">
                                <div><div className="flex justify-between items-center mb-1"><label className="text-[10px] text-gray-500 font-bold uppercase">Flujo Comp.</label><Fantasma valor={prevData?.scada_flujo_biogas_nm3h} /></div><input type="number" value={scada.comp_flujo} onChange={e => setScada({...scada, comp_flujo: e.target.value})} className="w-full border-2 border-white shadow-sm p-3 rounded-xl text-center font-bold bg-gray-50" /></div>
                                <div><div className="flex justify-between items-center mb-1"><label className="text-[10px] text-gray-500 font-bold uppercase">Pres. Imp.</label><Fantasma valor={prevData?.scada_comp_presion_imp_mbar} /></div><input type="number" value={scada.comp_pres_imp} onChange={e => setScada({...scada, comp_pres_imp: e.target.value})} className="w-full border-2 border-white shadow-sm p-3 rounded-xl text-center font-bold bg-gray-50" /></div>
                            </div>
                            <div className="grid grid-cols-2 gap-3">
                                <div><div className="flex justify-between items-center mb-1"><label className="text-[10px] text-gray-500 font-bold uppercase">Flujo Calderas</label><Fantasma valor={prevData?.scada_cald_flujo_m3h} /></div><input type="number" value={scada.cald_flujo} onChange={e => setScada({...scada, cald_flujo: e.target.value})} className="w-full border-2 border-white shadow-sm p-3 rounded-xl text-center font-bold bg-gray-50" /></div>
                                <div><div className="flex justify-between items-center mb-1"><label className="text-[10px] text-gray-500 font-bold uppercase">Flujo Antorchas</label><Fantasma valor={prevData?.scada_ant_flujo_m3h} /></div><input type="number" value={scada.ant_flujo} onChange={e => setScada({...scada, ant_flujo: e.target.value})} className="w-full border-2 border-white shadow-sm p-3 rounded-xl text-center font-bold bg-gray-50" /></div>
                            </div>
                        </div>
                    </div>
                    <button onClick={() => onSave(scada)} className="w-full bg-emerald-600 text-white font-black py-5 rounded-3xl shadow-xl uppercase tracking-widest hover:bg-emerald-700 transition-all transform active:scale-95 flex justify-center items-center"><span className="text-xl mr-2">🔒</span> Sellar Base SCADA</button>
                </div>
            );
        }

        // ==========================================
        // VISTA RIESGOS (DINÁMICA POR EQUIPO/PLANO ATEX)
        // ==========================================
        function VistaRiesgos({ modulo, onComplete, onBack }) {
            const [epp, setEpp] = useState({ epp1:false, epp2:false, epp3:false, epp4:false });
            const [ax, setAx] = useState([]);

            // Base de datos de Zonas ATEX extraída de Planimetría DPCEx
            const atexData = {
                gasometro: [
                    { id: 1, color: 'red', text: "Z1: Válvula Damper y Purga (r=1.0m)" },
                    { id: 2, color: 'orange', text: "Z2: Guarda Hidráulica (r=1.5m, h=3m)" },
                    { id: 3, color: 'orange', text: "Z2: Bridas y Válvulas de biogás (r=0.35m)" }
                ],
                digestor: [
                    { id: 1, color: 'red', text: "Z1: Interior del Digestor y Escotillas" },
                    { id: 2, color: 'orange', text: "Z2: Válvulas Baja Presión <5mbar (r=0.35m)" },
                    { id: 3, color: 'orange', text: "Z2: Válvulas Alta Presión >2bar (r=0.55m)" }
                ],
                compresores: [
                    { id: 1, color: 'red', text: "Z1: Caseta y Arqueta de Purgas (r=1.0m)" },
                    { id: 2, color: 'orange', text: "Z2: Rejillas de ventilación (r=0.55m)" },
                    { id: 3, color: 'orange', text: "Z2: Bridas y Válvulas de biogás (r=0.35m)" }
                ],
                calderas: [
                    { id: 1, color: 'red', text: "Z1: Arqueta canalización biogás" },
                    { id: 2, color: 'orange', text: "Z2: Bridas y Válvulas de biogás (r=0.35m)" }
                ],
                antorchas: [
                    { id: 1, color: 'red', text: "Z1: Purga automática (r=0.35m)" },
                    { id: 2, color: 'orange', text: "Z2: Base Antorcha y Tanque GLP (r=2.0m, h=4m)" },
                    { id: 3, color: 'orange', text: "Z2: Bridas y Válvulas de biogás (r=0.35m)" }
                ]
            };

            const riesgosActuales = atexData[modulo] || atexData.gasometro;
            
            const toggleAx = (id) => {
                if(ax.includes(id)) setAx(ax.filter(i => i !== id));
                else setAx([...ax, id]);
            };

            const listo = epp.epp1 && epp.epp2 && epp.epp3 && epp.epp4 && (ax.length === riesgosActuales.length);
            
            // Textos amigables para el encabezado
            const modulosNombres = { gasometro: 'Gasómetro', digestor: 'Digestor', compresores: 'Sala Compresores', calderas: 'Sala Calderas', antorchas: 'Antorchas y GLP' };

            return (
                <div className="p-4 max-w-md mx-auto space-y-4 min-h-screen pb-10 font-sans">
                    <div className="bg-[#1e293b] p-5 rounded-2xl text-white shadow-xl flex justify-between items-center sticky top-0 z-20">
                        <div className="flex items-center"><span className="text-2xl mr-3">🛑</span><h2 className="text-lg font-black uppercase tracking-tight">P.O.W.R.A.</h2></div>
                        <button onClick={onBack} className="bg-slate-700 px-3 py-1 rounded-full text-xs font-bold hover:bg-slate-600">Volver</button>
                    </div>
                    
                    <p className="text-[11px] text-gray-500 font-bold px-2 uppercase tracking-widest text-center mb-4">Evaluación de Riesgos Pre-Ingreso: {modulosNombres[modulo]}</p>

                    <div className="bg-white rounded-2xl shadow-sm border p-5 space-y-3">
                        <h3 className="text-xs font-black text-gray-800 uppercase mb-4 border-b pb-2">Verificación Física Obligatoria</h3>
                        <label className="flex items-center space-x-3 p-3 bg-gray-50 rounded-xl border border-gray-100 cursor-pointer"><input type="checkbox" onChange={e=>setEpp({...epp, epp1:e.target.checked})} className="h-6 w-6 text-blue-600 rounded-lg"/> <span className="text-xs text-gray-700 leading-tight"><b className="text-gray-900 block">EPP:</b> Casco, lentes, guantes y zapatos</span></label>
                        <label className="flex items-center space-x-3 p-3 bg-gray-50 rounded-xl border border-gray-100 cursor-pointer"><input type="checkbox" onChange={e=>setEpp({...epp, epp2:e.target.checked})} className="h-6 w-6 text-blue-600 rounded-lg"/> <span className="text-xs text-gray-700 leading-tight"><b className="text-gray-900 block">Equipos:</b> Detector multigas CH4, CO2, O2 y H2S</span></label>
                        <label className="flex items-center space-x-3 p-3 bg-gray-50 rounded-xl border border-gray-100 cursor-pointer"><input type="checkbox" onChange={e=>setEpp({...epp, epp3:e.target.checked})} className="h-6 w-6 text-blue-600 rounded-lg"/> <span className="text-xs text-gray-700 leading-tight"><b className="text-gray-900 block">Protección:</b> Máscara para gases tóxicos</span></label>
                        <label className="flex items-center space-x-3 p-3 bg-gray-50 rounded-xl border border-gray-100 cursor-pointer"><input type="checkbox" onChange={e=>setEpp({...epp, epp4:e.target.checked})} className="h-6 w-6 text-blue-600 rounded-lg"/> <span className="text-xs text-gray-700 leading-tight"><b className="text-gray-900 block">Artículos ATEX:</b> Tablet/Smartphone y Linterna</span></label>
                    </div>

                    <div className="bg-red-50 rounded-2xl shadow-sm border border-red-200 p-5">
                        <h3 className="text-xs font-black text-red-800 uppercase mb-3 border-b border-red-200 pb-2">Precaución Áreas ATEX (DPCEx)</h3>
                        <p className="text-[9px] text-red-600 font-bold mb-3">Reconozco los radios de explosividad específicos de este módulo:</p>
                        <div className="space-y-2">
                            {riesgosActuales.map((r) => (
                                <label key={r.id} className="flex items-center space-x-3 p-3 bg-white rounded-lg border border-red-100 cursor-pointer shadow-sm">
                                    <input type="checkbox" onChange={() => toggleAx(r.id)} className={`h-5 w-5 text-${r.color}-600 rounded`}/> 
                                    <span className={`text-[11px] font-bold text-${r.color}-900`}>{r.text}</span>
                                </label>
                            ))}
                        </div>
                    </div>
                    
                    <button onClick={onComplete} disabled={!listo} className={`w-full text-white font-black py-5 rounded-2xl shadow-xl mt-10 uppercase tracking-widest transition-all ${listo ? 'bg-emerald-600 hover:bg-emerald-700' : 'bg-gray-400 opacity-50 cursor-not-allowed'}`}>Aprobar e Ingresar al Módulo</button>
                </div>
            );
        }

        // ==========================================
        // VISTA GENÉRICA EN DESARROLLO (Para módulos no listos)
        // ==========================================
        function VistaGenerica({ modulo, onBack }) {
            const modulosNombres = { digestor: 'Digestor', compresores: 'Sala Compresores', calderas: 'Sala Calderas', antorchas: 'Antorchas y GLP' };
            return (
                 <div className="p-4 max-w-md mx-auto min-h-screen space-y-6 font-sans bg-gray-100 pb-20 flex flex-col justify-center items-center text-center">
                    <div className="text-6xl mb-4">🚧</div>
                    <h2 className="text-2xl font-black text-slate-800 uppercase tracking-tight">Módulo en Desarrollo</h2>
                    <p className="text-sm text-slate-500 font-medium px-4">El formulario de inspección para <b>{modulosNombres[modulo]}</b> está siendo programado. La evaluación de riesgos ATEX ya se encuentra activa.</p>
                    <button onClick={onBack} className="bg-slate-800 text-white font-black py-4 px-10 rounded-2xl shadow-xl uppercase tracking-widest mt-8">Volver al Hub</button>
                 </div>
            );
        }

        // ==========================================
        // DEMÁS COMPONENTES (Formulario Gasómetro, Dashboard, etc.)
        // ==========================================
        function VistaDashboard({ onBack }) {
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(true);
            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            useEffect(() => {
                const fetchHistory = async () => {
                    const { data: turnos, error } = await supabaseClient.from('registro_turnos').select('*, inspeccion_gasometro(*)').order('created_at', { ascending: false }).limit(10);
                    if (!error && turnos) setData(turnos);
                    setLoading(false);
                };
                fetchHistory();
            }, []);

            useEffect(() => {
                if (!loading && chartRef.current && data.length > 0) {
                    if (chartInstance.current) chartInstance.current.destroy();
                    const chartData = [...data].reverse();
                    const labels = chartData.map(d => new Date(d.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}));
                    const presionData = chartData.map(d => d.inspeccion_gasometro?.[0]?.presion_inter_membrana_mbar || 0);
                    const nivelData = chartData.map(d => d.scada_nivel_gasometro || 0);

                    const ctx = chartRef.current.getContext('2d');
                    chartInstance.current = new Chart(ctx, {
                        type: 'line',
                        data: { labels: labels, datasets: [ { label: 'Presión (mbar)', data: presionData, borderColor: 'rgb(59, 130, 246)', backgroundColor: 'rgba(59, 130, 246, 0.1)', yAxisID: 'y', tension: 0.3, fill: true }, { label: 'Nivel SCADA (%)', data: nivelData, borderColor: 'rgb(245, 158, 11)', borderDash: [5, 5], yAxisID: 'y1', tension: 0.3 } ] },
                        options: { responsive: true, interaction: { mode: 'index', intersect: false }, scales: { y: { type: 'linear', display: true, position: 'left', title: {display: true, text: 'mbar'} }, y1: { type: 'linear', display: true, position: 'right', grid: {drawOnChartArea: false}, title: {display: true, text: '%'} } } }
                    });
                }
                return () => { if (chartInstance.current) chartInstance.current.destroy(); }
            }, [data, loading]);

            const totalRondas = data.length;
            const fallasLel = data.filter(t => t.inspeccion_gasometro?.[0]?.lectura_lel_porcentaje > 0).length;
            const duracionesValidas = data.map(t => { if(t.hora_inicio && t.created_at) return (new Date(t.created_at) - new Date(t.hora_inicio)) / 60000; return 0; }).filter(d => d > 0);
            const avgTime = duracionesValidas.length > 0 ? Math.round(duracionesValidas.reduce((a,b)=>a+b,0) / duracionesValidas.length) : '--';

            return (
                <div className="p-4 max-w-md mx-auto min-h-screen space-y-6 font-sans bg-gray-100 pb-20">
                    <div className="bg-[#1e293b] p-5 rounded-2xl text-white shadow-xl flex items-center justify-between sticky top-0 z-20"><div className="flex items-center"><span className="text-2xl mr-3">📊</span><h2 className="text-lg font-black uppercase tracking-tight">Supervisión</h2></div><button onClick={onBack} className="bg-slate-700 hover:bg-slate-600 text-xs px-3 py-1 rounded-full font-bold">Volver</button></div>
                    {loading ? (
                        <div className="text-center py-20 text-gray-500 font-bold animate-pulse">Cargando Historial...</div>
                    ) : (
                        <>
                            <div className="grid grid-cols-3 gap-3">
                                <div className="bg-white p-3 rounded-2xl shadow-sm border border-gray-200 text-center"><p className="text-[9px] text-gray-500 font-black uppercase mb-1">Rondas Hist.</p><p className="text-2xl font-black text-blue-600">{totalRondas}</p></div>
                                <div className="bg-white p-3 rounded-2xl shadow-sm border border-gray-200 text-center"><p className="text-[9px] text-gray-500 font-black uppercase mb-1">T. Promedio</p><p className="text-2xl font-black text-emerald-600">{avgTime}<span className="text-xs font-bold text-gray-400">m</span></p></div>
                                <div className="bg-white p-3 rounded-2xl shadow-sm border border-gray-200 text-center"><p className="text-[9px] text-gray-500 font-black uppercase mb-1">Eventos LEL</p><p className={`text-2xl font-black ${fallasLel > 0 ? 'text-red-600' : 'text-gray-400'}`}>{fallasLel}</p></div>
                            </div>
                            <div className="bg-white p-4 rounded-3xl shadow-sm border border-gray-200"><h3 className="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-3">Tendencia: Presión vs Nivel</h3><canvas ref={chartRef} id="tendenciasChart" className="w-full h-48"></canvas></div>
                            <div className="space-y-4">
                                <h3 className="text-[10px] font-black text-gray-400 uppercase tracking-widest pl-2">Bitácora de Inspecciones</h3>
                                {data.map((turno) => {
                                    const gas = turno.inspeccion_gasometro?.[0];
                                    let duracionStr = '--';
                                    if(turno.hora_inicio && turno.created_at) duracionStr = `${Math.round((new Date(turno.created_at) - new Date(turno.hora_inicio)) / 60000)} min`;
                                    const tags = [];
                                    if (gas?.estado_anclajes && gas.estado_anclajes !== 'Optimo') tags.push('Anclajes');
                                    if (gas?.lectura_lel_porcentaje > 0) tags.push(`LEL ${gas.lectura_lel_porcentaje}%`);
                                    if (gas?.nivel_guarda_hidraulica !== 'Nivel Normal') tags.push('Guarda');
                                    if (gas?.sopladores_condicion_mecanica && gas.sopladores_condicion_mecanica !== 'Operación Normal (Sin ruidos/vibración)') tags.push('Sopladores');
                                    if (gas?.flujo_agua_trampa === false) tags.push('Trampa');
                                    if (gas?.estado_valvula_corte === 'Sin candado de seguridad') tags.push('Válvula LOTO');
                                    if (gas?.estado_gabinete_electrico && !gas.estado_gabinete_electrico.includes('Operativo')) tags.push('Gabinete');

                                    return (
                                        <div key={turno.id} className="bg-white p-4 rounded-2xl shadow-sm border border-gray-200">
                                            <div className="flex justify-between items-start border-b border-gray-100 pb-2 mb-2">
                                                <div>
                                                    <p className="text-xs font-black text-gray-800">{new Date(turno.created_at).toLocaleString([], {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'})}</p>
                                                    <p className="text-[10px] text-blue-600 font-bold mb-1">{turno.operador_nombre}</p>
                                                    {turno.operadores_adicionales && <p className="text-[9px] text-gray-500 font-medium">Con: {turno.operadores_adicionales}</p>}
                                                </div>
                                                <div className="text-right"><span className="bg-slate-100 text-slate-600 px-2 py-1 rounded text-[9px] font-black tracking-widest inline-flex items-center"><span className="mr-1">⏱️</span> {duracionStr}</span></div>
                                            </div>
                                            {tags.length > 0 ? (
                                                <div className="flex flex-wrap gap-1 mb-2">{tags.map((t, i) => <span key={i} className="bg-red-50 text-red-600 border border-red-200 px-1.5 py-0.5 rounded text-[9px] font-bold uppercase">{t}</span>)}</div>
                                            ) : (<div className="mb-2"><span className="bg-emerald-50 text-emerald-600 border border-emerald-200 px-2 py-0.5 rounded text-[9px] font-bold uppercase">✓ Óptimo</span></div>)}
                                            {turno.setpoints_ajustados && (
                                                <div className="bg-blue-50 p-2 rounded-lg border border-blue-100 mb-2"><p className="text-[9px] text-blue-600 font-black uppercase mb-1">Ajustes Proceso</p><p className="text-xs text-blue-900 font-medium">{turno.setpoints_ajustados}</p></div>
                                            )}
                                            <div className="bg-gray-50 p-3 rounded-xl border border-gray-100"><p className="text-[10px] text-gray-400 font-black uppercase mb-1">Observaciones</p><p className="text-xs text-gray-700 font-medium italic">{gas?.observaciones || 'Sin registro.'}</p></div>
                                        </div>
                                    )
                                })}
                            </div>
                        </>
                    )}
                </div>
            );
        }

        function VistaTraspaso({ prevTurno, prevGasometro, onBack }) {
            if (!prevTurno) return (
                <div className="p-4 max-w-md mx-auto min-h-screen"><div className="bg-white p-6 rounded-2xl shadow text-center"><p className="font-bold text-gray-500">No hay datos del turno anterior.</p><button onClick={onBack} className="mt-4 bg-blue-600 text-white px-6 py-2 rounded-xl font-bold">Volver</button></div></div>
            );
            const anomalias = [];
            if (prevGasometro?.estado_anclajes && prevGasometro.estado_anclajes !== 'Optimo') anomalias.push(`Anclajes: ${prevGasometro.estado_anclajes}`);
            if (prevGasometro?.lectura_lel_porcentaje > 0) anomalias.push(`LEL Detectado: ${prevGasometro.lectura_lel_porcentaje}%`);
            if (prevGasometro?.nivel_guarda_hidraulica && prevGasometro.nivel_guarda_hidraulica !== 'Nivel Normal') anomalias.push(`Guarda: ${prevGasometro.nivel_guarda_hidraulica}`);
            if (prevGasometro?.estado_gabinete_electrico && !prevGasometro.estado_gabinete_electrico.includes('Operativo')) anomalias.push(`Gabinete: ${prevGasometro.estado_gabinete_electrico}`);

            return (
                <div className="p-4 max-w-md mx-auto min-h-screen font-sans pb-10 space-y-4">
                    <div className="bg-[#1e293b] p-5 rounded-2xl text-white shadow-xl flex justify-between items-center"><div className="flex items-center"><span className="text-2xl mr-3">📋</span><h2 className="text-lg font-black uppercase tracking-tight">Traspaso de Turno</h2></div><button onClick={onBack} className="bg-slate-700 px-3 py-1 rounded-full text-xs font-bold hover:bg-slate-600">Volver</button></div>
                    <div className="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 flex justify-between items-center">
                        <div><p className="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1">Operador Saliente</p><p className="text-sm font-bold text-gray-800">{prevTurno.operador_nombre}</p><p className="text-[10px] text-gray-500 mt-1">{new Date(prevTurno.created_at).toLocaleString()}</p></div>
                        <div className="bg-blue-50 text-blue-700 px-3 py-1 rounded-full text-xs font-black border border-blue-200">{prevTurno.tipo_turno}</div>
                    </div>
                    {prevTurno.setpoints_ajustados && (<div className="bg-blue-50 rounded-2xl p-4 shadow-sm border border-blue-200"><h3 className="text-[10px] font-black text-blue-800 uppercase tracking-widest mb-2">⚙️ Ajustes Operacionales</h3><p className="text-sm text-blue-900 font-medium italic">"{prevTurno.setpoints_ajustados}"</p></div>)}
                    <div className="bg-amber-50 rounded-2xl p-4 shadow-sm border border-amber-200"><h3 className="text-[10px] font-black text-amber-800 uppercase tracking-widest mb-2">📝 Observaciones Mecánicas</h3><p className="text-sm text-amber-900 font-medium italic">"{prevGasometro?.observaciones || 'Sin observaciones.'}"</p></div>
                    {anomalias.length > 0 && (<div className="bg-red-50 rounded-2xl p-4 shadow-sm border border-red-200"><h3 className="text-[10px] font-black text-red-800 uppercase tracking-widest mb-2">⚠️ Atención Requerida (Alarmas)</h3><ul className="space-y-2">{anomalias.map((anom, idx) => (<li key={idx} className="text-xs text-red-700 font-bold bg-white p-2 rounded border border-red-100">• {anom}</li>))}</ul></div>)}
                    <div className="bg-white rounded-2xl p-4 shadow-sm border border-gray-100">
                        <h3 className="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-3">SCADA Inicial del Turno Saliente</h3>
                        <div className="grid grid-cols-3 gap-y-4 gap-x-2 text-xs">
                            <div><span className="text-gray-500 block text-[9px] uppercase">Nivel Dig.</span><span className="font-bold text-gray-800">{prevTurno.scada_dig_nivel_cm || '-'} cm</span></div>
                            <div><span className="text-gray-500 block text-[9px] uppercase">Pres. Dig.</span><span className="font-bold text-gray-800">{prevTurno.scada_dig_presion_mbar || '-'} mb</span></div>
                            <div><span className="text-gray-500 block text-[9px] uppercase">Temp Dig.</span><span className="font-bold text-gray-800">{prevTurno.scada_dig_temp_c || '-'} °C</span></div>
                            <div><span className="text-gray-500 block text-[9px] uppercase">Nivel Gas.</span><span className="font-bold text-gray-800">{prevTurno.scada_nivel_gasometro || '-'} %</span></div>
                            <div><span className="text-gray-500 block text-[9px] uppercase">Pres. Gas.</span><span className="font-bold text-gray-800">{prevTurno.scada_presion_mbar || '-'} mb</span></div>
                            <div><span className="text-gray-500 block text-[9px] uppercase">Flujo Comp.</span><span className="font-bold text-gray-800">{prevTurno.scada_flujo_biogas_nm3h || '-'}</span></div>
                        </div>
                    </div>
                </div>
            );
        }

        function FormularioGasometro({ turnoId, prevData, listaFallas, listaEstadosSopladores, onTerminado }) {
            const [fd, setFd] = useState({ 
                anclajes: 'Optimo', altura: '', presion: '', lel: '', guarda: 'Nivel Normal', 
                soplador_1: 'Stand-by', soplador_2: 'Stand-by', condicion_sopladores: 'Operación Normal (Sin ruidos/vibración)',
                agua_trampa: true, valvula_corte: 'Abierta (Candado puesto)', 
                gabinete: 'Operativo (Luces normales, cerrado)', observaciones: '' 
            });
            const [fotos, setFotos] = useState({ anclaje: [], altura: [], presion: [], lel: [], guarda: [], sopladores: [], trampa: [], gabinete: [] });
            const manejarFotos = (campo, urls) => setFotos(prev => ({ ...prev, [campo]: urls }));

            const p = parseFloat(fd.presion); const h = parseFloat(fd.altura); const lel = parseFloat(fd.lel);
            const alarmaAltura = h > 10.1; const alarmaPresion = p >= 25; const alarmaLel = lel > 0;
            
            const requiresObservation = alarmaLel || fd.guarda !== 'Nivel Normal' || fd.anclajes !== 'Optimo' || fd.condicion_sopladores !== 'Operación Normal (Sin ruidos/vibración)' || !fd.agua_trampa || fd.valvula_corte === 'Sin candado de seguridad' || fd.gabinete !== 'Operativo (Luces normales, cerrado)' || alarmaAltura || alarmaPresion;
            const observationMissing = requiresObservation && fd.observaciones.trim() === '';
            const fotosCompletas = Object.values(fotos).every(arr => arr && arr.length > 0);
            const datosCompletos = fd.altura !== '' && fd.presion !== '' && fd.lel !== '';
            const canSubmit = fotosCompletas && datosCompletos && !observationMissing;

            const fallbackFallas = [
                { id: 'f1', grupo: 'Fugas', descripcion: 'Fuga de biogas por perno de anclaje' },
                { id: 'f2', grupo: 'Fugas', descripcion: 'Fuga de biogas por linea de brida/flange' },
                { id: 'f3', grupo: 'Fugas', descripcion: 'Fuga de aire entre membranas (base exterior)' },
                { id: 'm1', grupo: 'Mecanicos', descripcion: 'Rodon de membrana montado o mordido' },
                { id: 'm2', grupo: 'Mecanicos', descripcion: 'Doblez o pliegue anormal en membrana' },
                { id: 'm3', grupo: 'Mecanicos', descripcion: 'Pernos sueltos, cortados o faltantes' },
                { id: 'm4', grupo: 'Mecanicos', descripcion: 'Corrosion severa en pernos o flanges' },
                { id: 'o1', grupo: 'Otros', descripcion: 'Otra anomalia (Detallar en observaciones)' }
            ];

            const fallbackEstados = [
                { id: 'e1', descripcion: 'Operación Normal (Sin ruidos/vibración)' },
                { id: 'e2', descripcion: 'Vibración leve detectada' },
                { id: 'e3', descripcion: 'Ruido anormal en rodamientos' },
                { id: 'e4', descripcion: 'Filtro de aire requiere limpieza/cambio' },
                { id: 'e5', descripcion: 'Fuga de aire en conexión flexible' },
                { id: 'e6', descripcion: 'Falla total / Motor bloqueado' }
            ];

            let fallasAUsar = fallbackFallas;
            if (Array.isArray(listaFallas) && listaFallas.length > 0) fallasAUsar = listaFallas;
            let estadosAUsar = fallbackEstados;
            if (Array.isArray(listaEstadosSopladores) && listaEstadosSopladores.length > 0) estadosAUsar = listaEstadosSopladores;
            const fallasAgrupadas = fallasAUsar.reduce((acc, falla) => { if (!acc[falla.grupo]) acc[falla.grupo] = []; acc[falla.grupo].push(falla); return acc; }, {});

            return (
                <div className="p-4 max-w-md mx-auto space-y-6 min-h-screen pb-10 bg-gray-100 font-sans">
                    <div className="bg-[#1e293b] p-5 rounded-2xl text-white shadow-xl flex items-center sticky top-0 z-20"><span className="text-2xl mr-3">🏗️</span><h2 className="text-lg font-black uppercase tracking-tight">Ronda Gasometro</h2></div>
                    
                    <div className="bg-white p-5 rounded-3xl border-l-[6px] border-l-blue-500 shadow-md">
                        <h3 className="text-[10px] font-black text-gray-400 uppercase mb-3 tracking-widest">PC-1: Membranas y Anclaje Base</h3>
                        <select onChange={e=>setFd({...fd, anclajes:e.target.value})} className={`w-full border-2 p-3 rounded-xl font-bold text-sm mb-2 transition-colors ${fd.anclajes !== 'Optimo' ? 'bg-yellow-50 border-yellow-300 text-yellow-800' : 'bg-gray-50 border-gray-100'}`}>
                            <option value="Optimo">✓ Estado Óptimo</option>
                            {Object.keys(fallasAgrupadas).map(grupo => (
                                <optgroup key={grupo} label={`⚠️ Falla: ${grupo}`}>{fallasAgrupadas[grupo].map(falla => (<option key={falla.id} value={falla.descripcion}>{falla.descripcion}</option>))}</optgroup>
                            ))}
                        </select>
                        <MultiFotoUploader idCampo="anclaje" turnoId={turnoId} onFotosActualizadas={manejarFotos} titulo="Fotos de Base, Pernos y Lonas" />
                    </div>

                    <div className="bg-white p-5 rounded-3xl border-l-[6px] border-l-blue-500 shadow-md space-y-8">
                        <h3 className="text-[10px] font-black text-gray-400 uppercase tracking-widest border-b pb-2">PC-2: Lecturas Medidores Gasómetro</h3>
                        <div className={`p-4 rounded-2xl border-2 transition-all ${alarmaAltura ? 'bg-red-50 border-red-500' : 'bg-gray-50 border-gray-100'}`}>
                            <div className="flex justify-between items-center mb-2"><label className={`text-[10px] font-black uppercase ${alarmaAltura ? 'text-red-700' : 'text-gray-600'}`}>Altura Membrana Interna (m)</label><Fantasma valor={prevData?.altura_interna_m} /></div>
                            <input type="number" step="0.01" onChange={e=>setFd({...fd, altura:e.target.value})} className={`w-full border-2 p-4 rounded-xl text-center font-black text-xl mb-1 ${alarmaAltura ? 'bg-red-100 border-red-500 text-red-900' : 'border-white shadow-sm bg-white'}`}/>
                            {alarmaAltura && <p className="text-red-600 text-[10px] font-black mb-3 text-center animate-pulse tracking-widest">⚠️ ALARMA: Nivel Alto</p>}
                            <MultiFotoUploader idCampo="altura" turnoId={turnoId} onFotosActualizadas={manejarFotos} titulo="Fotos de Cinta Métrica / Lona" />
                        </div>
                        <div className={`p-4 rounded-2xl border-2 transition-all ${alarmaPresion ? 'bg-red-50 border-red-500' : 'bg-gray-50 border-gray-100'}`}>
                            <div className="flex justify-between items-center mb-2"><label className={`text-[10px] font-black uppercase ${alarmaPresion ? 'text-red-700' : 'text-gray-600'}`}>Presión Intermembranas mbar</label><Fantasma valor={prevData?.presion_inter_membrana_mbar} /></div>
                            <input type="number" step="0.1" onChange={e=>setFd({...fd, presion:e.target.value})} className={`w-full border-2 p-4 rounded-xl text-center font-black text-xl mb-1 ${alarmaPresion ? 'bg-red-100 border-red-500 text-red-900' : 'border-white shadow-sm bg-white'}`}/>
                            {alarmaPresion && <p className="text-red-600 text-[10px] font-black mb-3 text-center animate-pulse tracking-widest">⚠️ ALARMA: Sobrepresión</p>}
                            <MultiFotoUploader idCampo="presion" turnoId={turnoId} onFotosActualizadas={manejarFotos} titulo="Fotos de Manómetro en U" />
                        </div>
                        <div className={`p-4 rounded-2xl border-2 transition-all ${alarmaLel ? 'bg-red-50 border-red-500' : 'bg-gray-50 border-gray-100'}`}>
                            <div className="flex justify-between items-center mb-2"><label className={`text-[10px] font-black uppercase ${alarmaLel ? 'text-red-700' : 'text-gray-600'}`}>Lectura LEL Máxima (%)</label><Fantasma valor={prevData?.lectura_lel_porcentaje} /></div>
                            <input type="number" step="0.1" min="0" onKeyDown={(e) => e.key === '-' && e.preventDefault()} onChange={e=>{const val = Math.max(0, parseFloat(e.target.value) || 0); setFd({...fd, lel:e.target.value === '' ? '' : val})}} value={fd.lel} className={`w-full border-2 p-4 rounded-xl text-center font-black text-xl mb-1 ${alarmaLel ? 'bg-red-100 border-red-500 text-red-900' : 'border-white shadow-sm bg-white'}`}/>
                            {alarmaLel && <p className="text-red-600 text-[10px] font-black mb-3 text-center animate-pulse tracking-widest">⚠️ ALARMA: Fuga LEL Detectada</p>}
                            <MultiFotoUploader idCampo="lel" turnoId={turnoId} onFotosActualizadas={manejarFotos} titulo="Fotos de Pantalla Detector LEL" />
                        </div>
                    </div>

                    <div className="bg-white p-5 rounded-3xl border-l-[6px] border-l-blue-500 shadow-md">
                        <h3 className="text-[10px] font-black text-gray-400 uppercase mb-3 tracking-widest">PC-3: Guarda Hidráulica</h3>
                        <div className="flex justify-between items-center mb-2"><label className="text-xs text-gray-500 font-bold uppercase">Nivel en Visor</label><Fantasma valor={prevData?.nivel_guarda_hidraulica} /></div>
                        <select onChange={e=>setFd({...fd, guarda:e.target.value})} className={`w-full border-2 p-4 rounded-xl font-bold text-sm mb-2 transition-colors ${fd.guarda !== 'Nivel Normal' ? 'bg-red-50 border-red-300 text-red-800' : 'bg-gray-50 border-gray-100'}`}>
                            <option>Nivel Normal</option><option>Bajo (Perdida de sello)</option><option>Rebalse</option>
                        </select>
                        <MultiFotoUploader idCampo="guarda" turnoId={turnoId} onFotosActualizadas={manejarFotos} titulo="Fotos de Visor de Nivel" />
                    </div>

                    <div className="bg-white p-5 rounded-3xl border-l-[6px] border-l-blue-500 shadow-md">
                        <h3 className="text-[10px] font-black text-gray-400 uppercase mb-4 tracking-widest border-b pb-2">PC-4: Inyeccion de Aire</h3>
                        <div className="grid grid-cols-2 gap-3 mb-4">
                            <div><label className="text-[9px] text-gray-500 font-black uppercase mb-1 block">Soplador 1</label><select onChange={e=>setFd({...fd, soplador_1: e.target.value})} className="w-full border-2 border-gray-50 bg-gray-50 p-3 rounded-xl text-xs font-black"><option>Stand-by</option><option>Operativo</option><option>Fuera de Servicio</option></select></div>
                            <div><label className="text-[9px] text-gray-500 font-black uppercase mb-1 block">Soplador 2</label><select onChange={e=>setFd({...fd, soplador_2: e.target.value})} className="w-full border-2 border-gray-50 bg-gray-50 p-3 rounded-xl text-xs font-black"><option>Stand-by</option><option>Operativo</option><option>Fuera de Servicio</option></select></div>
                        </div>
                        <div className="mb-4"><label className="text-[9px] text-gray-500 font-black uppercase mb-1 block">Condición Mecánica</label><select onChange={e=>setFd({...fd, condicion_sopladores: e.target.value})} className={`w-full border-2 p-4 rounded-xl text-xs font-black transition-colors ${fd.condicion_sopladores !== 'Operación Normal (Sin ruidos/vibración)' ? 'bg-red-50 border-red-300 text-red-800' : 'bg-gray-50 border-gray-50'}`}>{estadosAUsar.map(estado => <option key={estado.id} value={estado.descripcion}>{estado.descripcion}</option>)}</select></div>
                        <MultiFotoUploader idCampo="sopladores" turnoId={turnoId} onFotosActualizadas={manejarFotos} titulo="Fotos Sopladores/Damper" />
                    </div>

                    <div className="bg-white p-5 rounded-3xl border-l-[6px] border-l-blue-500 shadow-md">
                        <h3 className="text-[10px] font-black text-gray-400 uppercase mb-3 tracking-widest">PC-5: Linea de Biogas</h3>
                        <label className={`flex items-center space-x-3 p-4 rounded-2xl border-2 mb-4 transition-all ${fd.agua_trampa ? 'bg-gray-50 border-gray-100' : 'bg-red-50 border-red-300 shadow-inner'}`}><input type="checkbox" defaultChecked onChange={e=>setFd({...fd, agua_trampa: e.target.checked})} className="h-6 w-6 text-blue-600 rounded-lg" /><span className={`text-xs font-black uppercase ${fd.agua_trampa ? 'text-gray-700' : 'text-red-700'}`}>Agua constante OK</span></label>
                        <div className="mb-2"><label className="text-[9px] text-gray-500 font-black uppercase mb-1 block">Valvula de Corte</label><select onChange={e=>setFd({...fd, valvula_corte:e.target.value})} className={`w-full border-2 p-4 rounded-xl font-black text-xs ${fd.valvula_corte === 'Sin candado de seguridad' ? 'bg-red-100 border-red-400 text-red-800' : 'bg-gray-50 border-gray-50'}`}><option>Abierta (Candado puesto)</option><option>Cerrada (Candado puesto)</option><option>Sin candado de seguridad</option></select></div>
                        <MultiFotoUploader idCampo="trampa" turnoId={turnoId} onFotosActualizadas={manejarFotos} titulo="Fotos Trampa y Válvula" />
                    </div>

                    <div className="bg-white p-5 rounded-3xl border-l-[6px] border-l-blue-500 shadow-md">
                        <h3 className="text-[10px] font-black text-gray-400 uppercase mb-3 tracking-widest">PC-6: Gabinete de Control Eléctrico</h3>
                        <div className="mb-2"><label className="text-[9px] text-gray-500 font-black uppercase mb-1 block">Estado del Tablero</label>
                            <select onChange={e=>setFd({...fd, gabinete:e.target.value})} className={`w-full border-2 p-4 rounded-xl font-black text-xs ${fd.gabinete !== 'Operativo (Luces normales, cerrado)' ? 'bg-red-50 border-red-300 text-red-800' : 'bg-gray-50 border-gray-100'}`}>
                                <option>Operativo (Luces normales, cerrado)</option><option>Falla: Luz de alarma encendida en panel</option><option>Falla: Selector en manual o desconectado</option><option>Falla: Daño físico o puerta abierta</option><option>Falla: Alta temperatura u olor a quemado</option>
                            </select>
                        </div>
                        <MultiFotoUploader idCampo="gabinete" turnoId={turnoId} onFotosActualizadas={manejarFotos} titulo="Fotos del Panel / Instrumentos" />
                    </div>

                    <div className="bg-white p-5 rounded-3xl shadow-md border border-gray-100">
                         <label className="text-[10px] text-gray-500 font-black uppercase mb-2 block tracking-widest">Observaciones Generales</label>
                         {observationMissing && <p className="text-[10px] text-red-600 font-black mb-2 animate-pulse uppercase">⚠️ Registro de observación obligatorio (Alarmas o Fallas activas)</p>}
                         <textarea onChange={e=>setFd({...fd, observaciones:e.target.value})} className={`w-full border-2 p-4 rounded-2xl text-sm font-medium transition-all ${observationMissing ? 'bg-red-50 border-red-400 shadow-inner' : 'bg-gray-50 border-gray-50'}`} rows="4" placeholder="Justifique alarmas LEL, niveles críticos, daños o fallas eléctricas..."></textarea>
                    </div>

                    {!fotosCompletas && <p className="text-center text-[10px] text-red-600 font-black uppercase tracking-tighter pt-4 animate-bounce">Mínimo 1 fotografía por cada PC (Son 8 Puntos) para finalizar</p>}
                    
                    <button onClick={() => onTerminado(fd, fotos)} disabled={!canSubmit} className={`w-full text-white font-black py-6 rounded-3xl shadow-2xl mt-6 uppercase tracking-[0.2em] transition-all transform active:scale-95 ${canSubmit ? 'bg-blue-600 hover:bg-blue-700' : 'bg-gray-300 text-gray-400 cursor-not-allowed'}`}>Aceptar y Volver</button>
                </div>
            );
        }

        // ==========================================
        // APP PRINCIPAL (NÚCLEO COLABORATIVO)
        // ==========================================
        function App() {
            const [user, setUser] = useState(null);
            const [authChecking, setAuthChecking] = useState(true);
            const [pantallaActiva, setPantallaActiva] = useState('hub');
            const [moduloDestino, setModuloDestino] = useState(null); 
            
            const { currentStr, prevStr } = getTokens();
            const [shiftToken] = useState(currentStr);
            const [prevToken] = useState(prevStr);

            const [currentScada, setCurrentScada] = useState(null);
            const [currentGas, setCurrentGas] = useState(null);
            const [prevData, setPrevData] = useState({ turno: null, gasometro: null });
            
            const [listaFallas, setListaFallas] = useState([]);
            const [listaEstadosSopladores, setListaEstadosSopladores] = useState([]);
            const [isSaving, setIsSaving] = useState(false);
            
            const [huboAjustes, setHuboAjustes] = useState(false);
            const [ajustesOperacionales, setAjustesOperacionales] = useState('');
            const [operadoresAdicionales, setOperadoresAdicionales] = useState('');

            const cargarDatosColaborativos = async () => {
                try {
                    const { data: sData } = await supabaseClient.from('registro_turnos').select('*').eq('turno_token', shiftToken);
                    if(sData && sData.length > 0) setCurrentScada(sData[0]);
                    
                    const { data: gData } = await supabaseClient.from('inspeccion_gasometro').select('*').eq('turno_token', shiftToken);
                    if(gData && gData.length > 0) setCurrentGas(gData[0]);

                    const { data: psData } = await supabaseClient.from('registro_turnos').select('*').eq('turno_token', prevToken);
                    const { data: pgData } = await supabaseClient.from('inspeccion_gasometro').select('*').eq('turno_token', prevToken);
                    setPrevData({ turno: psData?.[0] || null, gasometro: pgData?.[0] || null });
                } catch (e) { console.error("Error cargando DB:", e); }
            };

            const cargarCatalogos = async () => {
                const { data: f } = await supabaseClient.from('catalogo_fallas_gasometro').select('*');
                const { data: s } = await supabaseClient.from('catalogo_estados_sopladores').select('*');
                if (f) setListaFallas(f);
                if (s) setListaEstadosSopladores(s);
            };

            useEffect(() => {
                supabaseClient.auth.getSession().then(({ data: { session } }) => {
                    setUser(session?.user ?? null);
                    if(session?.user) { cargarDatosColaborativos(); cargarCatalogos(); }
                    setAuthChecking(false);
                });
            }, []);

            if (authChecking) return <div className="min-h-screen bg-[#1e1e1e]"></div>;
            if (!user) return <PantallaLogin />;

            const handleSaveScada = async (scadaPayload) => {
                setIsSaving(true);
                const payload = {
                    turno_token: shiftToken,
                    operador_nombre: currentScada?.operador_nombre ? currentScada.operador_nombre : user.email,
                    tipo_turno: shiftToken.includes('DIA') ? '08:00 a 20:00' : '20:00 a 08:00',
                    scada_dig_nivel_cm: scadaPayload.dig_nivel || null,
                    scada_dig_presion_mbar: scadaPayload.dig_presion || null,
                    scada_dig_temp_c: scadaPayload.dig_temp || null,
                    scada_nivel_gasometro: scadaPayload.gas_nivel || null,
                    scada_presion_mbar: scadaPayload.gas_presion || null,
                    scada_flujo_biogas_nm3h: scadaPayload.comp_flujo || null,
                    scada_comp_presion_imp_mbar: scadaPayload.comp_pres_imp || null,
                    scada_cald_flujo_m3h: scadaPayload.cald_flujo || null,
                    scada_ant_flujo_m3h: scadaPayload.ant_flujo || null
                };

                if (!currentScada?.hora_inicio) payload.hora_inicio = new Date();

                if (currentScada?.id) {
                    await supabaseClient.from('registro_turnos').update(payload).eq('id', currentScada.id);
                } else {
                    await supabaseClient.from('registro_turnos').insert([payload]);
                }
                
                await cargarDatosColaborativos();
                setIsSaving(false);
                setPantallaActiva('hub');
            };

            const handleSaveGasometro = async (data) => {
                setIsSaving(true);
                const payload = {
                    turno_token: shiftToken,
                    operador_nombre: currentGas?.operador_nombre ? currentGas.operador_nombre : user.email,
                    estado_anclajes: data.anclajes,
                    altura_interna_m: data.altura || null, 
                    presion_inter_membrana_mbar: data.presion || null, 
                    lectura_lel_porcentaje: data.lel || null, 
                    nivel_guarda_hidraulica: data.guarda,
                    soplador_1_estado: data.soplador_1, 
                    soplador_2_estado: data.soplador_2, 
                    sopladores_condicion_mecanica: data.condicion_sopladores, 
                    flujo_agua_trampa: data.agua_trampa, 
                    estado_valvula_corte: data.valvula_corte,
                    estado_gabinete_electrico: data.gabinete, 
                    observaciones: data.observaciones,
                    foto_anclaje: data.fotos.anclaje, foto_altura: data.fotos.altura,
                    foto_presion: data.fotos.presion, foto_lel: data.fotos.lel,
                    foto_guarda: data.fotos.guarda, foto_sopladores: data.fotos.sopladores,
                    foto_trampa: data.fotos.trampa, foto_gabinete: data.fotos.gabinete
                };

                if (currentGas?.id) {
                    await supabaseClient.from('inspeccion_gasometro').update(payload).eq('id', currentGas.id);
                } else {
                    await supabaseClient.from('inspeccion_gasometro').insert([payload]);
                }
                
                await cargarDatosColaborativos();
                setIsSaving(false);
                setPantallaActiva('hub');
            };

            const manejarFinalizacionTotal = async () => {
                setIsSaving(true);
                try {
                    if (currentScada?.id) {
                        await supabaseClient.from('registro_turnos').update({
                            estado_ronda: 'Completada', 
                            hora_fin: new Date(),
                            setpoints_ajustados: huboAjustes ? ajustesOperacionales : null,
                            operadores_adicionales: operadoresAdicionales || null
                        }).eq('id', currentScada.id);
                    }
                    setIsSaving(false);
                    setPantallaActiva('fin');
                } catch (error) { alert("Error: " + error.message); setIsSaving(false); }
            };

            if (pantallaActiva === 'hub') {
                const scadaDone = !!currentScada;
                const gasDone = !!currentGas;
                const listoParaCerrar = scadaDone && gasDone;
                const urlDigestor = "https://cbvipsjpvlgyipifidyo.supabase.co/storage/v1/object/public/inspeccion_fotos/Digestor.jpg";
                const urlGasometro = "https://cbvipsjpvlgyipifidyo.supabase.co/storage/v1/object/public/inspeccion_fotos/Gasometro%20vista%20general.jpeg";
                const urlCompresores = "https://cbvipsjpvlgyipifidyo.supabase.co/storage/v1/object/public/inspeccion_fotos/Sala%20de%20Compresores.jpg";
                const urlCalderas = "https://cbvipsjpvlgyipifidyo.supabase.co/storage/v1/object/public/inspeccion_fotos/Sala%20de%20Calderas.jpg";
                const urlAntorchas = "https://cbvipsjpvlgyipifidyo.supabase.co/storage/v1/object/public/inspeccion_fotos/Antorchas.jpeg";

                return (
                    <div className="p-4 max-w-md mx-auto min-h-screen space-y-6 font-sans bg-gray-50 pb-10">
                        <div className="bg-[#1e293b] p-6 rounded-3xl text-white shadow-xl">
                            <div className="flex justify-between items-start border-b border-slate-700 pb-4 mb-4">
                                <div><h1 className="text-2xl font-black tracking-tighter">RondaSync</h1><p className="text-[10px] text-amber-400 font-black uppercase tracking-widest">{shiftToken}</p></div>
                                <button onClick={async () => { await supabaseClient.auth.signOut(); window.location.reload(); }} className="text-[10px] font-black bg-red-500/20 text-red-300 px-4 py-2 rounded-xl border border-red-500/30 hover:bg-red-500/40 shadow-sm transition-all">SALIR</button>
                            </div>
                            <div className="flex justify-between items-center">
                                <div><p className="text-[10px] text-slate-400 font-bold uppercase mb-1">Operador Logueado</p><p className="text-sm font-bold truncate max-w-[150px]">{user.email}</p></div>
                                <button onClick={cargarDatosColaborativos} className="bg-slate-700 px-3 py-2 rounded-lg text-[10px] font-black flex items-center shadow-md active:scale-95"><span className="mr-1">🔄</span> Sincronizar</button>
                            </div>
                        </div>

                        <div className="space-y-3">
                            <button onClick={() => setPantallaActiva('dashboard')} className="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl shadow-md uppercase tracking-widest text-xs flex justify-center items-center hover:bg-indigo-700 transition-colors mb-2">
                                <span className="text-lg mr-2">📊</span> Módulo Supervisión y KPIs
                            </button>

                            <h3 className="text-[10px] font-black text-gray-400 uppercase tracking-widest px-2 pt-2">Módulos del Turno Actual</h3>
                            
                            <button onClick={() => setPantallaActiva('traspaso')} className="w-full flex justify-between items-center p-5 rounded-2xl border-2 bg-white border-amber-200 shadow-sm hover:border-amber-400 transition-all">
                                <div className="flex items-center space-x-4"><span className="text-2xl">📋</span><span className="font-black text-sm uppercase text-amber-800">Traspaso de Turno</span></div>
                                <span className="text-xs text-amber-600 font-bold">Ver ➜</span>
                            </button>

                            <button onClick={() => setPantallaActiva('scada')} className={`w-full flex justify-between items-center p-5 rounded-2xl border-2 transition-all ${scadaDone ? 'bg-emerald-50 border-emerald-500 shadow-inner' : 'bg-white border-blue-200 shadow-sm hover:border-blue-400'}`}>
                                <div className="flex items-center space-x-4"><span className="text-2xl">{scadaDone ? '🔒' : '🖥️'}</span>
                                    <div className="text-left"><span className={`font-black text-sm uppercase block ${scadaDone ? 'text-emerald-800' : 'text-blue-900'}`}>Línea Base SCADA</span>
                                    {scadaDone && <span className="text-[9px] font-bold text-emerald-600 uppercase">Por {currentScada.operador_nombre.split('@')[0]}</span>}</div>
                                </div>
                                <span className={`text-[10px] font-black uppercase px-3 py-1 rounded-lg ${scadaDone ? 'bg-emerald-100 text-emerald-800' : 'bg-blue-100 text-blue-800'}`}>{scadaDone ? 'Ver Inicial' : 'Llenar'}</span>
                            </button>

                            <div className="mt-4">
                                <h3 className="text-[10px] font-black text-gray-400 uppercase tracking-widest px-2 mb-3 mt-4">Instalaciones en Terreno</h3>
                                <div className="grid grid-cols-2 gap-4">
                                    <button onClick={() => { setModuloDestino('digestor'); setPantallaActiva('riesgos'); }} className="bg-white p-2 rounded-3xl border-2 border-blue-400 text-left relative overflow-hidden shadow-lg hover:scale-105 transition-all"><div className="h-28 w-full rounded-2xl overflow-hidden mb-2"><img src={urlDigestor} className="w-full h-full object-cover" /></div><span className="font-black text-xs px-2 text-blue-900 uppercase">Digestor</span></button>
                                    
                                    <button onClick={() => { setModuloDestino('gasometro'); setPantallaActiva('riesgos'); }} className={`p-2 rounded-3xl border-2 transition-all text-left relative overflow-hidden shadow-lg ${gasDone ? 'bg-emerald-50 border-emerald-500' : 'bg-white border-blue-400 hover:scale-105'}`}>{gasDone && <div className="absolute top-4 right-4 z-10 bg-emerald-500 text-white rounded-full h-8 w-8 flex items-center justify-center shadow-xl border-2 border-white font-black">✓</div>}<div className="h-28 w-full rounded-2xl overflow-hidden mb-2 shadow-inner"><img src={urlGasometro} className="w-full h-full object-cover" /></div><span className={`font-black text-xs px-2 uppercase ${gasDone ? 'text-emerald-800' : 'text-blue-900'}`}>Gasómetro</span></button>
                                    
                                    <button onClick={() => { setModuloDestino('compresores'); setPantallaActiva('riesgos'); }} className="bg-white p-2 rounded-3xl border-2 border-blue-400 text-left relative overflow-hidden shadow-lg hover:scale-105 transition-all"><div className="h-28 w-full rounded-2xl overflow-hidden mb-2"><img src={urlCompresores} className="w-full h-full object-cover" /></div><span className="font-black text-xs px-2 text-blue-900 uppercase">Compresores</span></button>
                                    
                                    <button onClick={() => { setModuloDestino('calderas'); setPantallaActiva('riesgos'); }} className="bg-white p-2 rounded-3xl border-2 border-blue-400 text-left relative overflow-hidden shadow-lg hover:scale-105 transition-all"><div className="h-28 w-full rounded-2xl overflow-hidden mb-2"><img src={urlCalderas} className="w-full h-full object-cover" /></div><span className="font-black text-xs px-2 text-blue-900 uppercase">Calderas</span></button>
                                    
                                    <button onClick={() => { setModuloDestino('antorchas'); setPantallaActiva('riesgos'); }} className="bg-white p-2 rounded-3xl border-2 border-blue-400 text-left relative overflow-hidden shadow-lg col-span-2 hover:scale-[1.02] transition-all"><div className="h-28 w-full rounded-2xl overflow-hidden mb-2"><img src={urlAntorchas} className="w-full h-full object-cover" /></div><span className="font-black text-xs px-2 text-blue-900 uppercase">Antorchas 1 y 2</span></button>
                                </div>
                            </div>
                        </div>

                        {listoParaCerrar && (
                            <div className="mt-8 pt-4 border-t border-gray-200">
                                <button onClick={() => setPantallaActiva('resumen_final')} className="w-full bg-zinc-900 text-white font-black py-5 rounded-3xl shadow-2xl uppercase tracking-widest transition-all transform active:scale-95">Revisar y Cerrar Turno</button>
                            </div>
                        )}
                    </div>
                );
            }

            if (pantallaActiva === 'dashboard') return <VistaDashboard onBack={() => setPantallaActiva('hub')} />;
            if (pantallaActiva === 'traspaso') return <VistaTraspaso prevTurno={prevData.turno} prevGasometro={prevData.gasometro} onBack={() => setPantallaActiva('hub')} />;
            if (pantallaActiva === 'scada') return <VistaScada datosGuardados={currentScada} prevData={prevData.turno} onSave={handleSaveScada} onBack={() => setPantallaActiva('hub')} />;
            
            // LA NUEVA COMPUERTA DINÁMICA
            if (pantallaActiva === 'riesgos') return <VistaRiesgos modulo={moduloDestino} onComplete={() => setPantallaActiva(moduloDestino)} onBack={() => setPantallaActiva('hub')} />;
            
            if (pantallaActiva === 'gasometro') return (
                <div>
                    {isSaving && <div className="fixed inset-0 bg-black/80 z-50 flex flex-col items-center justify-center text-white"><div className="text-4xl animate-spin mb-4">⚙️</div><h2 className="font-black tracking-widest uppercase">Guardando Inspección...</h2></div>}
                    <FormularioGasometro turnoId={shiftToken} prevData={prevData.gasometro} listaFallas={listaFallas} listaEstadosSopladores={listaEstadosSopladores} onTerminado={handleSaveGasometro} onBack={() => setPantallaActiva('hub')} />
                </div>
            );

            // Módulos en construcción
            if (pantallaActiva === 'digestor' || pantallaActiva === 'compresores' || pantallaActiva === 'calderas' || pantallaActiva === 'antorchas') return <VistaGenerica modulo={pantallaActiva} onBack={() => setPantallaActiva('hub')} />;

            if (pantallaActiva === 'resumen_final') return <VistaResumenFinal turnoContexto={currentScada} datosGasometro={currentGas} onConfirm={manejarFinalizacionTotal} onBack={() => setPantallaActiva('hub')} loading={isSaving} huboAjustes={huboAjustes} setHuboAjustes={setHuboAjustes} ajustesOperacionales={ajustesOperacionales} setAjustesOperacionales={setAjustesOperacionales} operadoresAdicionales={operadoresAdicionales} setOperadoresAdicionales={setOperadoresAdicionales} />;
            if (pantallaActiva === 'fin') return (
                <div className="flex flex-col items-center justify-center min-h-screen p-6 bg-[#1e1e1e] text-center text-white">
                    <div className="bg-[#2a2a2a] p-10 rounded-[3rem] border border-zinc-700 shadow-2xl"><div className="text-7xl mb-8">✅</div><h2 className="text-3xl font-black mb-4 tracking-tighter">Turno Cerrado</h2><p className="text-zinc-400 mb-10 font-medium">La bitácora y los ajustes han sido asegurados en el servidor.</p><button onClick={async () => { await supabaseClient.auth.signOut(); window.location.reload(); }} className="w-full bg-amber-500 hover:bg-amber-600 text-zinc-900 font-black py-5 rounded-2xl uppercase tracking-widest shadow-xl transform active:scale-95 transition-all">Cerrar Sesión (Siguiente Turno)</button></div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
