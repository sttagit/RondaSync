<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RondaSync - PTAS Talagante</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        aguas: {
                            blue: '#0068B3',
                            green: '#009C62',
                            yellow: '#F4C300',
                            dark: '#004A80'
                        }
                    }
                }
            }
        }
    </script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body className="bg-gray-100 selection:bg-aguas-yellow selection:text-aguas-dark">
    <div id="root"></div>

    <script type="text/babel">
        // ==========================================
        // CONFIGURACIÓN DE SUPABASE Y UTILIDADES
        // ==========================================
        const SUPABASE_URL = 'https://cbvipsjpvlgyipifidyo.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_-9xy9fwszhg5RMqlilNn-A_wnK2VGCb';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const { useState, useEffect, useRef } = React;

        function getTokens() {
            const now = new Date();
            let hours = now.getHours();
            let currentStr = ''; let prevStr = '';
            const formatDt = (d) => d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');

            if (hours < 8) { 
                const prevDay = new Date(now); prevDay.setDate(now.getDate() - 1);
                currentStr = formatDt(prevDay) + '-NOCHE'; prevStr = formatDt(prevDay) + '-DIA';
            } else if (hours >= 8 && hours < 20) { 
                currentStr = formatDt(now) + '-DIA';
                const prevDay = new Date(now); prevDay.setDate(now.getDate() - 1);
                prevStr = formatDt(prevDay) + '-NOCHE';
            } else { 
                currentStr = formatDt(now) + '-NOCHE'; prevStr = formatDt(now) + '-DIA';
            }
            return { currentStr, prevStr };
        }

        const Fantasma = ({ valor }) => (valor === null || valor === undefined || valor === '') ? null : <span className="text-[9px] bg-blue-50 text-aguas-blue px-1.5 rounded font-bold border border-blue-200">Ant: {valor}</span>;

        // ==========================================
        // MULTI-FOTO UPLOADER
        // ==========================================
        function MultiFotoUploader({ idCampo, turnoId, onFotosActualizadas, titulo, fotosIniciales = [] }) {
            const [fotos, setFotos] = useState(fotosIniciales);
            const [subiendoIndex, setSubiendoIndex] = useState(null);

            const manejarCaptura = (e) => {
                const archivo = e.target.files[0];
                if (!archivo || fotos.length >= 3) return;
                const nuevaFoto = { localUrl: URL.createObjectURL(archivo), realFile: archivo, remoteUrl: null };
                setFotos([...fotos, nuevaFoto]);
            };

            const subirFoto = async (index) => {
                const foto = fotos[index];
                if (!foto.realFile || foto.remoteUrl) return;
                setSubiendoIndex(index);
                const ext = foto.realFile.name.split('.').pop();
                const nombreArchivo = `${turnoId}-${idCampo}-${index}-${Date.now()}.${ext}`;

                const { error } = await supabaseClient.storage.from('inspeccion_fotos').upload(nombreArchivo, foto.realFile);
                if (!error) {
                    const { data } = supabaseClient.storage.from('inspeccion_fotos').getPublicUrl(nombreArchivo);
                    const nuevasFotos = [...fotos]; nuevasFotos[index].remoteUrl = data.publicUrl;
                    setFotos(nuevasFotos);
                    onFotosActualizadas(idCampo, nuevasFotos.map(f => f.remoteUrl).filter(url => url !== null));
                }
                setSubiendoIndex(null);
            };

            const eliminarFoto = (index) => {
                const nuevasFotos = fotos.filter((_, i) => i !== index);
                setFotos(nuevasFotos); onFotosActualizadas(idCampo, nuevasFotos.map(f => f.remoteUrl).filter(url => url !== null));
            };

            return (
                <div className="mt-3 space-y-2">
                    <div className="grid grid-cols-3 gap-2">
                        {fotos.map((foto, index) => (
                            <div key={index} className="relative group">
                                <img src={foto.localUrl} className="h-24 w-full object-cover rounded-lg border-2 border-white shadow-sm" />
                                {!foto.remoteUrl && subiendoIndex !== index && ( <button onClick={() => subirFoto(index)} className="absolute inset-0 bg-black/40 flex items-center justify-center rounded-lg"><span className="bg-aguas-green text-white text-[10px] font-bold px-2 py-1 rounded shadow-lg">SUBIR</span></button> )}
                                {subiendoIndex === index && ( <div className="absolute inset-0 bg-white/60 flex items-center justify-center rounded-lg"><div className="w-5 h-5 border-2 border-aguas-blue border-t-transparent rounded-full animate-spin"></div></div> )}
                                {foto.remoteUrl && ( <div className="absolute top-1 right-1 bg-aguas-green text-white rounded-full p-0.5 shadow-md"><svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 13l4 4L19 7"></path></svg></div> )}
                                <button onClick={() => eliminarFoto(index)} className="absolute -top-2 -left-2 bg-red-500 text-white rounded-full w-6 h-6 flex items-center justify-center shadow-lg font-bold">×</button>
                            </div>
                        ))}
                        {fotos.length < 3 && (
                            <label className="h-24 border-2 border-dashed border-aguas-blue bg-blue-50/50 rounded-lg flex flex-col items-center justify-center cursor-pointer hover:bg-blue-100 transition-colors shadow-inner">
                                <span className="text-2xl text-aguas-blue">+</span><span className="text-[9px] font-bold text-aguas-blue uppercase tracking-tighter">Foto {fotos.length + 1}</span>
                                <input type="file" accept="image/*" capture="environment" className="hidden" onChange={manejarCaptura} />
                            </label>
                        )}
                    </div>
                </div>
            );
        }

        // ==========================================
        // LOGIN CORPORATIVO
        // ==========================================
        function PantallaLogin() {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false);
            const [showPassword, setShowPassword] = useState(false);
            const [mensajeError, setMensajeError] = useState('');

            const manejarLogin = async (e) => {
                e.preventDefault(); setLoading(true); setMensajeError(''); 
                try {
                    const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
                    if (error) {
                        setMensajeError(error.message.includes('Invalid login credentials') ? 'Correo o contraseña incorrectos.' : 'Error: ' + error.message);
                        setLoading(false);
                    } else if (!data.session) {
                        setMensajeError('Error al establecer la sesión.'); setLoading(false);
                    } else { window.location.reload(); }
                } catch (err) { setMensajeError('Fallo de conexión. Revisa tu internet.'); setLoading(false); }
            };

            return (
                <div className="min-h-screen bg-gray-100 flex items-center justify-center p-4 font-sans">
                    <div className="bg-white w-full max-w-md rounded-3xl p-8 shadow-2xl border-t-8 border-t-aguas-blue">
                        <div className="flex flex-col items-center mb-8">
                            <div className="w-16 h-16 bg-aguas-blue rounded-2xl flex items-center justify-center shadow-lg mb-4"><span className="font-black text-white text-3xl tracking-tighter">RS</span></div>
                            <h1 className="text-2xl font-black text-aguas-dark tracking-tight">RondaSync</h1>
                            <p className="text-[10px] text-aguas-green font-black uppercase tracking-[0.3em] mt-1">PTAS Talagante</p>
                        </div>
                        <form onSubmit={manejarLogin} className="space-y-5">
                            {mensajeError && <div className="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl text-[11px] font-bold text-center animate-pulse">⚠️ {mensajeError}</div>}
                            <div><label className="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2">Correo Electrónico</label><input type="email" value={email} onChange={e => setEmail(e.target.value)} className="w-full bg-gray-50 border-2 border-gray-200 rounded-xl p-4 focus:border-aguas-blue outline-none" required /></div>
                            <div className="relative"><label className="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2">Contraseña</label><input type={showPassword ? "text" : "password"} value={password} onChange={e => setPassword(e.target.value)} className="w-full bg-gray-50 border-2 border-gray-200 rounded-xl p-4 pr-12 focus:border-aguas-blue outline-none" required /><button type="button" onClick={() => setShowPassword(!showPassword)} className="absolute right-4 top-[2.35rem] p-1 text-gray-400 hover:text-aguas-blue outline-none">
                                {showPassword ? ( <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor" className="w-5 h-5"><path strokeLinecap="round" strokeLinejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" /></svg> ) : ( <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor" className="w-5 h-5"><path strokeLinecap="round" strokeLinejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" /><path strokeLinecap="round" strokeLinejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg> )}
                            </button></div>
                            <button type="submit" disabled={loading} className="w-full bg-aguas-blue text-white font-black py-4 rounded-xl uppercase tracking-widest shadow-lg hover:bg-aguas-dark active:scale-95 transition-all mt-6">{loading ? 'Verificando...' : 'Iniciar Sesión'}</button>
                        </form>
                    </div>
                </div>
            );
        }

        // ==========================================
        // VISTAS COMUNES (SCADA INICIAL)
        // ==========================================
        function VistaScada({ datosGuardados, prevData, onSave, onBack }) {
            const isLocked = !!datosGuardados; 
            const [scada, setScada] = useState({ dig_nivel: '', dig_presion: '', dig_temp: '', gas_nivel: '', gas_presion: '', comp_flujo: '', comp_pres_imp: '', cald_flujo: '', ant_flujo: '' });

            if (isLocked) {
                return (
                    <div className="p-4 max-w-md mx-auto space-y-4 min-h-screen pb-20 font-sans">
                        <div className="bg-aguas-blue p-5 rounded-2xl text-white shadow-xl flex justify-between items-center"><h2 className="text-lg font-black uppercase">SCADA Inicial</h2><button onClick={onBack} className="bg-white/20 px-3 py-1 rounded-full text-xs font-bold">Volver</button></div>
                        <div className="bg-blue-50 border-2 border-blue-200 p-4 rounded-2xl flex items-center justify-between"><p className="text-[10px] font-black text-aguas-blue uppercase">Línea Base Registrada</p><span className="text-3xl">🔒</span></div>
                        <div className="bg-white rounded-3xl shadow-md border p-5 space-y-6">
                            <div><h4 className="text-[10px] font-black text-aguas-blue uppercase mb-3 border-b pb-1">1. Digestor</h4><div className="grid grid-cols-3 gap-3"><div className="bg-gray-50 p-3 rounded-xl text-center"><p className="text-[9px] text-gray-400 font-black uppercase">Nivel</p><p className="font-black text-gray-800">{datosGuardados.scada_dig_nivel_cm} cm</p></div><div className="bg-gray-50 p-3 rounded-xl text-center"><p className="text-[9px] text-gray-400 font-black uppercase">Presión</p><p className="font-black text-gray-800">{datosGuardados.scada_dig_presion_mbar} mb</p></div><div className="bg-gray-50 p-3 rounded-xl text-center"><p className="text-[9px] text-gray-400 font-black uppercase">Temp</p><p className="font-black text-gray-800">{datosGuardados.scada_dig_temp_c} °C</p></div></div></div>
                            <div><h4 className="text-[10px] font-black text-aguas-yellow uppercase mb-3 border-b pb-1">2. Gasometro</h4><div className="grid grid-cols-2 gap-3"><div className="bg-amber-50 p-3 rounded-xl text-center"><p className="text-[9px] text-amber-600 font-black uppercase">Nivel</p><p className="font-black text-amber-900 text-lg">{datosGuardados.scada_nivel_gasometro} %</p></div><div className="bg-amber-50 p-3 rounded-xl text-center"><p className="text-[9px] text-amber-600 font-black uppercase">Presión</p><p className="font-black text-amber-900 text-lg">{datosGuardados.scada_presion_mbar} mb</p></div></div></div>
                            <div><h4 className="text-[10px] font-black text-aguas-green uppercase mb-3 border-b pb-1">3. Compresores/Calderas</h4><div className="grid grid-cols-2 gap-3 mb-3"><div className="bg-gray-50 p-3 rounded-xl text-center"><p className="text-[9px] text-gray-400 font-black uppercase">Flujo Comp.</p><p className="font-black text-gray-800">{datosGuardados.scada_flujo_biogas_nm3h}</p></div><div className="bg-gray-50 p-3 rounded-xl text-center"><p className="text-[9px] text-gray-400 font-black uppercase">Pres. Imp.</p><p className="font-black text-gray-800">{datosGuardados.scada_comp_presion_imp_mbar} mb</p></div></div><div className="grid grid-cols-2 gap-3"><div className="bg-gray-50 p-3 rounded-xl text-center"><p className="text-[9px] text-gray-400 font-black uppercase">Flujo Cald.</p><p className="font-black text-gray-800">{datosGuardados.scada_cald_flujo_m3h}</p></div><div className="bg-gray-50 p-3 rounded-xl text-center"><p className="text-[9px] text-gray-400 font-black uppercase">Flujo Ant.</p><p className="font-black text-gray-800">{datosGuardados.scada_ant_flujo_m3h}</p></div></div></div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="p-4 max-w-md mx-auto space-y-4 min-h-screen pb-20 font-sans">
                    <div className="bg-aguas-blue p-5 rounded-2xl text-white shadow-xl flex justify-between items-center"><h2 className="text-lg font-black uppercase">Línea Base SCADA</h2><button onClick={onBack} className="bg-white/20 px-3 py-1 rounded-full text-xs font-bold">Volver</button></div>
                    <div className="bg-white rounded-3xl shadow-md border border-gray-100 p-5 space-y-6">
                        <div><h4 className="text-[10px] font-black text-aguas-blue uppercase mb-3 border-b pb-1">1. Digestor</h4><div className="grid grid-cols-3 gap-3"><div><div className="flex justify-between items-center mb-1"><label className="text-[9px] text-gray-400 font-black">Nivel (cm)</label><Fantasma valor={prevData?.scada_dig_nivel_cm}/></div><input type="number" value={scada.dig_nivel} onChange={e => setScada({...scada, dig_nivel: e.target.value})} className="w-full border-2 p-3 rounded-xl text-center font-bold bg-gray-50 focus:border-aguas-blue outline-none" /></div><div><div className="flex justify-between items-center mb-1"><label className="text-[9px] text-gray-400 font-black">Pres. (mb)</label><Fantasma valor={prevData?.scada_dig_presion_mbar}/></div><input type="number" value={scada.dig_presion} onChange={e => setScada({...scada, dig_presion: e.target.value})} className="w-full border-2 p-3 rounded-xl text-center font-bold bg-gray-50 focus:border-aguas-blue outline-none" /></div><div><div className="flex justify-between items-center mb-1"><label className="text-[9px] text-gray-400 font-black">Temp (°C)</label><Fantasma valor={prevData?.scada_dig_temp_c}/></div><input type="number" value={scada.dig_temp} onChange={e => setScada({...scada, dig_temp: e.target.value})} className="w-full border-2 p-3 rounded-xl text-center font-bold bg-gray-50 focus:border-aguas-blue outline-none" /></div></div></div>
                        <div><h4 className="text-[10px] font-black text-aguas-yellow uppercase mb-3 border-b pb-1">2. Gasometro</h4><div className="grid grid-cols-2 gap-3"><div><div className="flex justify-between items-center mb-1"><label className="text-[9px] text-gray-400 font-black">Nivel (%)</label><Fantasma valor={prevData?.scada_nivel_gasometro}/></div><input type="number" value={scada.gas_nivel} onChange={e => setScada({...scada, gas_nivel: e.target.value})} className="w-full border-2 p-3 rounded-xl text-center font-black text-amber-900 bg-amber-50 outline-none text-xl" /></div><div><div className="flex justify-between items-center mb-1"><label className="text-[9px] text-gray-400 font-black">Pres. (mb)</label><Fantasma valor={prevData?.scada_presion_mbar}/></div><input type="number" value={scada.gas_presion} onChange={e => setScada({...scada, gas_presion: e.target.value})} className="w-full border-2 p-3 rounded-xl text-center font-black text-amber-900 bg-amber-50 outline-none text-xl" /></div></div></div>
                        <div><h4 className="text-[10px] font-black text-aguas-green uppercase mb-3 border-b pb-1">3. Compresores/Calderas</h4><div className="grid grid-cols-2 gap-3 mb-3"><div><div className="flex justify-between items-center mb-1"><label className="text-[9px] text-gray-400 font-black">Flujo Comp.</label><Fantasma valor={prevData?.scada_flujo_biogas_nm3h}/></div><input type="number" value={scada.comp_flujo} onChange={e => setScada({...scada, comp_flujo: e.target.value})} className="w-full border-2 p-3 rounded-xl text-center font-bold bg-gray-50 outline-none" /></div><div><div className="flex justify-between items-center mb-1"><label className="text-[9px] text-gray-400 font-black">Pres. Imp.</label><Fantasma valor={prevData?.scada_comp_presion_imp_mbar}/></div><input type="number" value={scada.comp_pres_imp} onChange={e => setScada({...scada, comp_pres_imp: e.target.value})} className="w-full border-2 p-3 rounded-xl text-center font-bold bg-gray-50 outline-none" /></div></div><div className="grid grid-cols-2 gap-3"><div><div className="flex justify-between items-center mb-1"><label className="text-[9px] text-gray-400 font-black">Flujo Calderas</label><Fantasma valor={prevData?.scada_cald_flujo_m3h}/></div><input type="number" value={scada.cald_flujo} onChange={e => setScada({...scada, cald_flujo: e.target.value})} className="w-full border-2 p-3 rounded-xl text-center font-bold bg-gray-50 outline-none" /></div><div><div className="flex justify-between items-center mb-1"><label className="text-[9px] text-gray-400 font-black">Flujo Antorchas</label><Fantasma valor={prevData?.scada_ant_flujo_m3h}/></div><input type="number" value={scada.ant_flujo} onChange={e => setScada({...scada, ant_flujo: e.target.value})} className="w-full border-2 p-3 rounded-xl text-center font-bold bg-gray-50 outline-none" /></div></div></div>
                    </div>
                    <button onClick={() => onSave(scada)} className="w-full bg-aguas-green text-white font-black py-6 rounded-3xl shadow-xl uppercase tracking-widest hover:bg-[#008251] flex justify-center items-center"><span className="text-xl mr-2">🔒</span> Sellar Base SCADA</button>
                </div>
            );
        }

        // ==========================================
        // VISTA P.O.W.R.A (CON RIESGOS LODOS)
        // ==========================================
        function VistaRiesgos({ modulo, onComplete, onBack }) {
            const [epp, setEpp] = useState({ epp1:false, epp2:false, epp3:false, epp4:false });
            const [ax, setAx] = useState([]);

            const atexData = {
                gasometro: [{ id: 1, color: 'red', text: "Z1: Válvula Damper y Purga (r=1.0m)" }, { id: 2, color: 'amber', text: "Z2: Guarda Hidráulica (r=1.5m)" }],
                digestor: [{ id: 1, color: 'red', text: "Z1: Interior Digestor y Escotillas" }, { id: 2, color: 'amber', text: "Z2: Válvulas Baja Pres." }],
                compresores: [{ id: 1, color: 'red', text: "Z1: Caseta y Arqueta Purgas" }, { id: 2, color: 'amber', text: "Z2: Rejillas ventilación" }],
                calderas: [{ id: 1, color: 'red', text: "Z1: Arqueta canalización biogás" }],
                area50: [{ id: 1, color: 'amber', text: "Riesgo H2S: Mantener detector activo" }, { id: 2, color: 'amber', text: "Riesgo Caídas: Pasarelas flotador" }],
                area60: [{ id: 1, color: 'red', text: "Riesgo Térmico: Tuberías de Alta T°" }, { id: 2, color: 'amber', text: "Alta Presión: Líneas de Lodo" }]
            };

            const riesgosActuales = atexData[modulo] || atexData.gasometro;
            const toggleAx = (id) => ax.includes(id) ? setAx(ax.filter(i => i !== id)) : setAx([...ax, id]);
            const listo = epp.epp1 && epp.epp2 && epp.epp3 && epp.epp4 && (ax.length === riesgosActuales.length);
            const modulosNombres = { gasometro: 'Gasómetro', digestor: 'Digestor', compresores: 'Compresores', calderas: 'Calderas', area50: 'Área 50 (Flotador)', area60: 'Área 60 (Intercambiador)' };

            return (
                <div className="p-4 max-w-md mx-auto space-y-4 min-h-screen pb-10 font-sans">
                    <div className="bg-aguas-dark p-5 rounded-2xl text-white shadow-xl flex justify-between items-center"><div className="flex items-center"><span className="text-2xl mr-3">🛑</span><h2 className="text-lg font-black uppercase">P.O.W.R.A.</h2></div><button onClick={onBack} className="bg-white/20 px-3 py-1 rounded-full text-xs font-bold">Volver</button></div>
                    <p className="text-[11px] text-gray-500 font-black px-2 uppercase tracking-widest text-center">Evaluación: {modulosNombres[modulo]}</p>
                    <div className="bg-white rounded-3xl shadow-sm border p-5 space-y-3">
                        <label className="flex items-center space-x-3 p-3 bg-gray-50 rounded-2xl border cursor-pointer"><input type="checkbox" onChange={e=>setEpp({...epp, epp1:e.target.checked})} className="h-6 w-6 text-aguas-blue"/> <span className="text-xs font-bold">Casco, Lentes, Guantes</span></label>
                        <label className="flex items-center space-x-3 p-3 bg-gray-50 rounded-2xl border cursor-pointer"><input type="checkbox" onChange={e=>setEpp({...epp, epp2:e.target.checked})} className="h-6 w-6 text-aguas-blue"/> <span className="text-xs font-bold">Detector Multigas Activo</span></label>
                        <label className="flex items-center space-x-3 p-3 bg-gray-50 rounded-2xl border cursor-pointer"><input type="checkbox" onChange={e=>setEpp({...epp, epp3:e.target.checked})} className="h-6 w-6 text-aguas-blue"/> <span className="text-xs font-bold">Máscara / Filtros</span></label>
                        <label className="flex items-center space-x-3 p-3 bg-gray-50 rounded-2xl border cursor-pointer"><input type="checkbox" onChange={e=>setEpp({...epp, epp4:e.target.checked})} className="h-6 w-6 text-aguas-blue"/> <span className="text-xs font-bold">Equipos Móviles Seguros</span></label>
                    </div>

                    <div className="bg-white p-5 rounded-3xl border-l-[6px] border-l-aguas-green shadow-sm border">
                        <h3 className="text-[10px] font-black text-gray-400 uppercase mb-3">PC-2: Balón Presurizador</h3>
                        <label className="text-[10px] font-black">Nivel Visor (cm)</label>
                        <input type="number" onChange={e=>setFd({...fd, nivel:e.target.value})} className={`w-full border-2 p-3 rounded-xl text-center text-lg mb-3 outline-none focus:border-aguas-blue ${alNivel ? 'bg-red-50 border-red-400 text-red-800' : ''}`}/>
                        {alNivel && <p className="text-[9px] text-red-600 font-bold -mt-2 mb-2">⚠️ Rango Normal: 60 a 120 cm</p>}
                        <label className="text-[10px] font-black">Presión Balón (bar)</label>
                        <input type="number" step="0.1" onChange={e=>setFd({...fd, presion:e.target.value})} className={`w-full border-2 p-3 rounded-xl text-center text-lg outline-none focus:border-aguas-blue ${alPresion ? 'bg-red-50 border-red-400 text-red-800' : ''}`}/>
                        {/* AQUI SE APLICÓ EL PARCHE PARA EL MOTOR REACT (evitar colapso con símbolos) */}
                        {alPresion && <p className="text-[9px] text-red-600 font-bold mt-1">⚠️ Presión crítica ({"< 3 bar"})</p>}
                        <label className="text-[10px] font-black mt-3 block">Cámara Mezcla (%)</label>
                        <input type="number" onChange={e=>setFd({...fd, mezcla:e.target.value})} className={`w-full border-2 p-3 rounded-xl text-center text-lg outline-none focus:border-aguas-blue ${alMezcla ? 'bg-red-50 border-red-400 text-red-800' : ''}`}/>
                        <MultiFotoUploader idCampo="a50_balon" turnoId={turnoId} onFotosActualizadas={manejarFotos} titulo="Instrumentos" />
                    </div>
                    <div className="bg-white p-5 rounded-3xl shadow-sm border">
                        <label className="text-[10px] font-black uppercase mb-2 block">Observaciones Área 50</label>
                        {reqObs && <p className="text-[10px] text-red-600 font-black mb-2 animate-pulse uppercase">⚠️ Justifique alarmas</p>}
                        <textarea onChange={e=>setFd({...fd, observaciones:e.target.value})} className={`w-full border-2 p-4 rounded-2xl text-sm outline-none focus:border-aguas-blue ${reqObs ? 'bg-red-50 border-red-400' : ''}`} rows="3" placeholder="Detalles..."></textarea>
                    </div>
                    <button onClick={() => onTerminado(fd, fotos)} disabled={!canSubmit} className={`w-full text-white font-black py-6 rounded-3xl shadow-xl mt-6 uppercase tracking-widest ${canSubmit ? 'bg-aguas-blue' : 'bg-gray-300'}`}>Sellar Área 50</button>
                </div>
            );
        }

        function FormularioArea60({ turnoId, onTerminado }) {
            const [fd, setFd] = useState({ temp_in: '', temp_out: '', bombas: 'Optimo', observaciones: '' });
            const [fotos, setFotos] = useState({ inter: [], bombas: [] });
            const manejarFotos = (c, u) => setFotos(prev => ({ ...prev, [c]: u }));
            
            const tIn = parseFloat(fd.temp_in); const tOut = parseFloat(fd.temp_out);
            const deltaT = (tIn && tOut) ? (Math.abs(tIn - tOut)).toFixed(1) : '--';
            const alTempIn = tIn <= 34; const alTempOut = tOut >= 35.5;

            const reqObs = fd.bombas !== 'Optimo' || alTempIn || alTempOut;
            const canSubmit = Object.values(fotos).every(a => a && a.length > 0) && fd.temp_in && fd.temp_out && (!reqObs || fd.observaciones.trim() !== '');

            return (
                <div className="p-4 max-w-md mx-auto space-y-6 min-h-screen pb-10 font-sans">
                    <div className="bg-[#1e293b] p-5 rounded-2xl text-white shadow-xl"><h2 className="text-lg font-black uppercase">Área 60: Central Térmica</h2></div>
                    <div className="bg-white p-5 rounded-3xl border-l-[6px] border-l-red-500 shadow-sm border">
                        <h3 className="text-[10px] font-black text-gray-400 uppercase mb-3">PC-1: Intercambiador de Calor</h3>
                        <div className="grid grid-cols-2 gap-3 mb-4">
                            <div><label className="text-[9px] font-black uppercase">T° Lodo Entrada</label><input type="number" step="0.1" onChange={e=>setFd({...fd, temp_in:e.target.value})} className={`w-full border-2 p-3 rounded-xl text-center text-lg outline-none focus:border-aguas-blue ${alTempIn ? 'bg-red-50 border-red-400 text-red-800' : ''}`}/>
                            {/* PARCHE REACT SÍMBOLOS */}
                            {alTempIn && <p className="text-[8px] text-red-600 font-bold mt-1">⚠️ Debe ser {"> 34°C"}</p>}</div>
                            <div><label className="text-[9px] font-black uppercase">T° Lodo Salida</label><input type="number" step="0.1" onChange={e=>setFd({...fd, temp_out:e.target.value})} className={`w-full border-2 p-3 rounded-xl text-center text-lg outline-none focus:border-aguas-blue ${alTempOut ? 'bg-red-50 border-red-400 text-red-800' : ''}`}/>
                            {alTempOut && <p className="text-[8px] text-red-600 font-bold mt-1">⚠️ Debe ser {"< 35.5°C"}</p>}</div>
                        </div>
                        <div className="bg-blue-50 p-3 rounded-xl border border-blue-200 text-center mb-3"><p className="text-[10px] text-aguas-blue font-black uppercase">Salto Térmico (ΔT)</p><p className="text-2xl font-black text-aguas-dark">{deltaT} °C</p></div>
                        <MultiFotoUploader idCampo="a60_inter" turnoId={turnoId} onFotosActualizadas={manejarFotos} titulo="Fotos Termómetros" />
                    </div>
                    <div className="bg-white p-5 rounded-3xl border-l-[6px] border-l-aguas-green shadow-sm border">
                        <h3 className="text-[10px] font-black text-gray-400 uppercase mb-3">PC-2: Bombas Recirculadoras</h3>
                        <select onChange={e=>setFd({...fd, bombas:e.target.value})} className="w-full border-2 p-4 rounded-xl text-sm mb-3 outline-none focus:border-aguas-blue"><option>Optimo</option><option>Fuga en sello / Empaquetadura</option><option>Ruido o vibración excesiva</option></select>
                        <MultiFotoUploader idCampo="a60_bombas" turnoId={turnoId} onFotosActualizadas={manejarFotos} titulo="Fotos Bombas Lodo" />
                    </div>
                    <div className="bg-white p-5 rounded-3xl shadow-sm border">
                        <label className="text-[10px] font-black uppercase mb-2 block">Observaciones Área 60</label>
                        {reqObs && <p className="text-[10px] text-red-600 font-black mb-2 animate-pulse uppercase">⚠️ Justifique anomalías térmicas</p>}
                        <textarea onChange={e=>setFd({...fd, observaciones:e.target.value})} className={`w-full border-2 p-4 rounded-2xl text-sm outline-none focus:border-aguas-blue ${reqObs ? 'bg-red-50 border-red-400' : ''}`} rows="3" placeholder="Detalles..."></textarea>
                    </div>
                    <button onClick={() => onTerminado(fd, fotos)} disabled={!canSubmit} className={`w-full text-white font-black py-6 rounded-3xl shadow-xl mt-6 uppercase tracking-widest ${canSubmit ? 'bg-aguas-blue' : 'bg-gray-300'}`}>Sellar Área 60</button>
                </div>
            );
        }

        // ==========================================
        // APP PRINCIPAL 
        // ==========================================
        function App() {
            const [user, setUser] = useState(null);
            const [authChecking, setAuthChecking] = useState(true);
            const [pantallaActiva, setPantallaActiva] = useState('hub');
            const [moduloDestino, setModuloDestino] = useState(null); 
            
            const { currentStr } = getTokens();
            const [shiftToken] = useState(currentStr);

            // Estados Circuito Biogas
            const [currentScada, setCurrentScada] = useState(null);
            const [currentGas, setCurrentGas] = useState(null);
            const [currentDig, setCurrentDig] = useState(null);
            const [currentComp, setCurrentComp] = useState(null);
            const [currentCald, setCurrentCald] = useState(null);
            
            // Estados Línea Lodos
            const [currentA50, setCurrentA50] = useState(null);
            const [currentA60, setCurrentA60] = useState(null);

            const [isSaving, setIsSaving] = useState(false);

            const cargarDatosColaborativos = async () => {
                try {
                    const [s, g, d, c, cal, a5, a6] = await Promise.all([
                        supabaseClient.from('registro_turnos').select('*').eq('turno_token', shiftToken),
                        supabaseClient.from('inspeccion_gasometro').select('*').eq('turno_token', shiftToken),
                        supabaseClient.from('inspeccion_digestor').select('*').eq('turno_token', shiftToken),
                        supabaseClient.from('inspeccion_compresores').select('*').eq('turno_token', shiftToken),
                        supabaseClient.from('inspeccion_calderas').select('*').eq('turno_token', shiftToken),
                        supabaseClient.from('inspeccion_area50').select('*').eq('turno_token', shiftToken),
                        supabaseClient.from('inspeccion_area60').select('*').eq('turno_token', shiftToken)
                    ]);
                    if(s.data?.length) setCurrentScada(s.data[0]);
                    if(g.data?.length) setCurrentGas(g.data[0]);
                    if(d.data?.length) setCurrentDig(d.data[0]);
                    if(c.data?.length) setCurrentComp(c.data[0]);
                    if(cal.data?.length) setCurrentCald(cal.data[0]);
                    if(a5.data?.length) setCurrentA50(a5.data[0]);
                    if(a6.data?.length) setCurrentA60(a6.data[0]);
                } catch (e) { console.error(e); }
            };

            useEffect(() => {
                supabaseClient.auth.getSession().then(({ data: { session } }) => {
                    setUser(session?.user ?? null);
                    if(session?.user) cargarDatosColaborativos();
                    setAuthChecking(false);
                });
            }, []);

            if (authChecking) return <div className="min-h-screen bg-gray-100"></div>;
            if (!user) return <PantallaLogin />;

            const guardarGenerico = async (tabla, currentData, payloadExtra) => {
                setIsSaving(true);
                try {
                    let tId = currentScada?.id || null;
                    const payload = { turno_token: shiftToken, turno_id: tId, operador_nombre: currentData?.operador_nombre || user.email, ...payloadExtra };
                    const { error } = currentData?.id ? await supabaseClient.from(tabla).update(payload).eq('id', currentData.id) : await supabaseClient.from(tabla).insert([payload]);
                    if (error) throw error;
                    await cargarDatosColaborativos();
                    setIsSaving(false); setPantallaActiva('hub');
                } catch (error) { alert(`Error en ${tabla}: ` + error.message); setIsSaving(false); }
            };

            const handleSaveScada = async (data) => {
                setIsSaving(true);
                try {
                    const payload = { turno_token: shiftToken, operador_nombre: user.email, tipo_turno: shiftToken.includes('DIA') ? 'Día' : 'Noche', scada_dig_nivel_cm: data.dig_nivel || null };
                    if (!currentScada?.hora_inicio) payload.hora_inicio = new Date();
                    const { error } = currentScada?.id ? await supabaseClient.from('registro_turnos').update(payload).eq('id', currentScada.id) : await supabaseClient.from('registro_turnos').insert([payload]);
                    if (error) throw error;
                    await cargarDatosColaborativos(); setIsSaving(false); setPantallaActiva('hub');
                } catch (e) { setIsSaving(false); }
            };

            const handleSaveGasometro = (d) => guardarGenerico('inspeccion_gasometro', currentGas, { estado_anclajes: d.anclajes, altura_interna_m: d.altura||null, presion_inter_membrana_mbar: d.presion||null, lectura_lel_porcentaje: d.lel||null, nivel_guarda_hidraulica: d.guarda, soplador_1_estado: d.soplador_1, soplador_2_estado: d.soplador_2, sopladores_condicion_mecanica: d.condicion_sopladores, flujo_agua_trampa: d.agua_trampa, estado_valvula_corte: d.valvula_corte, estado_gabinete_electrico: d.gabinete, observaciones: d.observaciones, foto_anclaje: d.fotos.anclaje, foto_altura: d.fotos.altura, foto_presion: d.fotos.presion, foto_lel: d.fotos.lel, foto_guarda: d.fotos.guarda, foto_sopladores: d.fotos.sopladores, foto_trampa: d.fotos.trampa, foto_gabinete: d.fotos.gabinete });
            const handleSaveDigestor = (d) => guardarGenerico('inspeccion_digestor', currentDig, { estado_escotillas: d.escotillas, estado_valvulas: d.valvulas, estado_purgas: d.purgas, estado_revestimiento: d.revestimiento, observaciones: d.observaciones, foto_escotillas: d.fotos.escotillas, foto_valvulas: d.fotos.valvulas, foto_purgas: d.fotos.purgas, foto_revestimiento: d.fotos.revestimiento });
            const handleSaveCompresores = (d) => guardarGenerico('inspeccion_compresores', currentComp, { estado_compresores: d.estado_gral, estado_filtros: d.filtros, estado_chiller: d.chiller, estado_valvulas: d.valvulas, estado_tablero: d.tablero, observaciones: d.observaciones, foto_compresores: d.fotos.general, foto_filtros: d.fotos.filtros, foto_chiller: d.fotos.chiller, foto_valvulas: d.fotos.valvulas, foto_tablero: d.fotos.tablero });
            const handleSaveCalderas = (d) => guardarGenerico('inspeccion_calderas', currentCald, { estado_quemador: d.quemador, estado_circuito_agua: d.circuito, estado_bombas: d.bombas, estado_chimenea: d.chimenea, estado_tablero: d.tablero, observaciones: d.observaciones, foto_quemador: d.fotos.quemador, foto_circuito_agua: d.fotos.circuito, foto_bombas: d.fotos.bombas, foto_chimenea: d.fotos.chimenea, foto_tablero: d.fotos.tablero });
            
            const handleSaveA50 = (d) => guardarGenerico('inspeccion_area50', currentA50, { estado_rastras: d.rastras, altura_lodo_cm: d.altura, nivel_balon_cm: d.nivel, presion_balon_bar: d.presion, camara_mezcla_pct: d.mezcla, observaciones: d.observaciones, foto_flotador: d.fotos.flotador, foto_balon: d.fotos.balon });
            const handleSaveA60 = (d) => guardarGenerico('inspeccion_area60', currentA60, { temp_lodo_entrada_c: d.temp_in, temp_lodo_salida_c: d.temp_out, estado_bombas: d.bombas, observaciones: d.observaciones, foto_intercambiador: d.fotos.inter, foto_bombas: d.fotos.bombas });

            if (pantallaActiva === 'hub') {
                const scadaDone = !!currentScada; const gasDone = !!currentGas; const digDone = !!currentDig;
                const compDone = !!currentComp; const caldDone = !!currentCald;
                const a50Done = !!currentA50; const a60Done = !!currentA60;
                
                // URLs Reales y Corporativas para los botones
                const urlDigestor = "https://cbvipsjpvlgyipifidyo.supabase.co/storage/v1/object/public/inspeccion_fotos/Digestor.jpg";
                const urlGasometro = "https://cbvipsjpvlgyipifidyo.supabase.co/storage/v1/object/public/inspeccion_fotos/Gasometro%20vista%20general.jpeg";
                const urlCompresores = "https://cbvipsjpvlgyipifidyo.supabase.co/storage/v1/object/public/inspeccion_fotos/Sala%20de%20Compresores.jpg";
                const urlCalderas = "https://cbvipsjpvlgyipifidyo.supabase.co/storage/v1/object/public/inspeccion_fotos/Sala%20de%20Calderas.jpg";

                return (
                    <div className="p-4 max-w-md mx-auto min-h-screen space-y-6 font-sans bg-gray-50 pb-10">
                        <div className="bg-white p-6 rounded-3xl border-t-[12px] border-aguas-blue shadow-xl">
                            <div className="flex justify-between items-start border-b border-gray-100 pb-4 mb-4">
                                <div className="flex items-center"><div className="w-10 h-10 bg-aguas-blue rounded-xl flex items-center justify-center shadow-md mr-3"><span className="font-black text-white text-sm">RS</span></div><div><h1 className="text-xl font-black text-aguas-dark tracking-tighter">RondaSync</h1><p className="text-[10px] text-aguas-green font-black uppercase tracking-widest">{shiftToken}</p></div></div>
                                <button onClick={async () => { await supabaseClient.auth.signOut(); window.location.reload(); }} className="text-[10px] font-black bg-red-50 text-red-600 px-4 py-2 rounded-xl">SALIR</button>
                            </div>
                            <div className="flex justify-between items-center">
                                <div><p className="text-[9px] text-gray-400 font-black uppercase tracking-widest mb-1">Operador en línea</p><p className="text-sm font-bold text-gray-800">{user.email.split('@')[0]}</p></div>
                                <button onClick={cargarDatosColaborativos} className="bg-aguas-blue text-white px-4 py-2 rounded-xl text-[10px] font-black flex items-center shadow-md hover:bg-aguas-dark transition-all"><span className="mr-2">🔄</span> Sync</button>
                            </div>
                        </div>

                        <div className="space-y-3">
                            <button onClick={() => setPantallaActiva('dashboard')} className="w-full bg-white border-2 border-aguas-blue text-aguas-blue font-black py-4 rounded-2xl shadow-sm uppercase tracking-widest text-xs flex justify-center items-center hover:bg-blue-50 transition-colors mb-2"><span className="text-lg mr-2">📊</span> Módulo Supervisión</button>
                            <button onClick={() => setPantallaActiva('scada')} className={`w-full flex justify-between items-center p-5 rounded-2xl border-2 transition-all ${scadaDone ? 'bg-emerald-50 border-aguas-green shadow-inner' : 'bg-white border-gray-200'}`}><div className="flex items-center space-x-4"><span className="text-2xl">{scadaDone ? '🔒' : '🖥️'}</span><span className={`font-black text-sm uppercase block ${scadaDone ? 'text-aguas-green' : 'text-gray-800'}`}>SCADA Inicial</span></div><span className={`text-[10px] font-black uppercase px-3 py-1 rounded-lg ${scadaDone ? 'bg-emerald-100 text-emerald-800' : 'bg-blue-100 text-blue-800'}`}>{scadaDone ? 'Ver' : 'Llenar'}</span></button>

                            {/* CIRCUITO DE BIOGÁS CON FOTOS CORPORATIVAS */}
                            <h3 className="text-[10px] font-black text-gray-400 uppercase tracking-widest px-2 mb-3 mt-6 border-b border-gray-200 pb-2">Circuito de Biogás</h3>
                            <div className="grid grid-cols-2 gap-4">
                                <button onClick={() => { setModuloDestino('digestor'); setPantallaActiva('riesgos'); }} className={`p-2 rounded-3xl border-2 transition-all text-left relative shadow-sm ${digDone ? 'bg-emerald-50 border-aguas-green' : 'bg-white border-gray-200 hover:border-aguas-blue'}`}>{digDone && <div className="absolute top-4 right-4 z-10 bg-aguas-green text-white rounded-full h-8 w-8 flex items-center justify-center shadow-xl border-2 border-white font-black">✓</div>}<div className="h-28 w-full rounded-2xl overflow-hidden mb-2 shadow-inner"><img src={urlDigestor} className="w-full h-full object-cover" /></div><span className={`font-black text-xs px-2 uppercase ${digDone ? 'text-aguas-green' : 'text-gray-700'}`}>Digestor</span></button>
                                <button onClick={() => { setModuloDestino('gasometro'); setPantallaActiva('riesgos'); }} className={`p-2 rounded-3xl border-2 transition-all text-left relative shadow-sm ${gasDone ? 'bg-emerald-50 border-aguas-green' : 'bg-white border-gray-200 hover:border-aguas-blue'}`}>{gasDone && <div className="absolute top-4 right-4 z-10 bg-aguas-green text-white rounded-full h-8 w-8 flex items-center justify-center shadow-xl border-2 border-white font-black">✓</div>}<div className="h-28 w-full rounded-2xl overflow-hidden mb-2 shadow-inner"><img src={urlGasometro} className="w-full h-full object-cover" /></div><span className={`font-black text-xs px-2 uppercase ${gasDone ? 'text-aguas-green' : 'text-gray-700'}`}>Gasómetro</span></button>
                                <button onClick={() => { setModuloDestino('compresores'); setPantallaActiva('riesgos'); }} className={`p-2 rounded-3xl border-2 transition-all text-left relative shadow-sm ${compDone ? 'bg-emerald-50 border-aguas-green' : 'bg-white border-gray-200 hover:border-aguas-blue'}`}>{compDone && <div className="absolute top-4 right-4 z-10 bg-aguas-green text-white rounded-full h-8 w-8 flex items-center justify-center shadow-xl border-2 border-white font-black">✓</div>}<div className="h-28 w-full rounded-2xl overflow-hidden mb-2 shadow-inner"><img src={urlCompresores} className="w-full h-full object-cover" /></div><span className={`font-black text-xs px-2 uppercase ${compDone ? 'text-aguas-green' : 'text-gray-700'}`}>Compresores</span></button>
                                <button onClick={() => { setModuloDestino('calderas'); setPantallaActiva('riesgos'); }} className={`p-2 rounded-3xl border-2 transition-all text-left relative shadow-sm ${caldDone ? 'bg-emerald-50 border-aguas-green' : 'bg-white border-gray-200 hover:border-aguas-blue'}`}>{caldDone && <div className="absolute top-4 right-4 z-10 bg-aguas-green text-white rounded-full h-8 w-8 flex items-center justify-center shadow-xl border-2 border-white font-black">✓</div>}<div className="h-28 w-full rounded-2xl overflow-hidden mb-2 shadow-inner"><img src={urlCalderas} className="w-full h-full object-cover" /></div><span className={`font-black text-xs px-2 uppercase ${caldDone ? 'text-aguas-green' : 'text-gray-700'}`}>Calderas</span></button>
                            </div>

                            {/* LÍNEA DE LODOS CON DISEÑO CORPORATIVO TEMPORAL */}
                            <h3 className="text-[10px] font-black text-gray-400 uppercase tracking-widest px-2 mb-3 mt-8 border-b border-gray-200 pb-2">Línea de Lodos</h3>
                            <div className="grid grid-cols-2 gap-4">
                                <button onClick={() => { setModuloDestino('area50'); setPantallaActiva('riesgos'); }} className={`p-2 rounded-3xl border-2 transition-all text-left relative shadow-sm ${a50Done ? 'bg-emerald-50 border-aguas-green' : 'bg-white border-gray-200 hover:border-aguas-blue'}`}>
                                    {a50Done && <div className="absolute top-4 right-4 z-10 bg-aguas-green text-white rounded-full h-8 w-8 flex items-center justify-center shadow-xl border-2 border-white font-black">✓</div>}
                                    <div className="h-28 w-full rounded-2xl mb-2 shadow-inner bg-gradient-to-br from-aguas-blue to-aguas-dark flex items-center justify-center"><span className="text-4xl text-white opacity-40">🌊</span></div>
                                    <span className={`font-black text-xs px-2 uppercase ${a50Done ? 'text-aguas-green' : 'text-gray-700'}`}>Área 50</span>
                                </button>
                                <button onClick={() => { setModuloDestino('area60'); setPantallaActiva('riesgos'); }} className={`p-2 rounded-3xl border-2 transition-all text-left relative shadow-sm ${a60Done ? 'bg-emerald-50 border-aguas-green' : 'bg-white border-gray-200 hover:border-aguas-blue'}`}>
                                    {a60Done && <div className="absolute top-4 right-4 z-10 bg-aguas-green text-white rounded-full h-8 w-8 flex items-center justify-center shadow-xl border-2 border-white font-black">✓</div>}
                                    <div className="h-28 w-full rounded-2xl mb-2 shadow-inner bg-gradient-to-br from-aguas-blue to-aguas-dark flex items-center justify-center"><span className="text-4xl text-white opacity-40">🌡️</span></div>
                                    <span className={`font-black text-xs px-2 uppercase ${a60Done ? 'text-aguas-green' : 'text-gray-700'}`}>Área 60</span>
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            const loaderHTML = <div className="fixed inset-0 bg-aguas-dark/90 z-50 flex flex-col items-center justify-center text-white backdrop-blur-sm"><div className="text-4xl animate-spin mb-6 text-aguas-yellow">⚙️</div><h2 className="font-black tracking-[0.3em] uppercase">Guardando Evidencia...</h2></div>;

            if (pantallaActiva === 'scada') return <VistaScada datosGuardados={currentScada} onSave={handleSaveScada} onBack={() => setPantallaActiva('hub')} />;
            if (pantallaActiva === 'riesgos') return <VistaRiesgos modulo={moduloDestino} onComplete={() => setPantallaActiva(moduloDestino)} onBack={() => setPantallaActiva('hub')} />;
            
            // Formularios Lodos
            if (pantallaActiva === 'area50') return <div>{isSaving && loaderHTML}<FormularioArea50 turnoId={shiftToken} onTerminado={handleSaveA50} /></div>;
            if (pantallaActiva === 'area60') return <div>{isSaving && loaderHTML}<FormularioArea60 turnoId={shiftToken} onTerminado={handleSaveA60} /></div>;
            
            // Formularios Biogás
            if (pantallaActiva === 'gasometro') return <div>{isSaving && loaderHTML}<FormularioGasometro turnoId={shiftToken} prevData={prevData.gasometro} onTerminado={handleSaveGasometro} /></div>;
            if (pantallaActiva === 'digestor') return <div>{isSaving && loaderHTML}<FormularioDigestor turnoId={shiftToken} prevData={prevData.digestor} onTerminado={handleSaveDigestor} /></div>;
            if (pantallaActiva === 'compresores') return <div>{isSaving && loaderHTML}<FormularioCompresores turnoId={shiftToken} prevData={prevData.compresores} onTerminado={handleSaveCompresores} /></div>;
            if (pantallaActiva === 'calderas') return <div>{isSaving && loaderHTML}<FormularioCalderas turnoId={shiftToken} prevData={prevData.calderas} onTerminado={handleSaveCalderas} /></div>;

            return <div className="p-10 text-center"><h1 className="text-2xl font-black text-aguas-dark">Módulo en construcción</h1><button onClick={()=>setPantallaActiva('hub')} className="mt-5 px-6 py-3 bg-aguas-blue text-white rounded-xl font-bold">Volver al Hub</button></div>;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
