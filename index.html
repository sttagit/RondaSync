<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RondaSync - Inspeccion PTAR Talagante</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body className="bg-gray-200">
    <div id="root"></div>

    <script type="text/babel">
        const SUPABASE_URL = 'https://cbvipsjpvlgyipifidyo.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_-9xy9fwszhg5RMqlilNn-A_wnK2VGCb';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const { useState, useEffect } = React;

        // ==========================================
        // COMPONENTE: LOGIN DARK MODE
        // ==========================================
        function PantallaLogin() {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false);
            const [showPassword, setShowPassword] = useState(false);

            const manejarLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
                if (error) alert("Error: " + error.message);
                setLoading(false);
            };

            return (
                <div className="min-h-screen bg-[#1e1e1e] flex items-center justify-center p-4 font-sans">
                    <div className="bg-[#2a2a2a] w-full max-w-md rounded-xl p-8 relative shadow-2xl border border-zinc-700">
                        <div className="absolute top-3 left-3 w-3 h-3 bg-zinc-600 rounded-full shadow-inner border border-zinc-500"></div>
                        <div className="absolute top-3 right-3 w-3 h-3 bg-zinc-600 rounded-full shadow-inner border border-zinc-500"></div>
                        <div className="absolute bottom-3 left-3 w-3 h-3 bg-zinc-600 rounded-full shadow-inner border border-zinc-500"></div>
                        <div className="absolute bottom-3 right-3 w-3 h-3 bg-zinc-600 rounded-full shadow-inner border border-zinc-500"></div>

                        <div className="flex items-center space-x-4 mb-8">
                            <div className="w-12 h-12 bg-amber-500 rounded-lg flex items-center justify-center p-2 shadow-lg">
                                <div className="grid grid-cols-2 gap-1 w-full h-full">
                                    <div className="bg-zinc-900 rounded-sm"></div>
                                    <div className="bg-zinc-900 rounded-sm"></div>
                                    <div className="bg-zinc-900 rounded-sm"></div>
                                    <div className="bg-zinc-900 rounded-sm"></div>
                                </div>
                            </div>
                            <div>
                                <h1 className="text-2xl font-bold text-white tracking-wide">RondaSync</h1>
                                <p className="text-xs text-zinc-400 uppercase tracking-widest">PTAR Talagante</p>
                            </div>
                        </div>

                        <div className="mb-8">
                            <h2 className="text-3xl font-bold text-white mb-2">Bienvenido</h2>
                            <p className="text-zinc-400 text-sm">Ingresa tus credenciales para continuar</p>
                        </div>

                        <form onSubmit={manejarLogin} className="space-y-6">
                            <div>
                                <label className="block text-xs font-bold text-zinc-400 uppercase tracking-wider mb-2">Email</label>
                                <input type="email" value={email} onChange={(e) => setEmail(e.target.value)}
                                    className="w-full bg-[#1e1e1e] border border-zinc-700 text-white rounded-lg p-4 focus:outline-none focus:border-amber-500 transition-colors" required />
                            </div>
                            <div className="relative">
                                <label className="block text-xs font-bold text-zinc-400 uppercase tracking-wider mb-2">Contrasena</label>
                                <input type={showPassword ? "text" : "password"} value={password} onChange={(e) => setPassword(e.target.value)}
                                    className="w-full bg-[#1e1e1e] border border-zinc-700 text-white rounded-lg p-4 focus:outline-none focus:border-amber-500 transition-colors" required />
                                <button type="button" onClick={() => setShowPassword(!showPassword)} className="absolute right-4 top-10 text-zinc-500">👁️</button>
                            </div>
                            <button type="submit" disabled={loading} className="w-full bg-amber-500 hover:bg-amber-600 text-zinc-900 font-bold py-4 rounded-lg uppercase tracking-wider shadow-lg">
                                {loading ? 'Ingresando...' : 'Ingresar'}
                            </button>
                        </form>
                    </div>
                </div>
            );
        }

        // ==========================================
        // COMPONENTE: INICIO DE TURNO (GABINETE)
        // ==========================================
        function InicioTurno({ onTurnoIniciado, userEmail }) {
            const [loading, setLoading] = useState(false);
            const [atex, setAtex] = useState(false);
            const [scada, setScada] = useState({ nivel: '', presion: '', flujo: '' });

            const iniciar = async () => {
                if (!atex) return alert("Debes confirmar la revision del protocolo ATEX.");
                setLoading(true);
                const { data, error } = await supabaseClient.from('registro_turnos').insert([{
                    operador_nombre: userEmail,
                    tipo_turno: 'Normal',
                    scada_nivel_gasometro: scada.nivel || null,
                    scada_presion_mbar: scada.presion || null,
                    scada_flujo_biogas_nm3h: scada.flujo || null,
                    atex_confirmado: atex
                }]).select();
                
                setLoading(false);
                if (error) {
                    alert("Error guardando turno: " + error.message);
                } else {
                    onTurnoIniciado(data[0].id);
                }
            };

            return (
                <div className="p-4 max-w-md mx-auto min-h-screen space-y-4 pb-10 font-sans">
                    <div className="flex justify-between items-center bg-[#1e293b] p-4 rounded-xl text-white shadow-lg">
                        <div>
                            <h2 className="text-xl font-bold">Turno Entrante</h2>
                            <p className="text-xs text-blue-200">Operador: {userEmail}</p>
                        </div>
                        <button onClick={() => supabaseClient.auth.signOut()} className="text-xs font-bold bg-red-500 px-3 py-1 rounded hover:bg-red-600">SALIR</button>
                    </div>

                    <div className="bg-white rounded-xl shadow-sm p-4 border border-gray-200">
                        <h3 className="text-sm font-bold text-gray-800 uppercase mb-3 flex items-center">
                            <span className="bg-blue-100 text-blue-800 p-1 rounded mr-2">🖥️</span> Modulo SCADA vs Realidad
                        </h3>
                        <div className="grid grid-cols-2 gap-3 mb-3">
                            <div>
                                <label className="block text-xs font-medium text-gray-500">Nivel Gasometro (%)</label>
                                <input type="number" step="0.1" className="mt-1 w-full border p-3 rounded-lg bg-gray-50 text-center font-bold text-lg" placeholder="0.0" onChange={e => setScada({...scada, nivel: e.target.value})} />
                            </div>
                            <div>
                                <label className="block text-xs font-medium text-gray-500">Presion (mbar)</label>
                                <input type="number" step="0.1" className="mt-1 w-full border p-3 rounded-lg bg-gray-50 text-center font-bold text-lg" placeholder="0.0" onChange={e => setScada({...scada, presion: e.target.value})} />
                            </div>
                        </div>
                    </div>

                    <div className="bg-white rounded-xl shadow-sm p-4 border-2 border-red-100">
                        <h3 className="text-sm font-bold text-red-700 uppercase mb-3 flex items-center">
                            <span className="mr-2">🛑</span> Protocolo de Seguridad (ATEX)
                        </h3>
                        <label className="flex items-start space-x-3 p-3 bg-red-50 rounded-lg border border-red-200">
                            <input type="checkbox" onChange={e => setAtex(e.target.checked)} className="h-6 w-6 text-red-600 mt-1" />
                            <span className="text-sm text-red-900 font-medium">He revisado los riesgos y el plano ATEX.</span>
                        </label>
                    </div>

                    <button onClick={iniciar} disabled={!atex || loading} className={`w-full font-bold py-4 rounded-xl shadow-lg transition-colors text-white text-lg ${atex ? 'bg-emerald-600 hover:bg-emerald-700' : 'bg-gray-400'}`}>
                        {loading ? 'Iniciando...' : 'INICIAR SALIDA A TERRENO'}
                    </button>
                </div>
            );
        }

        // ==========================================
        // COMPONENTE: RONDA TERRENO CON VALIDACIONES (TALAGANTE)
        // ==========================================
        function RondaGasometro({ turnoId, onFin }) {
            const [loading, setLoading] = useState(false);
            const [fd, setFd] = useState({
                senalizaciones: false, alarmas: true, 
                anclajes: 'Optimo', membranaInterna: '', 
                altura: '', presion: '', lel: '', 
                guarda: 'Nivel Normal', valvulaIn: false, trampas: false, damper: false, tablero: false,
                sopladores: 'Operativo', observaciones: ''
            });

            const handleChange = (e) => {
                const { name, value, type, checked } = e.target;
                setFd(prev => ({ ...prev, [name]: type === 'checkbox' ? checked : value }));
            };

            const guardar = async () => {
                setLoading(true);
                const { error } = await supabaseClient.from('inspeccion_gasometro').insert([{
                    turno_id: turnoId,
                    senalizaciones_ok: fd.senalizaciones, alarmas_desactivadas: fd.alarmas,
                    estado_anclajes: fd.anclajes, membrana_interna_escotilla: fd.membranaInterna,
                    altura_interna_m: fd.altura || null, presion_inter_membrana_mbar: fd.presion || null, lectura_lel_porcentaje: fd.lel || null,
                    nivel_guarda_hidraulica: fd.guarda, valvula_ingreso_ok: fd.valvulaIn, trampas_drenadas: fd.trampas, 
                    valvula_damper_ok: fd.damper, tablero_electrico_ok: fd.tablero,
                    estado_sopladores: fd.sopladores, observaciones: fd.observaciones
                }]);
                
                await supabaseClient.from('registro_turnos').update({ estado_ronda: 'Completada', hora_fin: new Date() }).eq('id', turnoId);
                setLoading(false);
                if (error) alert("Error guardando inspeccion: " + error.message);
                else onFin();
            };

            // Lógica de Validación Activa
            const p = parseFloat(fd.presion);
            const h = parseFloat(fd.altura);
            const lel = parseFloat(fd.lel);

            const isPresionCritica = p >= 25;
            const isAlturaCritica = h > 10.1;
            const isCritical = isPresionCritica || isAlturaCritica;

            const isPresionWarning = p > 0 && (p < 16 || p > 18) && !isPresionCritica;
            const isAlturaWarning = h > 0 && (h < 5.05 || h > 7.07) && !isAlturaCritica;

            const requiresObservation = lel > 0 || fd.anclajes === 'Observacion' || fd.guarda !== 'Nivel Normal';
            const observationMissing = requiresObservation && fd.observaciones.trim() === '';

            const canSubmit = !isCritical && !observationMissing && !loading;

            return (
                <div className="p-4 max-w-md mx-auto space-y-4 min-h-screen pb-20 font-sans">
                    <div className="flex items-center space-x-3 bg-[#1e293b] p-4 rounded-xl text-white shadow-lg sticky top-2 z-10">
                        <div className="bg-blue-500 p-2 rounded-lg">🏗️</div>
                        <h2 className="text-xl font-bold tracking-wide">Inspeccion Gasometro</h2>
                    </div>

                    <section className="bg-white rounded-xl shadow-sm p-4 border border-gray-200">
                        <h3 className="text-xs font-bold text-blue-800 uppercase border-b pb-2 mb-3">A. Entorno y Seguridad Pasiva</h3>
                        <div className="space-y-3">
                            <label className="flex items-center space-x-3 bg-gray-50 p-3 rounded-lg border border-gray-100">
                                <input type="checkbox" name="senalizaciones" onChange={handleChange} className="h-6 w-6 text-blue-600 rounded" />
                                <span className="text-sm font-medium text-gray-700">Senalizaciones y letreros OK</span>
                            </label>
                        </div>
                    </section>

                    <section className="bg-white rounded-xl shadow-sm p-4 border border-gray-200">
                        <h3 className="text-xs font-bold text-blue-800 uppercase border-b pb-2 mb-3">B. Integridad Estructural</h3>
                        <div className="space-y-4">
                            <div>
                                <label className="block text-xs font-medium text-gray-500 mb-1">Anclajes y Membrana Externa</label>
                                <select name="anclajes" onChange={handleChange} className="w-full border p-3 rounded-lg bg-gray-50 font-medium">
                                    <option value="Optimo">Optimo (Pernos y sellos OK)</option>
                                    <option value="Observacion">Con observacion</option>
                                </select>
                            </div>
                        </div>
                    </section>

                    <section className="bg-white rounded-xl shadow-sm p-4 border border-gray-200">
                        <h3 className="text-xs font-bold text-blue-800 uppercase border-b pb-2 mb-3">C. Instrumentacion de Campo</h3>
                        
                        {isCritical && (
                            <div className="bg-red-600 text-white p-3 rounded-lg mb-4 text-sm font-bold shadow-md">
                                🛑 ALERTA CRITICA: Limite mecanico excedido. Contactar supervision inmediatamente.
                            </div>
                        )}

                        <div className="grid grid-cols-2 gap-3 mb-3">
                            <div className={`p-2 rounded-lg border-2 ${isAlturaCritica ? 'border-red-600 bg-red-50' : (isAlturaWarning ? 'border-yellow-400 bg-yellow-50' : 'border-transparent')}`}>
                                <label className="block text-xs font-medium text-gray-500 mb-1">Altura Interna (m)</label>
                                <input type="number" step="0.1" name="altura" onChange={handleChange} className="w-full border p-3 rounded-lg text-center font-bold text-lg" placeholder="0.0" />
                                {isAlturaWarning && <span className="text-[10px] text-yellow-700 font-bold">Rango fuera de 50-70%</span>}
                            </div>
                            <div className={`p-2 rounded-lg border-2 ${isPresionCritica ? 'border-red-600 bg-red-50' : (isPresionWarning ? 'border-yellow-400 bg-yellow-50' : 'border-transparent')}`}>
                                <label className="block text-xs font-medium text-gray-500 mb-1">Presion (mbar)</label>
                                <input type="number" step="0.1" name="presion" onChange={handleChange} className="w-full border p-3 rounded-lg text-center font-bold text-lg" placeholder="0.0" />
                                {isPresionWarning && <span className="text-[10px] text-yellow-700 font-bold">Fuera de 16-18 mbar</span>}
                            </div>
                        </div>
                        <div className={`p-4 rounded-lg border-2 ${lel > 0 ? 'bg-red-50 border-red-300' : 'bg-gray-50 border-gray-200'}`}>
                            <label className={`block text-xs font-bold uppercase mb-1 ${lel > 0 ? 'text-red-700' : 'text-gray-500'}`}>Detector % LEL</label>
                            <input type="number" step="0.1" name="lel" onChange={handleChange} className={`w-full border p-3 rounded-lg text-center font-bold text-2xl ${lel > 0 ? 'bg-red-100 text-red-700 border-red-400' : 'bg-white'}`} placeholder="0.0" />
                        </div>
                    </section>

                    <section className="bg-white rounded-xl shadow-sm p-4 border border-gray-200">
                        <h3 className="text-xs font-bold text-blue-800 uppercase border-b pb-2 mb-3">D. Equipos y Valvuleria</h3>
                        <div className="space-y-4">
                            <div>
                                <label className="block text-xs font-medium text-gray-500 mb-1">Guarda Hidraulica (Sello)</label>
                                <select name="guarda" onChange={handleChange} className="w-full border p-3 rounded-lg bg-gray-50 font-medium">
                                    <option value="Nivel Normal">Nivel Normal (Sello optimo)</option>
                                    <option value="Bajo">Nivel Bajo (Requiere relleno)</option>
                                    <option value="Rebalse">Rebalse / Apertura</option>
                                </select>
                            </div>
                        </div>
                    </section>

                    <section className={`bg-white rounded-xl shadow-sm p-4 border-2 ${observationMissing ? 'border-red-500' : 'border-gray-200'}`}>
                        <h3 className="text-xs font-bold text-gray-800 uppercase border-b pb-2 mb-3">Registro Final</h3>
                        {observationMissing && (
                            <p className="text-xs text-red-600 font-bold mb-2">⚠️ Debido a anomalias registradas (LEL o Estado de equipos), debes ingresar una observacion obligatoria.</p>
                        )}
                        <div>
                            <label className="block text-xs font-medium text-gray-500 mb-1">Observaciones Generales</label>
                            <textarea name="observaciones" onChange={handleChange} className="w-full border p-3 rounded-lg bg-gray-50 text-sm" rows="3" placeholder="Clima, olores, justificacion de alertas..."></textarea>
                        </div>
                    </section>

                    <button onClick={guardar} disabled={!canSubmit} className={`w-full text-white font-bold py-5 rounded-xl shadow-xl text-lg uppercase tracking-wide transition-colors ${canSubmit ? 'bg-emerald-600 hover:bg-emerald-700' : 'bg-gray-400 cursor-not-allowed'}`}>
                        {loading ? 'Guardando Registro...' : 'Finalizar Modulo Gasometro'}
                    </button>
                </div>
            );
        }

        // ==========================================
        // APP PRINCIPAL
        // ==========================================
        function App() {
            const [user, setUser] = useState(null);
            const [vista, setVista] = useState('inicio');
            const [turnoId, setTurnoId] = useState(null);
            const [authChecking, setAuthChecking] = useState(true);

            useEffect(() => {
                supabaseClient.auth.getSession().then(({ data: { session } }) => {
                    setUser(session?.user ?? null);
                    setAuthChecking(false);
                });
                const { data: { subscription } } = supabaseClient.auth.onAuthStateChange((_event, session) => {
                    setUser(session?.user ?? null);
                });
                return () => subscription.unsubscribe();
            }, []);

            if (authChecking) return <div className="min-h-screen bg-[#1e1e1e]"></div>;
            if (!user) return <PantallaLogin />;

            return (
                <div className="bg-gray-100 min-h-screen selection:bg-amber-200">
                    {vista === 'inicio' && <InicioTurno userEmail={user.email} onTurnoIniciado={(id) => {setTurnoId(id); setVista('gasometro');}} />}
                    {vista === 'gasometro' && <RondaGasometro turnoId={turnoId} onFin={() => setVista('fin')} />}
                    {vista === 'fin' && (
                        <div className="flex flex-col items-center justify-center min-h-screen p-6 bg-[#1e1e1e]">
                            <div className="bg-[#2a2a2a] p-8 rounded-2xl shadow-2xl text-center w-full max-w-sm border border-zinc-700">
                                <div className="text-6xl mb-6">✅</div>
                                <h2 className="text-2xl font-bold text-white tracking-wide">Registro Completado</h2>
                                <p className="text-zinc-400 text-sm mt-2 mb-8">La ronda del gasometro ha sido asegurada en la base de datos.</p>
                                <button onClick={() => setVista('inicio')} className="w-full bg-amber-500 hover:bg-amber-600 text-zinc-900 font-bold py-4 rounded-xl shadow-lg transition-all uppercase tracking-wider">
                                    Menu Principal
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
